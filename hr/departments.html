                Are you sure you want to delete this department?
            </div>

<script>
lucide.createIcons();

var departmentRecords = [];
var currentDepartmentId = '';
var departmentTableSelector = '#allDepartmentPanelTable';
var isLoadingDepartments = false;

function showError(message) {
    if (window.JSUTIL && typeof JSUTIL.buildErrorModal === 'function') {
        JSUTIL.buildErrorModal(message);
    } else {
        alert(message);
    }
}

function getCsrfHeaders() {
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    var headers = {};
    if (token && header) {
        headers[header] = token;
    }
    return headers;
}

function requestJson(url, method, payload) {
    var options = {
        method: method || 'GET',
        headers: Object.assign({}, getCsrfHeaders())
    };
    if (payload !== undefined) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(payload);
    }
    return fetch(url, options).then(async function (response) {
        if (!response.ok) {
            var text = await response.text();
            throw new Error(text || ('HTTP ' + response.status));
        }
        var textBody = await response.text();
        if (!textBody) return null;
        try {
            return JSON.parse(textBody);
        } catch (e) {
            return textBody;
        }
    });
}

function normalizeRecord(record) {
    return {
        id: record.id || record.Id,
        name: record.name || record.Name || '',
        code: record.code || record.Code || '',
        startDate: record.startDate || record.StartDate || ''
    };
}

function toDisplayDate(value) {
    if (!value) return '';
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(value)) return value;
    var d = new Date(value);
    if (isNaN(d.getTime())) return value;
    var day = d.getDate() < 10 ? '0' + d.getDate() : '' + d.getDate();
    var month = d.getMonth() + 1;
    month = month < 10 ? '0' + month : '' + month;
    return day + '/' + month + '/' + d.getFullYear();
}

function toInputDate(value) {
    if (!value) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(value)) {
        var parts = value.split('/');
        return parts[2] + '-' + parts[1] + '-' + parts[0];
    }
    var d = new Date(value);
    if (isNaN(d.getTime())) return '';
    var day = d.getDate() < 10 ? '0' + d.getDate() : '' + d.getDate();
    var month = d.getMonth() + 1;
    month = month < 10 ? '0' + month : '' + month;
    return d.getFullYear() + '-' + month + '-' + day;
}

/* ------------------------------------------------------------------ */
/*  Destroy existing DataTable instance by ID (keeps table element)   */
/* ------------------------------------------------------------------ */
function destroyDepartmentTable() {
    try {
        if ($.fn.DataTable && $.fn.DataTable.isDataTable(departmentTableSelector)) {
            $(departmentTableSelector).DataTable().clear().destroy();
        }
    } catch (e) {
        console.warn('DataTable destroy warning:', e);
    }
    $('#allDepartmentTable').empty();
}

function renderDepartmentTable() {
    destroyDepartmentTable();

    var innerHtml = '';
    departmentRecords.forEach(function (rec) {
        innerHtml += '<tr>' +
            '<td><a href="javascript:void(0);" class="selectDepartmentBtn" data-id="' + rec.id + '">' + rec.name + '</a></td>' +
            '<td>' + rec.code + '</td>' +
            '</tr>';
    });
    $('#allDepartmentTable').html(innerHtml);

    if ($.fn && $.fn.DataTable) {
        $(departmentTableSelector).DataTable({
            order: [],
            pageLength: 25
        });
    }
}

function setView(viewName) {
    $('#allDepartmentPanel').hide();
    $('#newDepartmentPanel').hide();
    $('#editDepartmentPanel').hide();
    if (viewName === 'all') $('#allDepartmentPanel').show();
    if (viewName === 'new') $('#newDepartmentPanel').show();
    if (viewName === 'edit') $('#editDepartmentPanel').show();
}

function buildFormPayload(prefixClass) {
    var name = $('.' + prefixClass + '[name="name"]').val();
    var code = $('.' + prefixClass + '[name="code"]').val();
    var startDate = $('.' + prefixClass + '[name="startDate"]').val();
    return {
        name: (name || '').trim(),
        code: (code || '').trim(),
        startDate: toInputDate(startDate)
    };
}

function toApiPayload(payload) {
    return {
        name: payload.name,
        code: payload.code,
        startDate: payload.startDate || null
    };
}

async function loadDepartments() {
    if (isLoadingDepartments) return;
    isLoadingDepartments = true;

    try {
        var apiResponse = await requestJson('/api/departments', 'GET');
        departmentRecords = (Array.isArray(apiResponse) ? apiResponse : []).map(normalizeRecord);
    } catch (apiErr) {
        console.error(apiErr);
        departmentRecords = [];
    } finally {
        isLoadingDepartments = false;
    }

    renderDepartmentTable();
    setView('all');
}

async function createDepartmentData() {
    var payload = buildFormPayload('newDepartmentInput');
    if (!payload.name) {
    showError('Name is required.');
    return;
}
if (!payload.code) {
    showError('Code is required.');
    return;
}
if (!payload.startDate) {
    showError('Start Date is required.');
    return;
}
var dupName = departmentRecords.find(function(rec) {
    return rec.name && rec.name.trim().toLowerCase() === payload.name.trim().toLowerCase();
});
if (dupName) {
    showError('A department with the name "' + payload.name + '" already exists.');
    return;
}


    try {
        await requestJson('/api/departments', 'POST', toApiPayload(payload));
    } catch (apiErr) {
        console.error(apiErr);
        showError('Unable to create department.');
        return;
    }

    $('#newDepartmentCreateForm')[0].reset();
    await loadDepartments();
}

async function updateDepartmentData() {
    if (!currentDepartmentId) {
        showError('Department id is missing.');
        return;
    }

    var payload = buildFormPayload('editDepartmentInput');
   if (!payload.name) {
    showError('Name is required.');
    return;
}
if (!payload.code) {
    showError('Code is required.');
    return;
}
if (!payload.startDate) {
    showError('Start Date is required.');
    return;
}
var dupName = departmentRecords.find(function(rec) {
    return rec.name && rec.name.trim().toLowerCase() === payload.name.trim().toLowerCase()
           && String(rec.id) !== String(currentDepartmentId);
});
if (dupName) {
    showError('A department with the name "' + payload.name + '" already exists.');
    return;
}

    try {
        await requestJson('/api/departments/' + currentDepartmentId, 'PUT', toApiPayload(payload));
    } catch (apiErr) {
        console.error(apiErr);
        showError('Unable to update department.');
        return;
    }

    $('.departmentEditBtn').show();
    $('.departmentSaveBtn').hide();
    $('.editDepartmentInput').prop('readonly', true).prop('disabled', true);
    await loadDepartments();
}

async function deleteDepartmentData() {
    if (!currentDepartmentId) {
        showError('Department id is missing.');
        return;
    }

    try {
        await requestJson('/api/departments/' + currentDepartmentId, 'DELETE');
    } catch (apiErr) {
        console.error(apiErr);
        showError('Unable to delete department.');
        return;
    }

    currentDepartmentId = '';
    await loadDepartments();
}

$(document).ready(function () {
    $('.departmentSaveBtn').hide();
    setView('all');
    loadDepartments();

    $('.newDepartmentBtn').on('click', function () {
        setView('new');
        var $newDate = $('.newDepartmentInput[name="startDate"]');
        // if ($newDate.data('daterangepicker')) {
        //     $newDate.data('daterangepicker').remove();
        // }
            JSUTIL.initDatePicker(".datepicker");
        $newDate.val('');
        // $newDate.daterangepicker({
        //     singleDatePicker: true,
        //     showDropdowns: true,
        //     autoUpdateInput: false,
        //     minYear: 1901, maxYear: parseInt(moment().format('YYYY'), 10),
        //     locale: { cancelLabel: 'Clear' }
        // });
        // $newDate.on('apply.daterangepicker', function(ev, picker) {
        //     $(this).val(picker.startDate.format('DD/MM/YYYY'));
        // });
        // $newDate.off('cancel.daterangepicker').on('cancel.daterangepicker', function() {
        //     $(this).val('');
        // });
    });

    $('.showAllDepartmentOnCancel').on('click', function () {
        setView('all');
    });

    $('#newDepartmentSaveBtn').on('click', function () {
        createDepartmentData();
    });

    $('.editCancelBtn').on('click', function () {
        $('.departmentEditBtn').show();
        $('.departmentSaveBtn').hide();
        $('.editDepartmentInput').prop('readonly', true).prop('disabled', true);
        setView('all');
    });

    $('.departmentEditBtn').on('click', function () {
        $('.departmentEditBtn').hide();
        $('.departmentSaveBtn').show();
        $('.editDepartmentInput').prop('readonly', false).prop('disabled', false);
        
        var $startDate = $('.editDepartmentInput[name="startDate"]');
        var displayVal = $startDate.val();
        
        // if ($startDate.data('daterangepicker')) {
        //     $startDate.data('daterangepicker').remove();
        // }
        
        // $startDate.daterangepicker(Object.assign({
        //     singleDatePicker: true,
        //     showDropdowns: true,
        //     autoUpdateInput: false,
        //     minYear: 1901, maxYear: parseInt(moment().format('YYYY'), 10),
        //     locale: { cancelLabel: 'Cancel' }
        // }, displayVal ? { startDate: moment(displayVal, 'DD/MM/YYYY') } : {}));
        
        // $startDate.on('apply.daterangepicker', function(ev, picker) {
        //     $(this).val(picker.startDate.format('DD/MM/YYYY'));
        // });
        
        // $startDate.off('cancel.daterangepicker').on('cancel.daterangepicker', function() {
        //     $(this).val('');
        // });
            JSUTIL.initDatePicker(".datepicker");
    });

    $('.departmentSaveBtn').on('click', function () {
        updateDepartmentData();
    });

    $('#allDepartmentPanel').on('click', '.selectDepartmentBtn', function () {
        var id = String($(this).data('id'));
        var match = departmentRecords.find(function (item) {
            return String(item.id) === id;
        });
        if (!match) return;

        currentDepartmentId = id;
        $('#hiddenDepartmentId').val(id);
        $('#editDepartmentName').text(match.name);
        $('.editDepartmentInput[name="name"]').val(match.name);
        $('.editDepartmentInput[name="code"]').val(match.code);
        var currentVal = toInputDate(match.startDate);
        var displayVal = currentVal ? moment(currentVal, 'YYYY-MM-DD').format('DD/MM/YYYY') : '';

        var $startDate = $('.editDepartmentInput[name="startDate"]');

        // if ($startDate.data('daterangepicker')) {
        //     $startDate.data('daterangepicker').remove();
        // }
            JSUTIL.initDatePicker(".datepicker");

        $startDate.val(displayVal);
        
        setView('edit');
    });

    $('#deleteDepartmentBtn').on('click', function () {
        var modal = new bootstrap.Modal(document.getElementById('standard-modal'));
        modal.show();
    });

    $('#confirmDeleteDepartmentBtn').on('click', function () {
        var modal = bootstrap.Modal.getInstance(document.getElementById('standard-modal'));
        if (modal) modal.hide();
        deleteDepartmentData();
    });
});
</script>
