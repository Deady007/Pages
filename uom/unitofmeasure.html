<script src="pages/lib/jquery-3.7.1.js"></script>
<script src="pages/lib/dataTables.js"></script>
<script src="pages/lib/lucide.min.js"></script>
<link rel="stylesheet" href="pages/lib/dataTables.dataTables.css">
<!-- allUomPanel.html start -->
 <style>
     #allUomPanelTable thead th {
        border-bottom: 1px solid #eee !important;
    }
    #allUomPanelTable tbody tr:last-child td {
        border-bottom: none !important;
    } 
     .btn .lucide {
        width: 17px;
        height: 17px;
        stroke-width: 4;
        vertical-align: middle;
        margin-right: 5px;
        padding: 2px;
    }
     .selectUomBtn{
        color: #337AB7!important;
        text-decoration: none;
    }
 </style>
<div class="qa-white-panel" >
<div class="row animated fadeInRight aasaanPanel" id="allUomPanel" style="display: none;">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>Unit of Measure <small>Master</small></h5>
                <div class="ibox-tools">
                    <button type="button" class="btn btn-sm btn-secondary newUomBtn"><i data-lucide="plus"></i>New Unit</button>
                </div>
            </div>
            <div class="ibox-content m-b-sm border-bottom">
                <table id="allUomPanelTable" class="table table-hover table-bordered">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Sequence</th>
                        </tr>
                    </thead>
                    <tbody class="dataTableRecordList" id="allUomTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- allUomPanel.html end -->




<!-- newUomPanel.html start -->
<div class="row animated fadeInRight aasaanPanel" id="newUomPanel" style="display:none;">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>New <small>Unit of Measure</small></h5>
                <div class="ibox-tools">
                    <button type="button" class="btn btn-default btn-sm close-box showAllUomOnCancel"><i data-lucide="x"></i>Close </button>
                    <button type="button" class="btn btn-secondary btn-sm" id="newUomSaveBtn"><i data-lucide="check"></i>Save </button>
                </div>
            </div>
            <div class="ibox-content">
                <form role="form" name="stObj" id="newUomCreateForm">
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="form-group mb-3">
                                <label>Name</label>
                                <input type="text" class="form-control newUomInput" name="name" required>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group mb-3">
                                <label>Sequence</label>
                                <input type="number" class="form-control newUomInput" name="sequence" min="0">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- newUomPanel.html end -->




<!-- editUomPanel.html start -->
<div class="row animated fadeInRight aasaanPanel" id="editUomPanel" style="display:none;">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5 id="editUomName"></h5>
                <div class="ibox-tools">
                    <button type="button" class="btn btn-default btn-sm close-box editCancelBtn"><i data-lucide="x"></i> Cancel </button>
                    <button type="button" class="btn btn-default btn-sm" id="deleteUomBtn"><i data-lucide="trash"></i>Delete </button>
                    <button type="button" class="btn btn-default btn-sm uomEditBtn"><i data-lucide="pencil"></i>Edit </button>
                    <button type="button" class="btn btn-secondary btn-sm uomSaveBtn"><i data-lucide="check"></i>Save </button>
                </div>
            </div>
            <div class="ibox-content">
                <form role="form" name="stObj" id="editUomForm">
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="form-group mb-3">
                                <label>Name</label>
                                <input type="text" class="form-control editUomInput" name="name" required readonly>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group mb-3">
                                <label>Sequence</label>
                                <input type="number" class="form-control editUomInput" name="sequence" min="0" readonly>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="hiddenUomId" name="uomId">
                </form>
            </div>
        </div>
    </div>
</div>
<!-- editUomPanel.html end -->
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="standard-modal" tabindex="-1" role="dialog" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this unit of measure?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-default" id="confirmDeleteUomBtn">Delete</button>
            </div>
        </div>
    </div>
</div>
<script>
lucide.createIcons();

var uomRecords = [];
var currentUomId = '';
var uomTableSelector = '#allUomPanelTable';
var isLoadingUom = false;

function showError(message) {
    if (window.JSUTIL && typeof JSUTIL.buildErrorModal === 'function') {
        JSUTIL.buildErrorModal(message);
    } else {
        alert(message);
    }
}

function getCsrfHeaders() {
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    var headers = {};
    if (token && header) {
        headers[header] = token;
    }
    return headers;
}

function requestJson(url, method, payload) {
    var options = {
        method: method || 'GET',
        headers: Object.assign({}, getCsrfHeaders())
    };
    if (payload !== undefined) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(payload);
    }
    return fetch(url, options).then(async function (response) {
        if (!response.ok) {
            var text = await response.text();
            throw new Error(text || ('HTTP ' + response.status));
        }
        var textBody = await response.text();
        if (!textBody) return null;
        try {
            return JSON.parse(textBody);
        } catch (e) {
            return textBody;
        }
    });
}

function normalizeRecord(record) {
    return {
        id: record.id || record.Id,
        name: record.name || record.Name || '',
        sequence: record.sequence != null ? record.sequence : (record.Sequence != null ? record.Sequence : '')
    };
}

/* ------------------------------------------------------------------ */
/*  Destroy existing DataTable instance by ID (keeps table element)   */
/* ------------------------------------------------------------------ */
function destroyUomTable() {
    try {
        if ($.fn.DataTable && $.fn.DataTable.isDataTable(uomTableSelector)) {
            $(uomTableSelector).DataTable().clear().destroy();
        }
    } catch (e) {
        console.warn('DataTable destroy warning:', e);
    }
    $('#allUomTable').empty();
}

function renderUomTable() {
    destroyUomTable();

    var innerHtml = '';
    uomRecords.forEach(function (rec) {
        innerHtml += '<tr>' +
            '<td><a href="javascript:void(0);" class="selectUomBtn" data-id="' + rec.id + '">' + rec.name + '</a></td>' +
            '<td>' + rec.sequence + '</td>' +
            '</tr>';
    });
    $('#allUomTable').html(innerHtml);

    if ($.fn && $.fn.DataTable) {
        $(uomTableSelector).DataTable({
            order: [],
            pageLength: 25
        });
    }
}

function setView(viewName) {
    $('#allUomPanel').hide();
    $('#newUomPanel').hide();
    $('#editUomPanel').hide();
    if (viewName === 'all') $('#allUomPanel').show();
    if (viewName === 'new') $('#newUomPanel').show();
    if (viewName === 'edit') $('#editUomPanel').show();
}

function buildFormPayload(prefixClass) {
    var name = $('.' + prefixClass + '[name="name"]').val();
    var sequence = $('.' + prefixClass + '[name="sequence"]').val();
    return {
        name: (name || '').trim(),
        sequence: sequence !== '' ? parseInt(sequence, 10) : null
    };
}

async function loadUom() {
    if (isLoadingUom) return;
    isLoadingUom = true;

    try {
        var apiResponse = await requestJson('/data/UnitOfMeasure/list', 'POST', {});
        uomRecords = (Array.isArray(apiResponse) ? apiResponse : []).map(normalizeRecord);
    } catch (apiErr) {
        console.error(apiErr);
        uomRecords = [];
    } finally {
        isLoadingUom = false;
    }

    renderUomTable();
    setView('all');
}

async function createUomData() {
    var payload = buildFormPayload('newUomInput');
    if (!payload.name) {
        showError('Name is required.');
        return;
    }

    try {
        await requestJson('/data/UnitOfMeasure/create', 'POST', payload);
    } catch (apiErr) {
        console.error(apiErr);
        showError('Unable to create unit of measure.');
        return;
    }

    $('#newUomCreateForm')[0].reset();
    await loadUom();
}

async function updateUomData() {
    if (!currentUomId) {
        showError('Unit of measure id is missing.');
        return;
    }

    var payload = buildFormPayload('editUomInput');
    if (!payload.name) {
        showError('Name is required.');
        return;
    }

    try {
        await requestJson('/data/UnitOfMeasure/update/' + currentUomId, 'POST', payload);
    } catch (apiErr) {
        console.error(apiErr);
        showError('Unable to update unit of measure.');
        return;
    }

    $('.uomEditBtn').show();
    $('.uomSaveBtn').hide();
    $('.editUomInput').prop('readonly', true).prop('disabled', true);
    await loadUom();
}

async function deleteUomData() {
    if (!currentUomId) {
        showError('Unit of measure id is missing.');
        return;
    }

    try {
        await requestJson('/data/UnitOfMeasure/delete?id=' + currentUomId, 'POST');
    } catch (apiErr) {
        console.error(apiErr);
        showError('Unable to delete unit of measure.');
        return;
    }

    currentUomId = '';
    await loadUom();
}

$(document).ready(function () {
    $('.uomSaveBtn').hide();
    setView('all');
    loadUom();

    $('.newUomBtn').on('click', function () {
        $('#newUomCreateForm')[0].reset();
        setView('new');
    });

    $('.showAllUomOnCancel').on('click', function () {
        setView('all');
    });

    $('#newUomSaveBtn').on('click', function () {
        createUomData();
    });

    $('.editCancelBtn').on('click', function () {
        $('.uomEditBtn').show();
        $('.uomSaveBtn').hide();
        $('.editUomInput').prop('readonly', true).prop('disabled', true);
        setView('all');
    });

    $('.uomEditBtn').on('click', function () {
        $('.uomEditBtn').hide();
        $('.uomSaveBtn').show();
        $('.editUomInput').prop('readonly', false).prop('disabled', false);
    });

    $('.uomSaveBtn').on('click', function () {
        updateUomData();
    });

    $('#allUomPanel').on('click', '.selectUomBtn', function () {
        var id = String($(this).data('id'));
        var match = uomRecords.find(function (item) {
            return String(item.id) === id;
        });
        if (!match) return;

        currentUomId = id;
        $('#hiddenUomId').val(id);
        $('#editUomName').text(match.name);
        $('.editUomInput[name="name"]').val(match.name);
        $('.editUomInput[name="sequence"]').val(match.sequence);

        setView('edit');
    });

    $('#deleteUomBtn').on('click', function () {
        var modal = new bootstrap.Modal(document.getElementById('standard-modal'));
        modal.show();
    });

    $('#confirmDeleteUomBtn').on('click', function () {
        var modal = bootstrap.Modal.getInstance(document.getElementById('standard-modal'));
        if (modal) modal.hide();
        deleteUomData();
    });
});
</script>
