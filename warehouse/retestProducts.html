<script src="pages/lib/jquery-3.7.1.js"></script>
<script src="pages/lib/moment.min.js"></script>
<script src="pages/lib/dataTables.js"></script>
<script src="pages/lib/lucide.min.js"></script>
<link rel="stylesheet" href="pages/lib/dataTables.dataTables.css">
<style>
    .btn .lucide { width: 17px; height: 17px; stroke-width: 4; vertical-align: middle; margin-right: 5px; padding: 2px; }
    #retestLotsTable thead th { border-bottom: 1px solid #eee !important; }
    #retestLotsTable tbody tr:last-child td { border-bottom: none !important; }

    .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
    .status-new { background: #f3f4f6; color: #6b7280; }
    .status-submitted { background: #dbeafe; color: #1e40af; }
    .status-completed { background: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
    .status-rejected { background: #fecaca; color: #991b1b; }
    .status-in-progress { background: #fef3c7; color: #92400e; }

    .expiry-urgent { color: #991b1b; font-weight: 600; }
    .expiry-warning { color: #92400e; font-weight: 600; }
    .expiry-ok { color: #6b7280; }

    .retest-select-checkbox { width: 18px; height: 18px; cursor: pointer; }
    .selection-count { font-size: 13px; color: #6b7280; margin-left: 12px; }
</style>

<div class="qa-white-panel">

    <!-- List Panel -->
    <div class="row animated fadeInRight aasaanPanel" id="retestListPanel">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Re-Test Products <small>Lots expiring within 30 days</small></h5>
                    <div class="ibox-tools">
                        <button type="button" class="btn btn-default btn-sm" id="refreshRetestBtn">
                            <i data-lucide="refresh-cw"></i>Refresh
                        </button>
                        <button type="button" class="btn btn-secondary btn-sm" id="requestRetestBtn" disabled>
                            <i data-lucide="flask-conical"></i>Request Re-Test
                        </button>
                        <span class="selection-count" id="selectionCount"></span>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="table-responsive">
                        <table id="retestLotsTable" class="table table-bordered table-hover">
                            <thead>
                            <tr>
                                <th style="width:40px;">
                                    <input type="checkbox" id="selectAllRetest" class="retest-select-checkbox" title="Select All">
                                </th>
                                <th>Material</th>
                                <th>Batch Number</th>
                                <th>ARN</th>
                                <th>Type</th>
                                <th>Expiry Date</th>
                                <th>Days Left</th>
                                <th>Retest Date</th>
                                <th>Quantity</th>
                                <th>UOM</th>
                                <th>Storage Location</th>
                                <th>Status</th>
                            </tr>
                            </thead>
                            <tbody id="retestLotsBody">
                            <tr><td colspan="12" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    if (window.lucide) lucide.createIcons();

    var _retestLots = [];
    var _selectedLotIds = {};

    function _esc(v) { if (v == null) return ''; return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function fmtDate(val) {
        if (!val) return '-';
        var d = new Date(val);
        if (isNaN(d.getTime())) return '-';
        return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
    }

    function daysUntil(dateVal) {
        if (!dateVal) return null;
        var d = new Date(dateVal);
        if (isNaN(d.getTime())) return null;
        var now = new Date();
        now.setHours(0, 0, 0, 0);
        d.setHours(0, 0, 0, 0);
        return Math.ceil((d - now) / 86400000);
    }

    function daysLeftBadge(days) {
        if (days === null) return '<span class="expiry-ok">-</span>';
        if (days < 0) return '<span class="expiry-urgent">' + days + ' (expired)</span>';
        if (days <= 7) return '<span class="expiry-urgent">' + days + ' days</span>';
        if (days <= 15) return '<span class="expiry-warning">' + days + ' days</span>';
        return '<span class="expiry-ok">' + days + ' days</span>';
    }

    function statusBadge(status) {
        var s = (status || '').toLowerCase();
        var cls = 'status-new';
        if (s === 'approved' || s === 'released') cls = 'status-completed';
        else if (s === 'under-test' || s === 'under testing' || s === 'quality inspection') cls = 'status-submitted';
        else if (s === 'rejected' || s === 'failed') cls = 'status-rejected';
        else if (s === 'quarantine' || s === 'on hold') cls = 'status-in-progress';
        return '<span class="status-badge ' + cls + '">' + _esc(status || '-') + '</span>';
    }

    function getProductDisplay(lot) {
        var p = lot.product || {};
        var code = p.number || p.Number || '';
        var name = p.name || p.Name || '';
        return [code, name].filter(Boolean).join(' | ') || '-';
    }

    function destroyDT() {
        if ($.fn.DataTable && $.fn.DataTable.isDataTable('#retestLotsTable')) {
            $('#retestLotsTable').DataTable().clear().destroy();
        }
    }

    function initDT() {
        if ($.fn.DataTable && !$.fn.DataTable.isDataTable('#retestLotsTable')) {
            $('#retestLotsTable').DataTable({
                order: [[6, 'asc']],
                pageLength: 25,
                autoWidth: false,
                columnDefs: [
                    { orderable: false, targets: 0 }
                ]
            });
        }
        if (window.lucide) lucide.createIcons();
    }

    function updateSelectionCount() {
        var count = Object.keys(_selectedLotIds).length;
        $('#selectionCount').text(count > 0 ? count + ' selected' : '');
        $('#requestRetestBtn').prop('disabled', count === 0);
    }

    function loadRetestLots() {
        destroyDT();
        $('#retestLotsBody').html('<tr><td colspan="12" class="text-center text-muted">Loading...</td></tr>');
        _selectedLotIds = {};
        updateSelectionCount();

        JSUTIL.callAJAXGet('/api/product-lots', function (res) {
            var allLots = Array.isArray(res) ? res : [];
            var now = new Date();
            now.setHours(0, 0, 0, 0);
            var thirtyDays = new Date(now.getTime() + 30 * 86400000);

            // Filter: lots with expiry or retest date within next 30 days
            _retestLots = allLots.filter(function (lot) {
                var expiryDate = lot.expiryDate ? new Date(lot.expiryDate) : null;
                var retestDate = lot.retestDate ? new Date(lot.retestDate) : null;
                var checkDate = retestDate || expiryDate;
                if (!checkDate || isNaN(checkDate.getTime())) return false;
                checkDate.setHours(0, 0, 0, 0);
                return checkDate <= thirtyDays;
            });

            // Sort by days left ascending (most urgent first)
            _retestLots.sort(function (a, b) {
                var da = daysUntil(a.retestDate || a.expiryDate) || 9999;
                var db = daysUntil(b.retestDate || b.expiryDate) || 9999;
                return da - db;
            });

            renderRetestTable();
        }, function () {
            $('#retestLotsBody').html('<tr><td colspan="12" class="text-center text-muted">Failed to load product lots.</td></tr>');
        });
    }

    function renderRetestTable() {
        destroyDT();
        var html = '';

        if (!_retestLots.length) {
            html = '<tr><td colspan="12" class="text-center text-muted">No product lots expiring within the next 30 days.</td></tr>';
            $('#retestLotsBody').html(html);
            return;
        }

        _retestLots.forEach(function (lot) {
            var lotId = lot.id || lot.Id || '';
            var p = lot.product || {};
            var days = daysUntil(lot.retestDate || lot.expiryDate);
            var checked = _selectedLotIds[String(lotId)] ? 'checked' : '';

            html += '<tr>' +
                '<td><input type="checkbox" class="retest-select-checkbox retest-lot-cb" data-lot-id="' + lotId + '" ' + checked + '></td>' +
                '<td>' + _esc(getProductDisplay(lot)) + '</td>' +
                '<td>' + _esc(lot.batchNumber || '-') + '</td>' +
                '<td>' + _esc(lot.arn || '-') + '</td>' +
                '<td>' + _esc(p.type || p.Type || '-') + '</td>' +
                '<td>' + fmtDate(lot.expiryDate) + '</td>' +
                '<td>' + daysLeftBadge(days) + '</td>' +
                '<td>' + fmtDate(lot.retestDate) + '</td>' +
                '<td>' + _esc(lot.quantity != null ? lot.quantity : '-') + '</td>' +
                '<td>' + _esc(p.uom || p.Uom || '-') + '</td>' +
                '<td>' + _esc(lot.storageLocation || '-') + '</td>' +
                '<td>' + statusBadge(lot.processStatus || lot.ProcessStatus) + '</td>' +
                '</tr>';
        });

        $('#retestLotsBody').html(html);
        initDT();
    }

    // ── Request Re-Test ────────────────────────────────────────────────
    function requestRetest() {
        var selectedIds = Object.keys(_selectedLotIds);
        if (!selectedIds.length) {
            JSUTIL.buildErrorModal('Select at least one product lot to request re-test.');
            return;
        }

        var selectedLots = _retestLots.filter(function (lot) {
            return _selectedLotIds[String(lot.id || lot.Id)];
        });

        if (!selectedLots.length) {
            JSUTIL.buildErrorModal('Selected lots not found.');
            return;
        }

        $('#requestRetestBtn').prop('disabled', true).text('Processing...');

        // Fetch existing test requests to generate sequential ARN
        JSUTIL.callAJAXGet('/api/test-requests', function (allTestReqs) {
            allTestReqs = allTestReqs || [];

            var now = new Date();
            var currentYear = now.getFullYear();
            var currentMonth = String(now.getMonth() + 1).padStart(2, '0');
            var arnPrefix = 'ARN/' + currentYear + '/' + currentMonth + '/';

            // Find highest existing sequence for this month
            var maxSeq = 0;
            allTestReqs.forEach(function (tr) {
                var ref = tr.referenceNumber || tr.ReferenceNumber || '';
                if (ref.indexOf(arnPrefix) === 0) {
                    var seqPart = parseInt(ref.substring(arnPrefix.length), 10);
                    if (!isNaN(seqPart) && seqPart > maxSeq) {
                        maxSeq = seqPart;
                    }
                }
            });

            // Build TestRequest objects
            var testRequestsToCreate = [];
            selectedLots.forEach(function (lot, index) {
                var p = lot.product || {};
                var nextSeq = maxSeq + index + 1;
                var referenceNumber = arnPrefix + String(nextSeq).padStart(5, '0');

                testRequestsToCreate.push({
                    referenceNumber: referenceNumber,
                    batchNumber: lot.batchNumber || '',
                    description: 'Re-Test',
                    manufacturingDate: lot.manufacturingDate || null,
                    expiryDate: lot.expiryDate || null,
                    receivedDate: now.toISOString(),
                    requestStatus: 'New',
                    sampleCondition: p.name || p.Name || '',
                    sampleId: p.number || p.Number || '',
                    sampleType: p.type || p.Type || '',
                    sampleUnit: p.uom || p.Uom || '',
                    productLot: { id: lot.id || lot.Id }
                });
            });

            // Create sequentially, then update lot statuses, then update product quantities
            var created = 0;
            function createNext(idx) {
                if (idx >= testRequestsToCreate.length) {
                    // Step 2: Update lot statuses to "Under Re-Test"
                    updateLotStatuses(selectedLots, function () {
                        // Step 3: Deduct from quantityOnHand, add to quantityUnderRetest
                        updateProductRetestQuantities(selectedLots, function () {
                            JSUTIL.buildErrorModal(created + ' re-test request(s) created successfully.');
                            resetAfterRetest();
                        });
                    });
                    return;
                }
                JSUTIL.callAJAXPost('/api/test-requests', JSON.stringify(testRequestsToCreate[idx]), function () {
                    created++;
                    createNext(idx + 1);
                }, function (err) {
                    console.error('Failed to create test request for lot', testRequestsToCreate[idx].batchNumber, err);
                    createNext(idx + 1);
                });
            }
            createNext(0);

        }, function () {
            JSUTIL.buildErrorModal('Failed to load existing test requests.');
            $('#requestRetestBtn').prop('disabled', false).html('<i data-lucide="flask-conical"></i>Request Re-Test');
            if (window.lucide) lucide.createIcons();
        });
    }

    // ── Update lot statuses to "Under Re-Test" ────────────────────────
    function updateLotStatuses(lots, onComplete) {
        var queue = lots.slice();
        function updateNextLot() {
            if (!queue.length) {
                if (typeof onComplete === 'function') onComplete();
                return;
            }
            var lot = queue.shift();
            var lotId = lot.id || lot.Id;
            JSUTIL.callAJAXPut('/api/product-lots/' + lotId,
                JSON.stringify({ processStatus: 'Under Re-Test' }),
                function () { updateNextLot(); },
                function (err) {
                    console.error('Failed to update lot status', lotId, err);
                    updateNextLot();
                }
            );
        }
        updateNextLot();
    }

    // ── Update product quantities (deduct quantityOnHand, add quantityUnderRetest) ──
    function updateProductRetestQuantities(lots, onComplete) {
        // Aggregate quantities by product ID
        var productQtyMap = {};
        lots.forEach(function (lot) {
            var p = lot.product || {};
            var pid = String(p.id || p.Id || '');
            if (!pid) return;
            var qty = Number(lot.quantity || 0);
            if (qty <= 0) return;
            if (!productQtyMap[pid]) productQtyMap[pid] = 0;
            productQtyMap[pid] += qty;
        });

        var productIds = Object.keys(productQtyMap);
        if (!productIds.length) {
            if (typeof onComplete === 'function') onComplete();
            return;
        }

        var pending = productIds.length;
        function tryFinish() {
            pending--;
            if (pending <= 0 && typeof onComplete === 'function') onComplete();
        }

        productIds.forEach(function (pid) {
            JSUTIL.callAJAXGet('/api/products/' + encodeURIComponent(pid), function (prod) {
                var retestQty = productQtyMap[pid];
                var currentOnHand = Number(prod.quantityOnHand || prod.QuantityOnHand || 0);
                var currentUnderRetest = Number(prod.quantityUnderRetest || prod.QuantityUnderRetest || 0);

                var updatedOnHand = Math.max(currentOnHand - retestQty, 0);
                var updatedUnderRetest = currentUnderRetest + retestQty;

                JSUTIL.callAJAXPut('/api/products/' + pid,
                    JSON.stringify({
                        quantityOnHand: updatedOnHand,
                        quantityUnderRetest: updatedUnderRetest
                    }),
                    function () { tryFinish(); },
                    function (err) {
                        console.error('Failed to update product quantities', pid, err);
                        tryFinish();
                    }
                );
            }, function (err) {
                console.error('Failed to fetch product', pid, err);
                tryFinish();
            });
        });
    }

    // ── Reset UI after retest ──────────────────────────────────────────
    function resetAfterRetest() {
        _selectedLotIds = {};
        updateSelectionCount();
        $('#selectAllRetest').prop('checked', false);
        $('#requestRetestBtn').prop('disabled', false).html('<i data-lucide="flask-conical"></i>Request Re-Test');
        if (window.lucide) lucide.createIcons();
        loadRetestLots();
    }

    // ── Events ─────────────────────────────────────────────────────────
    $(document).ready(function () {
        loadRetestLots();

        $('#refreshRetestBtn').on('click', loadRetestLots);
        $('#requestRetestBtn').on('click', requestRetest);

        // Individual checkbox
        $(document).on('change', '.retest-lot-cb', function () {
            var lotId = String($(this).data('lot-id'));
            if ($(this).is(':checked')) {
                _selectedLotIds[lotId] = true;
            } else {
                delete _selectedLotIds[lotId];
            }
            updateSelectionCount();
            // Sync select-all checkbox
            var total = $('.retest-lot-cb').length;
            var checked = $('.retest-lot-cb:checked').length;
            $('#selectAllRetest').prop('checked', total > 0 && checked === total);
        });

        // Select all
        $('#selectAllRetest').on('change', function () {
            var isChecked = $(this).is(':checked');
            $('.retest-lot-cb').each(function () {
                $(this).prop('checked', isChecked);
                var lotId = String($(this).data('lot-id'));
                if (isChecked) {
                    _selectedLotIds[lotId] = true;
                } else {
                    delete _selectedLotIds[lotId];
                }
            });
            updateSelectionCount();
        });
    });
</script>
