var recordList = [];
function loadQuestionGroups() {
    JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/question-groups'), function (response) {
        recordList = Array.isArray(response) ? response : [];
        renderQuestionGroupTable(recordList);
    }, function () {
        recordList = [];
        renderQuestionGroupTable([]);
    });
}
function renderQuestionGroupTable(list) {
    var innerHtml = '';
    $.each(list, function (i, val) {
        innerHtml += '<tr>' +
            '<td class="itemNum"><a href="javascript:void(0);" class="selectQuestionGroupBtn" id="' + val.id + '">' + (val.name || '') + '</a></td>' +
            '<td>' + (val.version || '') + '</td>' +
            '<td>' + (val.sequence || '') + '</td>' +
            '</tr>';
    });
    $('#allQuestionGroupDataTable').empty().append(innerHtml);
    new DataTable('#allQuestionGroupTable');
}
$(document).ready(function () {
    $('#allQuestionGrouPanel').show();
    loadQuestionGroups();
});

        $('#editEngagementProcedurePanel').hide();
    });
});

function createQuestionGroupWithDefaults(groupPayload) {
    var postUrl = JSUTIL.getUrl('/api/question-groups');
    JSUTIL.callAJAXPost(postUrl, JSON.stringify(groupPayload), function (response) {
        handleQuestionGroupCreated(response, groupPayload);
    }, function () {
        notifyQuestionGroup('error', 'Unable to create question group. Please try again.');
    });
}

function handleQuestionGroupCreated(response, requestPayload) {
    var createdGroup = normalizeQuestionGroupResponse(response, requestPayload);
    if (!createdGroup.id) {
        notifyQuestionGroup('error', 'Question group created but no identifier returned. Reloading to refresh data.');
        location.reload();
        return;
    }

    notifyQuestionGroup('info', 'Adding default checklist questions...');
    createDefaultQuestionsForGroup(createdGroup, function (wasSuccessful) {
        if (!wasSuccessful) {
            notifyQuestionGroup('warning', 'Default questions could not be added automatically. Please review them in the editor.');
        } else {
            notifyQuestionGroup('success', 'Question group and default questions created.');
        }
        openQuestionGroupEditor(createdGroup);
    });
}

function createDefaultQuestionsForGroup(group, done) {
    var defaults = getQaDefaultQuestions();
    if (!defaults.length) {
        done(false);
        return;
    }
    var questions = defaults.map(function (item, index) {
        return buildQuestionPayload(item, index, group.id);
    });
    var promises = questions.map(function (q) {
        return $.ajax({
            url: JSUTIL.getUrl('/api/questions'),
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(q)
        });
    });
    $.when.apply($, promises).then(function () {
        done(true);
    }, function () {
        done(false);
    });
}

function openQuestionGroupEditor(group) {
    if (Array.isArray(window.recordList)) {
        var alreadyAdded = window.recordList.some(function (item) {
            return String(item.id) === String(group.id);
        });
        if (!alreadyAdded) {
            window.recordList.push(group);
        }
    }

    if (typeof populateQuestionGroupDetail === 'function') {
        questionGroupId = group.id;
        populateQuestionGroupDetail(group);
        $('#editQuestionGroupPanel').show();
        $('#newQuestionGroupPanel').hide();
        $('#allQuestionGrouPanel').hide();
    } else {
        location.reload();
    }
}

function normalizeQuestionGroupResponse(response, fallbackPayload) {
    var group = response && response.data ? response.data : (response || {});
    var fallback = fallbackPayload || {};
    return {
        id: group.id || group.Id,
        name: group.name || group.Name || fallback.name || '',
        sequence: group.sequence || group.Sequence || fallback.sequence || '',
        version: group.version || group.Version || fallback.version || ''
    };
}

function buildQuestionPayload(questionTemplate, index, groupId) {
    return {
        id: questionTemplate.id || null,
        body: questionTemplate.body,
        options: questionTemplate.options || '',
        type: questionTemplate.type || 'Text',
        sequence: questionTemplate.sequence || (index + 1),
        required: !!questionTemplate.required,
        enableComment: questionTemplate.enableComment !== false,
        group: { id: groupId },
        helpText: questionTemplate.helpText || '',
        status: questionTemplate.status || '',
        category: questionTemplate.category || '',
        name: '' // leave empty so remark starts blank
    };
}

        var promises = deleteIds.map(function (id) {

                url: JSUTIL.getUrl('/api/questions/' + id),
                method: 'DELETE'
            });
        });
        $.when.apply($, promises).then(
            callbackAfterDeleteEngagementDetails,
            callbackAfterDeleteEngagementDetails
        );
    });
    $('.editEngagementProcedureBtn').on('click', function(){
        currentEnagagementId = $(this).attr('name');
        $.each(response, function (i, val) {
            if(Number(currentEnagagementId) === val.id) {
                $('.editEngagementProcedureInput[name="body"]').val(val.body);
                $('.editEngagementProcedureInput[name="options"]').val(val.options);
                $('.editEngagementProcedureInput[name="type"]').val(val.type);
                $('.editEngagementProcedureInput[name="sequence"]').val(val.sequence);
                $('.editEngagementProcedureInput[name="required"]').prop('checked',val.required);
                $('.editEngagementProcedureInput[name="enableComment"]').prop('checked',val.enableComment);
                //$('#editEngagementProcedureId').val(val.id);
            }
        });
        $('#editEngagementProcedurePanel').show();
        $('#editQuestionGroupPanel').hide();
    });
}

     location.reload();

function buildFormDataJSON(className) {
    let jsonPayload = {};
    $('.' + className).each(function () {
        let attrName = $(this).attr('name');
        let attrValue = $(this).val();
        console.log(attrValue);
        if(attrValue) {
            if ($(this).hasClass('datepicker') || $(this).hasClass('datepickerCompliance') || $(this).hasClass('datepickerCompliance2')) {
                attrValue = JSUTIL.toDatabaseDate(attrValue);
                jsonPayload[attrName] = attrValue;
            } else if ($(this).hasClass('datetimepicker')) {
                attrValue = JSUTIL.getDatabaseDateTime(attrValue);
                jsonPayload[attrName] = attrValue;

            } else if ($(this).attr('type') && $(this).attr('type') === 'checkbox') {
                attrValue = $(this).prop('checked');  
                jsonPayload[attrName] = attrValue;
            }  else if ($(this).attr('type') && $(this).attr('type') === 'number') {
                attrValue = Number(attrValue);
                jsonPayload[attrName] = attrValue;
            } else if ($(this).attr('name') && $(this).attr('name').indexOf('.') >= 0) {
                console.log()
                let splitArray = $(this).attr('name').split('.');
                jsonPayload[splitArray[0]] = {};
                jsonPayload[splitArray[0]][splitArray[1]] = Number(attrValue);
            } else {    
                console.log(attrName);
                if (attrName === 'id'){
                    attrValue = Number(attrValue);
                jsonPayload[attrName] = attrValue;
                }
                jsonPayload[attrName] = attrValue;
            }
        }
        else if(!attrValue){
            if ($(this).attr('type') && $(this).attr('type') === 'checkbox') {
                attrValue = $(this).prop('checked');  
                jsonPayload[attrName] = attrValue;
            }  
        }
    });
    console.info(jsonPayload);
    return jsonPayload;
}
