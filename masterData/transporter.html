<!-- Add Transporter Panel -->

    </div>
    <div class="panel-body">
        <div class="form-group">
            <label for="addTransporterName">Transporter Name</label>
            <input type="text" id="addTransporterName" class="form-control" placeholder="Enter transporter name" required>

        </div>
    </div>
</div>

<!-- Edit Transporter Panel -->
<div class="row animated fadeInRight aasaanPanel" id="EditTransporter" style="display: none;">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>Edit <small>Transporter</small></h5>
                <div class="ibox-tools">
                    <button type="button" class="btn btn-default btn-sm close-box cancelEditTransporterBtn">
                        <i data-lucide="x"></i> Cancel
                    </button>

                        <i data-lucide="trash"></i> Delete

                </div>
            </div>
            <div class="ibox-content">
                <input type="hidden" id="editTransporterId">
                <div class="form-group">
                    <label for="editTransporterName">Transporter Name</label>

</div>

<!-- Delete Transporter Modal -->
<div class="modal fade" id="deleteTransporterModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this transporter?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-default" id="confirmDeleteTransporterBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- allTransporterPanel.html   End -->

</div>




<script>
    // allTransportPanel.js    Start
lucide.createIcons();
    // Transporter listing + create/edit (Account objects with Type = 'Transporter')
(function () {
    var $listPanel = $('#allTransporterPanel');
    var $addPanel = $('#AddTransporter');
    var $editPanel = $('#EditTransporter');
    var $tableBody = $('#allTransporterTable tbody');
    var recordList = [];
    var transporterTable = null;

    function getName(acc) {
        return acc ? (acc.name || acc.Name || '') : '';
    }
    function getNumber(acc) {
        return acc ? (acc.number || acc.Number || '') : '';
    }
    function isTransporter(acc) {
        var t = (acc && (acc.type || acc.Type || '') || '').toLowerCase();
        return t === 'transporter';
    }

    function showList() {
        $addPanel.hide();
        $editPanel.hide();
        $listPanel.show();
    }

    function populateTable(list) {
        $tableBody.empty();
        if (!Array.isArray(list) || list.length === 0) {
            $tableBody.append('<tr><td colspan="2" class="text-center">No transporters found</td></tr>');
            return;
        }

        list
            .filter(function (rec) { return !rec.type && !rec.Type ? true : isTransporter(rec); })
            .forEach(function (rec) {
                var rowHtml = '<tr>' +
                    '<td><a href="javascript:void(0);" class="selectTransporterBtn" data-id="' + rec.id + '">' + (getName(rec) || '(No Name)') + '</a></td>' +
                    // '<td>' + (getNumber(rec) || '') + '</td>' +
                    '</tr>';
                $tableBody.append(rowHtml);
            });

    }

    function openEdit(rec) {
        if (!rec) return;
        $('#editTransporterId').val(rec.id);
        $('#editTransporterName').val(getName(rec));
        $listPanel.hide();
        $addPanel.hide();
        $editPanel.show();
    }

    function resetAddForm() {
        $('#addTransporterName').val('');
    }

    function initTransporterTable() {
        if (transporterTable) {
            transporterTable.destroy();
        }
        transporterTable = new DataTable('#allTransporterTable');
    }

    function loadTransporters() {
        var payload = {
            fields: 'Name',
            conditions: ["Type = 'Transporter'"],
            logic: '{0}'
        };
        var url = JSUTIL.getUrl ? JSUTIL.getUrl('/api/account/list') : '/api/account/list';
        JSUTIL.callAJAXPost(url, JSON.stringify(payload), function (response) {
            recordList = Array.isArray(response) ? response : [];
            populateTable(recordList);
            initTransporterTable();
        }, function (err) {
            console.error(err);
            recordList = [];
            populateTable(recordList);
        });
    }

    $(document).ready(function () {
        loadTransporters();

        // New buttons (support both newCompanyBtn and newCompanyBtn from JSON config)
        $(document).on('click', '.newCompanyBtn', function () {
            resetAddForm();
            $listPanel.hide();
            $editPanel.hide();
            $addPanel.show();
        });

        $('.cancelAddTransporterBtn').on('click', function () {
            showList();
        });

        $('.cancelEditTransporterBtn').on('click', function () {
            showList();
        });

        // Row click -> edit
        $(document).on('click', '.selectTransporterBtn', function () {
            var id = $(this).data('id');
            if (!id) return;
            var rec = recordList.find(function (r) { return r.id == id; });
            openEdit(rec);
        });

        // Save new
        $('.addTransporterSaveBtn').on('click', function () {
            var name = ($('#addTransporterName').val() || '').trim();
            if (!name) {
                JSUTIL.buildErrorModal('Please enter transporter name');
                return;
            }
            var payload = {
                name: name,
                type: 'Transporter'
            };
            var url = JSUTIL.getUrl ? JSUTIL.getUrl('/api/account') : '/api/account';
            JSUTIL.callAJAXPost(url, JSON.stringify(payload), function () {
                location.reload();
            }, function (err) {
                console.error(err);
                JSUTIL.buildErrorModal('Failed to create transporter');
            });
        });

        // Save edit
        $('.editTransporterSaveBtn').on('click', function () {
            var id = $('#editTransporterId').val();
            var name = ($('#editTransporterName').val() || '').trim();
            if (!id || !name) {
                JSUTIL.buildErrorModal('Please enter transporter name');
                return;
            }
            var payload = { name: name }; // keep type unchanged
            var url = JSUTIL.getUrl ? JSUTIL.getUrl('/api/account/' + id) : '/api/account/' + id;
            JSUTIL.callAJAXPut(url, JSON.stringify(payload), function () {
                location.reload();
            }, function (err) {
                console.error(err);
                JSUTIL.buildErrorModal('Failed to update transporter');
            });
        });

        // Delete
        $('.deleteTransporterBtn').on('click', function () {
            var id = $('#editTransporterId').val();
            if (!id) {
                JSUTIL.buildErrorModal('No transporter selected');
                return;
            }
            var modal = new bootstrap.Modal(document.getElementById('deleteTransporterModal'));
            modal.show();
        });

        $('#confirmDeleteTransporterBtn').on('click', function () {
            var id = $('#editTransporterId').val();
            if (!id) {
                JSUTIL.buildErrorModal('No transporter selected');
                return;
            }
            var url = JSUTIL.getUrl ? JSUTIL.getUrl('/api/account/' + id) : '/api/account/' + id;
            var onSuccess = function () {
                var modal = bootstrap.Modal.getInstance(document.getElementById('deleteTransporterModal'));
                if (modal) modal.hide();
                location.reload();
            };
            var onError = function (err) {
                console.error(err);
                JSUTIL.buildErrorModal('Failed to delete transporter');
            };
            if (JSUTIL && typeof JSUTIL.callAJAXDelete === 'function') {
                JSUTIL.callAJAXDelete(url, onSuccess, onError);
                return;
            }
            $.ajax({
                url: url,
                type: 'DELETE',
                success: onSuccess,
                error: onError
            });
        });
    });
})();



    // allTransportPanel.js    End
</script>
