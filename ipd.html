<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IPD</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Remixicon -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    /* Keep existing JS toggle helpers */
    .hidden { display: none !important; }

    /* Page / card helpers */
    .card-round { border-radius: .75rem; }
    .card-deep { box-shadow: 0 18px 28px -18px rgba(0,0,0,0.25); }

    /* Modal overlay + blur */
    .modal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(12, 18, 24, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1050;
      padding: 24px;
      animation: overlayFade .15s ease;
    }
    @keyframes overlayFade {
      from { opacity: 0; transform: scale(.997); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Modal card */
    .modal-card {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(28, 43, 60, 0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
      animation: cardUp .18s cubic-bezier(.2,.9,.3,1);
    }
    @keyframes cardUp {
      from { transform: translateY(6px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Modal header/body layout */
    .modal-card .modal-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 18px 20px;
      border-bottom: 1px solid #eef2f6;
    }
    .modal-card .modal-body {
      padding: 18px 20px;
      overflow-y: auto;
    }
    .modal-card .modal-foot {
      padding: 12px 20px;
      border-top: 1px solid #f1f3f5;
      display:flex;
      justify-content:flex-end;
      gap:8px;
      background:#fff;
    }

    /* Close button */
    .modal-close-btn {
      width:34px;
      height:34px;
      border-radius:6px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#f4f6f9;
      border:none;
      color:#4b5563;
      cursor:pointer;
      box-shadow: none;
    }
    .modal-close-btn:hover { background:#eef2f6; color:#111827; }

    /* IPD Table Styling - Match Design */
    .ipd-table-container {
      background: #fff;
      border-radius: .75rem;
      box-shadow: 0 18px 28px -18px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .ipd-table {
      margin-bottom: 0;
    }

    .ipd-table thead {
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
    }

    .ipd-table thead th {
      padding: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
      border: none;
      background: #f9fafb;
    }

    .ipd-table tbody tr {
      border-bottom: 1px solid #f3f4f6;
      transition: background-color 0.2s ease;
    }

    .ipd-table tbody tr:hover {
      background-color: #f9fafb;
    }

    .ipd-table tbody td {
      padding: 0.2 rem;
      color: #374151;
      font-size: 0.95rem;
      border: none;
      vertical-align: middle;
    }

    /* Action buttons styling */
    .action-btn-group {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-start;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 0.35rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .action-btn-edit {
      background: #dbeafe;
      color: #0284c7;
    }
    .action-btn-edit:hover {
      background: #bfdbfe;
      color: #0369a1;
    }

    .action-btn-view {
      background: #dbeafe;
      color: #0284c7;
    }
    .action-btn-view:hover {
      background: #bfdbfe;
      color: #0369a1;
    }

    .action-btn-delete {
      background: #fee2e2;
      color: #dc2626;
    }
    .action-btn-delete:hover {
      background: #fecaca;
      color: #b91c1c;
    }

    /* Responsive table */
    @media (max-width: 768px) {
      .ipd-table thead {
        display: none;
      }
      
      .ipd-table tbody tr {
        display: block;
        margin-bottom: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
      }
      
      .ipd-table tbody td {
        display: block;
        text-align: right;
        padding: 0.75rem 1rem;
        position: relative;
        padding-left: 50%;
      }
      
      .ipd-table tbody td:before {
        content: attr(data-label);
        position: absolute;
        left: 1rem;
        text-align: left;
        font-weight: 600;
        color: #6b7280;
        font-size: 0.875rem;
      }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #9ca3af;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    @media (max-width: 576px) {
      .modal-card { max-width: 92%; }
      .modal-card .modal-head, .modal-card .modal-body, .modal-card .modal-foot { 
        padding-left: 14px; 
        padding-right: 14px; 
      }
    }
  </style>
</head>
<body class="bg-light">

  <div class="container-fluid p-0">
    <!-- Admit Patient card -->
    <div class="card card-round card-deep mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Admit Patient</h2>

        <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center gap-3">
          <div class="d-flex gap-2 flex-wrap">
            <button type="button" class="btn btn-primary d-flex align-items-center gap-2" onclick="admitNewPatient()">
              <span class="bg-white text-primary rounded d-inline-flex align-items-center justify-content-center" style="width:28px;height:28px">
                <i class="ri-user-add-fill"></i>
              </span>
              Admit New Patient
            </button>

            <button type="button" class="btn btn-dark d-flex align-items-center gap-2" onclick="admitExistingPatient()">
              <span class="bg-white text-dark rounded d-inline-flex align-items-center justify-content-center" style="width:28px;height:28px">
                <i class="ri-user-search-fill"></i>
              </span>
              Admit Existing Patient
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Current Patients Section -->
    <div class="ipd-table-container">
      <div style="padding: 1.5rem;">
        <!-- <h2 class="h5 mb-3">Manage Patient Queue</h2> -->

        <div class="table-responsive">
          <table class="table ipd-table">
          <thead>
          <tr>
            <th>IPD ID</th>
            <th>Patient ID</th>
            <th>Patient Name</th>
            <th>Mobile</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Ward / Bed</th>
            <th>Admit Date</th>
            <th>Relative Name</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

            <tbody id="ipdPatientsTableBody">
              <!-- Dynamic content will be injected here -->
            </tbody>
          </table>

          <!-- Empty state -->
          <div id="emptyState" class="empty-state hidden">
            <div class="empty-state-icon">
              <i class="ri-inbox-line"></i>
            </div>
            <p class="mb-0">No IPD patients currently admitted</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- NEW: Modal for New Patient -->
  <div id="newPatientModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div class="fw-semibold">Admit New Patient</div>
        <button class="modal-close-btn" aria-label="Close" onclick="closeModal('newPatientModal')"><i class="ri-close-line"></i></button>
      </div>

      <div class="modal-body">
        <form id="newPatientForm">
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Patient Name</label>
              <input type="text" id="patientName" required class="form-control" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Age</label>
              <input type="number" id="patientAge" required class="form-control" />
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Weight (kg)</label>
              <input type="number" id="patientWeight" class="form-control" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Gender</label>
              <select id="patientGender" required class="form-select">
                <option value="">Select</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Phone</label>
              <input type="tel" id="patientPhone" required class="form-control" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Address</label>
              <textarea rows="2" id="patientAddress" class="form-control"></textarea>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Complaints</label>
            <div class="d-flex gap-3 flex-wrap">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="complain" value="Ear" id="cEar">
                <label class="form-check-label" for="cEar">Ear</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="complain" value="Nose" id="cNose">
                <label class="form-check-label" for="cNose">Nose</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="complain" value="Throat" id="cThroat">
                <label class="form-check-label" for="cThroat">Throat</label>
              </div>
            </div>
          </div>

          <h6 class="fw-semibold mb-2">IPD Information</h6>
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label for="ward" class="form-label">Room</label>
              <select id="ward" required class="form-select">
                <option value="">Select Room</option>
                <option value="Room 1">Room 1</option>
                <option value="Room 2">Room 2</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label for="admitReason" class="form-label">Reason for Admission</label>
            <input type="text" id="admitReason" required class="form-control" />
          </div>

          <h6 class="fw-semibold mb-2">Relative / Contact</h6>
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Relative Name</label>
              <input type="text" id="relativeName" class="form-control" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Relation</label>
              <input type="text" id="relativeRelation" class="form-control" />
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Relative Contact</label>
              <input type="tel" id="relativePhone" class="form-control" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Relative Address</label>
              <input type="text" id="relativeAddress" class="form-control" />
            </div>
          </div>
        </form>
      </div>

      <div class="modal-foot">
        <button type="button" class="btn btn-secondary" onclick="closeModal('newPatientModal')">Cancel</button>
        <button type="button" class="btn btn-outline-primary" onclick="resetPatientForm()">Clear</button>
        <button type="button" class="btn btn-success" onclick="admitPatient()">Admit Patient</button>
      </div>
    </div>
  </div>

  <!-- Existing patient modal -->
  <div id="existingPatientModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div class="fw-semibold">Find Existing Patient</div>
        <button class="modal-close-btn" aria-label="Close" onclick="closeExistingModal()"><i class="ri-close-line"></i></button>
      </div>

      <div class="modal-body">
        <div class="d-flex gap-2 mb-3">
          <input id="existingSearchInput" type="search" placeholder="Search by name, phone or patient id" class="form-control" oninput="searchExistingPatients()" />
          <button type="button" class="btn btn-outline-secondary" onclick="searchExistingPatients()">Search</button>
        </div>

        <div class="row g-3">
          <div class="col-12">
            <div id="existingResults" class="list-group list-group-flush" style="max-height:220px; overflow:auto;"></div>
            <div id="existingNoResults" class="text-muted small mt-2 hidden">No patients found.</div>
          </div>

          <div class="col-12">
            <div id="existingPatientDetail" class="border rounded p-3 hidden">
              <h6 id="ep-name" class="mb-1"></h6>
              <div id="ep-meta" class="small text-muted mb-2"></div>
              <div id="ep-address" class="small mb-3"></div>

              <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary" onclick="admitSelectedExistingPatient()">Admit Patient</button>
                <button type="button" class="btn btn-outline-secondary" onclick="clearExistingSelection()">Clear</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-foot">
        <button type="button" class="btn btn-secondary" onclick="closeExistingModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/constants.js"></script>
  <script src="../assets/js/ipd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
