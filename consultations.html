<!-- consultations.html -->
<div class="page-content" id="consultations-page">
  <div class="search-bar">
    <div class="search-container">
      <input type="text" placeholder="Search..." id="consultationSearch" oninput="searchConsultations()" />
    </div>
    <button class="btn btn-secondary" onclick="openNewConsultationModal()">
      + Consultation
    </button>
  </div>

  <div class="flex-col items-center justify-center gap-4">
    <div class="card">
      <div class="card-header">
        <h3 class="card-header-title">Manage Patient Queue</h3>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Patient Name</th>
              <th>Mobile</th>
              <th>Weight</th>
              <th>Gender</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="consultationsManagePatientsQueue">
            <!-- Dynamic content -->
          </tbody>
        </table>
      </div>
    </div>

    <div class="card mt-2">
      <div class="card-header">
        <h3 class="card-header-title">Today's Consultations</h3>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th>Invoice ID</th>
              <th>Patient Name</th>
              <th>Mobile</th>
              <th>Age</th>
              <th>Gender</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="consultationsTodaysInvoice">
            <!-- Dynamic content -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<link rel="stylesheet" href="assets/css/consultations.css" />
