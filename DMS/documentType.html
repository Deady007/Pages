<script>
    var recordList = [];

    function loadDocumentTypeRecords() {
        // var request = { fields: 'Id;Name;RevisionPeriod;Active' };
        JSUTIL.callAJAXPost(JSUTIL.getUrl('/data/QualityDocumentType/list'), function (response) {
            recordList = Array.isArray(response) ? response : [];
            window.recordList = recordList;
            buildDocumentTypeTable(recordList);
            JSUTIL.reinitializeDataTable();
        }, function () {
            recordList = [];
            window.recordList = [];
            buildDocumentTypeTable(recordList);
            JSUTIL.reinitializeDataTable();
        });
    }

    function buildDocumentTypeTable(categories) {
        $('#allPricebookTable').empty();

        if (categories.length === 0) {
            $('#allPricebookTable').append('<tr><td colspan="3" class="text-center text-muted">No Document Types found.</td></tr>');
        } else {
            $.each(categories, function (i, val) {
                var innerHtml = '<tr>' +
                    '<td class="itemNum" style="font-weight:600"><a href="javascript:void(0);" class="selectRecordBtn" id="' + (val.id || '') + '"><img src="https://raw.githubusercontent.com/dev22419/image/refs/heads/main/blue-folder.png?raw=true" style="width: auto; height: 30px;margin-bottom:2px">' + (val.name || '') + '</a></td>' +
                    '<td>' + (val.revisionPeriod || '') + '</td>' +
                    '<td>' + (val.active || '') + '</td>' +
                    '</tr>';
                $('#allPricebookTable').append(innerHtml);
            });
        }
    }

    $(document).ready(function () {
        $('.newRecordBtn').on('click', function () {
            $('#newRecordPanel').show();
            $('#DocumentTypePage').hide();
        });
        loadDocumentTypeRecords();
    });
</script>
<!-- allDocumentType.js end -->

<script>
    var currentRecordId = '';
    var currentContactId = '';
    var elementToDelete = '';
    var fileId;
    var multipartFile = '';
    var userDefineSuccessCallBack = '';
    var currentFolderPath = '';

    function foActionUploadFile(panelTitle, actionUrl, successCallBack) {
        $('#uploadFileTitle').html(panelTitle);
        $('#fileFormAction').attr('action', actionUrl);
        userDefineSuccessCallBack = successCallBack;
    }
    document.addEventListener("DOMContentLoaded", function () {
        $('#fileInputAction').on('change', function (e) {
            $('#fileNameTextAction').text(e.target.files[0].name);
            multipartFile = e.target.files[0];
        });
        $(document).on('click', '#processBtn', function () {
            $('#loadingError').hide();
            $('#importResults').hide();
            $('#insertedTable').empty();
            var formData = new FormData();
            formData.append('file', multipartFile);
            formData.append('folder', currentFolderPath);
            var callback = userDefineSuccessCallBack || defaultSuccessCallback;
            JSUTIL.callAJAXFilePost(JSUTIL.getUrl('/api/files/upload'), formData, callback, null);
        });
    });
    function defaultSuccessCallback(response) {
        console.log(response);
        var parsedResponse = typeof response === 'string' ? JSON.parse(response) : response;
        var uploadedFile = Array.isArray(parsedResponse) ? parsedResponse[0] : parsedResponse;
        var editDocumentPayload = {};
        editDocumentPayload.extFileId = uploadedFile.id;
        var postUrl = ('/data/QualityDocumentTemplate/update/' + fileId);
        console.log(editDocumentPayload);
        JSUTIL.callAJAXPost(postUrl, JSON.stringify(editDocumentPayload), callbackSuccessAfterUpdate);
    }
    function callbackSuccessAfterUpdate(response) {
        console.log(response);
        location.reload();
    }
    $(document).ready(function () {
        $('#DocumentTypePage tbody').on('click', '.selectRecordBtn', function () {
            $('.pricebookSaveAndUpdateBtn').hide();
            currentRecordId = $(this).attr('id');
            $.each(recordList, function (j, val2) {
                if (currentRecordId.indexOf(val2.id) >= 0) {
                    console.log(val2);
                    currentFolderPath = val2.extFolderId || val2.name || '';
                    $('.editRecordInput[name="active"]').val(val2.active);
                    $('.editRecordInput[name="active"]').parent().find('.select2-selection__rendered').text(val2.active);
                }
            });
            $('#createItem').val(currentRecordId);
            $('#hiddenRecordId').val(currentRecordId);
            $('#editRecordPanel').show();
            $('#DocumentTypePage').hide();
            const criticalParameter = {
                fields: "Name;Number;Requester.Id;ProcessStatus;ExtFileId;Department;RequestDate;ApprovalDate;Reviewer.Id;Status;IsActive",
                conditions: [`DocumentType.Id = ${currentRecordId}`],
                logic: "{0}"
            };
            var ansUrl = JSUTIL.getUrl('/data/QualityDocumentTemplate/list');
            JSUTIL.callAJAXPost(ansUrl, JSON.stringify(criticalParameter), callbackAfterGetCritical);
        });
        $('.pricebookSaveAndUpdateBtn').on('click', function () {
            let updatePricebook = JSUTIL.buildFormDataJSON('editRecordInput')
            updateNewPricebook(updatePricebook);
        });
        $('.recordEditBtn').on('click', function () {
            $('.pricebookSaveAndUpdateBtn').show();
        });
        $('#addCriticalBtn').on('click', function () {
            $('#newContactPanel').show();
            $('#editRecordPanel').hide();
            const departmentParameter = {
                fields: "StartDate;Name",
                conditions: [],
                logic: ""
            };
            var ansUrl = JSUTIL.getUrl('/data/Department/list');
            JSUTIL.callAJAXPost(ansUrl, JSON.stringify(departmentParameter), callbackAfterGetDepartment);
        });
        $('.newContactCloseBtn').on('click', function () {
            $('#newContactPanel').hide();
            $('#editRecordPanel').show();
            $('.recordEditBtn').show();
        });
        $('.editRecordCancelBtn').on('click', function () {
            $('.pricebookSaveAndUpdateBtn').hide();
            $('.recordEditBtn').show();
            $('.editRecordInput').prop('disabled', true);
            $('.editRecordInput').prop('readonly', true);
            $('#editRecordPanel').hide();
            $('#DocumentTypePage').show();
        });
        $('#deleteRecipeBtn').on('click', function () {
            MODALUTIL.deleteConfirmModal(deleteCustomerCallback);
        });
        $(document).on('click', '.uploadDocBtn', function () {
            console.log('hi')
            fileId = $(this).attr('id');
            $('#uploadModel').modal('show');
        });
        $(document).on('click', '.openDocBtn', function () {
            templateId = $(this).attr('id');
            statusOfRecord = $(this).attr('name');
            window.open(JSUTIL.getUrl('/api/files/download/' + templateId), '_blank');
        });
    });
    function callbackAfterGetDepartment(response) {
        var innerHtml2 = '';
        $('#department').empty();
        innerHtml2 += '<option value = "">--none---</option>';
        $.each(response, function (j, val2) {
            innerHtml2 += '<option value = "' + val2.name + '">' + val2.name + '</option>';
        });
        $('#department').append(innerHtml2);
    }
    function callbackAfterGetCritical(response) {
        console.log(response);
        $('#contactTable').empty();
        var innerHtml = '';
        $.each(response, function (i, val) {
            innerHtml += '<tr>' +
                '<td></button><button type="button" class="btn btn-warning deleteTrSelect editContactSelect" style="margin-left: 5px;" name="' + val.id + '"><i class="fa fa-pencil"></i></button></td>' +
                '<td>' + val.number + '</td>' +
                '<td>' + val.name + '</td>' +
                '<td>' + val.requester.name + '</td>' +
                '<td>' + val.processStatus + '</td>' +
                '<td>' + val.isActive + '</td><td>';
            if (val.processStatus === 'Draft' || val.processStatus === 'Rejected') {
                innerHtml +=
                    '<button type="button" class="btn btn-white btn-sm uploadDocBtn" name="' + val.processStatus + '" id="' + val.id + '"><i class="fa fa-upload"></i> Upload Document</button>';
            }
            if (val.extFileId) {
                innerHtml += '<button type="button" class="btn btn-white btn-sm openDocBtn" id="' + val.extFileId + '"><i class="fa fa-file-export"></i> Open Document</button>';
            }
            innerHtml += '</td></tr>';
        });
        $('#contactTable').append(innerHtml);
        $('.deleteContactSelect').on('click', function () {
            elementToDelete = $(this).parent().parent();
            currentContactId = $(this).attr('name');
            MODALUTIL.deleteConfirmModal(deleteContactCallback);
        });
        $('.editContactSelect').on('click', function () {
            fileId = $(this).attr('id');
            currentContactId = $(this).attr('name');
            $.each(response, function (i, val) {
                if (Number(currentContactId) === val.id) {
                    selectedDepartment = val.department;
                    recordStatus = val.processStatus;
                    $('.editContactInput[name="name"]').val(val.name);
                    $('.editContactInput[name="department"]').val(val.department);
                    $('.editContactInput[name="department"]').parent().find('.select2-selection__rendered').text(val.department);
                    $('#editContactId').val(val.id);
                }
            });
            if (recordStatus === 'Draft' || recordStatus === 'Rejected') {
                $('.recordApprovalBtn').show();
                $('.recordEditBtn').show();
            } else {
                $('.recordApprovalBtn').hide();
                $('.recordEditBtn').hide();
            }
            const departmentParameter = {
                fields: "StartDate;Name",
                conditions: [],
                logic: ""
            };
            var ansUrl = JSUTIL.getUrl('/data/Department/list');
            JSUTIL.callAJAXPost(ansUrl, JSON.stringify(departmentParameter), callbackAfterEditDepartment);
            $('#editContactPanel').show();
            $('#editRecordPanel').hide();
        });
    }
    function callbackAfterEditDepartment(response) {
        console.log(response);
        var innerHtml2 = '';
        $('#editDepartment').empty();
        innerHtml2 += '<option value = "">--none---</option>';
        $.each(response, function (j, val2) {
            if (val2.name === selectedDepartment) {
                innerHtml2 += '<option value = "' + val2.name + '" selected>' + val2.name + '</option>';
            } else {
                innerHtml2 += '<option value = "' + val2.name + '">' + val2.name + '</option>';
            }
        });
        $('#editDepartment').append(innerHtml2);
    }
    function deleteContactCallback() {
        var postUrl = JSUTIL.getUrl('/data/QualityDocumentTemplate/delete?id=' + currentContactId);
        JSUTIL.callAJAXGet(postUrl, deleteContactCompleteCallback);
    }
    function deleteContactCompleteCallback() {
        elementToDelete.remove();
    }
    function buildFormDataJSON(className) {
        let jsonPayload = {};
        $('.' + className).each(function () {
            let attrName = $(this).attr('name');
            let attrValue = $(this).val();
            console.log(attrValue);
            if (attrValue) {
                if ($(this).hasClass('datepicker') || $(this).hasClass('datepickerCompliance') || $(this).hasClass('datepickerCompliance2')) {
                    attrValue = JSUTIL.toDatabaseDate(attrValue);
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).hasClass('datetimepicker')) {
                    attrValue = JSUTIL.getDatabaseDateTime(attrValue);
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).hasClass('select2')) {
                    attrValue = $(this).select2('val');
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).attr('type') && $(this).attr('type') === 'checkbox') {
                    attrValue = $(this).prop('checked');
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).attr('type') && $(this).attr('type') === 'number') {
                    attrValue = Number(attrValue);
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).attr('name') && $(this).attr('name').indexOf('.') >= 0) {
                    console.log()
                    let splitArray = $(this).attr('name').split('.');
                    jsonPayload[splitArray[0]] = {};
                    jsonPayload[splitArray[0]][splitArray[1]] = Number(attrValue);
                } else {
                    console.log(attrName);
                    if (attrName === 'id') {
                        attrValue = Number(attrValue);
                        jsonPayload[attrName] = attrValue;
                    }
                    jsonPayload[attrName] = attrValue;
                }
            }
            else if (!attrValue) {
                if ($(this).attr('type') && $(this).attr('type') === 'checkbox') {
                    attrValue = $(this).prop('checked');
                    jsonPayload[attrName] = attrValue;
                }
            }
        });
        console.info(jsonPayload);
        return jsonPayload;
    }
    function updateNewPricebook(updatePricebook) {
        var postUrl1 = JSUTIL.getUrl('/data/QualityDocumentType/update/' + currentRecordId);
        JSUTIL.callAJAXPost(postUrl1, JSON.stringify(updatePricebook), callbackAfterEditRequest);
    }
    function callbackAfterEditRequest(response) {
        console.log(response);
        location.reload();
    }
    function deleteCustomerCallback() {
        var postUrl3 = JSUTIL.getUrl('/data/QualityDocumentType/delete?id=' + currentRecordId);
        JSUTIL.callAJAXGet(postUrl3, callbackAfterDelete);
    }
    function callbackAfterDelete() {
        location.reload();
    }
</script>
<!-- editDocumentType.js end -->

<script>
    var folderName;
    $(document).ready(function () {
        $('.newPricebookSaveBtn').on('click', function () {
            JSUTIL.callAJAXPost(JSUTIL.getUrl('/api/files/create-folder?folder=' + encodeURIComponent(folderName)), null, callbackSuccessFolderCreated);
        });
        $('.createPriceBookInput[name="name"]').on('change', function () {
            var inputValue = $(this).val();
            folderName = inputValue
        });
        $('.newRecordBtn').on('click', function () {
            $('#newRecordPanel').show();
            $('#DocumentTypePage').hide();
            resetForm();
        });
        $('.newRecordCancelBtn').on('click', function () {
            $('#newRecordPanel').hide();
            $('#DocumentTypePage').show();
        });
    });
    function callbackSuccessFolderCreated(response) {
        console.log(response);
        let form = $('#newPricebookForm');

        let addPricebook = {
            revisionPeriod: form.find('.createPriceBookInput[name="revisionPeriod"]').val(),
            name: form.find('.createPriceBookInput[name="name"]').val(),
            active: form.find('.createPriceBookInput[name="active"]').val(),
            code: form.find('.createPriceBookInput[name="code"]').val(),
            reportFormatName: form.find('.createPriceBookInput[name="reportFormatName"]').val(),
            extFolderId: typeof response === 'string' ? response : response.data
        };
        console.log(addPricebook)
        var postUrl = ('/data/QualityDocumentType/create');
        JSUTIL.callAJAXPost(postUrl, JSON.stringify(addPricebook), callbackAfterNewRequest);
    }

    function callbackAfterNewRequest(response) {
        console.log(response);
        location.reload();
    }
    function resetForm() {
        $('#newPricebookForm')[0].reset();
    }
</script>
<!-- newDocumentType.js end -->
