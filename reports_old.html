<style>
.tabs {
  display: flex;
  gap: 10px;
}
.tab-btn {
  padding: 8px 16px;
  border: 1px solid #ddd;
  background: #f9f9f9;
  cursor: pointer;
  border-radius: 6px;
}
.tab-content {
  display: none !important;
}

.tab-content.active {
  display: block !important;
}

.report-output.hidden {
  display: none;
}

.tab-btn.active {
  background: #2563eb;
  color: #fff;
}

.report-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.report-toolbar .search-container {
  flex: 1;
  max-width: 360px;
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 10px;
}

.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.pagination .page-btn {
  padding: 6px 10px;
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
}

.pagination .page-btn.active {
  background: #2563eb;
  color: #fff;
  border-color: #2563eb;
}
</style>

          <div class="stat-value">
            <span id="occupancyReportValue">0%</span>
            <span class="stat-unit">Occupied</span>

<!-- Tabs Navigation -->
<div class="report-tabs">
  <button class="tab-btn active" data-report-tab="patient" onclick="showReportTab('patient')">Patient Report</button>
  <button class="tab-btn" data-report-tab="profit" onclick="showReportTab('profit')">Profit Report</button>
  <button class="tab-btn" data-report-tab="invoice" onclick="showReportTab('invoice')">Invoice Report</button>
  <button class="tab-btn" data-report-tab="allPatients" onclick="showReportTab('allPatients')">All Patients</button>
</div>

<!-- Patient Report Tab Content -->
<div id="patientReportTab" class="tab-content active">
  <div class="form-row">
    <div class="form-group">
      <label>Search Patient</label>
      <input 
        type="text" 
        id="patientSearchInputPatient" 
        placeholder="Search by name or mobile number..." 
        oninput="searchPatientForReport('patient')"
      />
      <div id="patientSearchResultsPatient" class="search-results" style="display:none;"></div>
    </div>
    <div class="form-group">
      <label>Duration</label>
      <select id="reportDurationPatient" onchange="updateDateInputs('patient')">
        <option value=" ">None</option>
        <option value="month">Month</option>
        <option value="custom">Custom Range</option>
        <option value="date">Date</option>
      </select>
    </div>
    <div class="form-group" id="datePatient" style="display:none;">
      <label>Select Date/Month</label>
      <input type="date" id="reportDatePatient">
    </div>
    <div class="form-group" id="fromDateGroupPatient" style="display:none;">
      <label>From Date</label>
      <input type="date" id="reportFromDatePatient">
    </div>
    <div class="form-group" id="toDateGroupPatient" style="display:none;">
      <label>To Date</label>
      <input type="date" id="reportToDatePatient">
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" onclick="generateReport('patient')">Generate Report</button>
  </div>
  <div id="generatedPatientReport" class="report-output hidden"></div>
</div>
