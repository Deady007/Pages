
<div class="tabs mb-4">
  <button class="tab-btn active" onclick="showTab('proceduresTab', this)">Procedures</button>
  <button class="tab-btn" onclick="showTab('medicinesTab', this)">Medicines</button>
  <button class="tab-btn" onclick="showTab('inventoryTab', this)">Inventory</button>
</div>

<!-- Procedures Tab -->
<div id="proceduresTab" class="tab-content">
  <div class="card" id="procedures-page">
          <div class="flex items-center justify-between pl-4 pt-4 pr-4">
            <div class="flex gap-6">
              <h3 class="font-semibold">Procedures</h3>
              <button class="btn btn-secondary" onclick="openAddProcedureModal()">
                Add Procedure
              </button>
            </div>
            <div class="flex gap-2 items-center">
              <div class="search-container">
                <input type="text" placeholder="Search procedures..." id="procedureSearch" oninput="searchProcedures()" style="min-width: 200px;" />
              </div>
              <select id="procedureEntriesCount" onchange="renderProcedures()" class="select-filter">
                <option value="10">Entries 10</option>
                <option value="20">Entries 20</option>
                <option value="30">Entries 30</option>
                <option value="40">Entries 40</option>
                <option value="-1">Entries All</option>
              </select>
            </div>
          </div>
          <div class="card-body">
            <table class="table">
              <thead>
                <tr>
                  <th>SL</th>
                  <th>Product Name</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="proceduresTable">
                <!-- Dynamic content -->
              </tbody>
            </table>
          </div>
  </div>
</div>

<!-- Medicines Tab -->
<div id="medicinesTab" class="tab-content" style="display:none;">
  <div class="card">
      <div class="flex items-center justify-between pl-4 pt-4 pr-4">
        <div class="flex gap-6">
          <h3 class="font-semibold">Medicines</h3>
          <button class="btn btn-secondary" onclick="openAddMedicineModal()">Add Medicine</button>
        </div>
         <div class="flex gap-2 items-center">
          <div class="search-container">
            <input type="text" placeholder="Search medicines..." id="medicineSearch" oninput="searchMedicines()" style="min-width: 200px;" />
          </div>
        <select id="medicineEntriesCount" onchange="renderMedicines()" class="select-filter">
          <option value="10">Entries 10</option>
          <option value="20">Entries 20</option>
          <option value="30">Entries 30</option>
          <option value="40">Entries 40</option>
          <option value="-1">Entries All</option>
        </select>
        </div>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <!-- <th>Stock</th>
              <th>Unit Price</th>
              <th>Expiry</th>
              <th>Status</th> -->
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="medicineTable">
            <!-- Dynamic content -->
          </tbody>
        </table>
      </div>
  </div>
</div>

<!-- Inventory Tab -->
<div id="inventoryTab" class="tab-content" style="display:none;">
  <div class="card">
        <div class="flex items-center justify-between pl-4 pt-4 pr-4">
          <div class="flex gap-6">
            <h3 class="font-semibold">Inventory</h3>
            <button class="btn btn-secondary" onclick="openAddInventoryModal()">Add Inventory</button>
          </div>
          <div class="flex gap-2 items-center">
            <div class="search-container">
              <input type="text" placeholder="Search inventory..." id="inventorySearch" oninput="searchInventory()" style="min-width: 200px;" />
            </div>
          <select id="inventoryEntriesCount" onchange="renderInventoryList()" class="select-filter">
            <option value="10">Entries 10</option>
            <option value="20">Entries 20</option>
            <option value="30">Entries 30</option>
            <option value="40">Entries 40</option>
            <option value="-1">Entries All</option>
          </select>
          </div>
        </div>
          <div class="card-body">
            <table class="table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Batch No</th>
                  <th>Qty</th>
                  <th>Unit Price</th>
                  <th>Expiry</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="inventoryTable">
                <!-- Dynamic content -->
              </tbody>
            </table>
          </div>
  </div>
</div>

<div class="modal" id="proceduresEditProductModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3>Edit Product</h3>
        <button class="close-btn" onclick="closeModal('proceduresEditProductModal')">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="modal-body">
        <div id="proceduresEditProductModalContent">
          <!-- Dynamic room details -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('proceduresEditProductModal')">Cancel</button>
        <button class="btn btn-secondary" onclick="editProcedureProduct()">Assign Patient</button>
      </div>
    </div>
  </div>
