<div class="page-content" id="patient-invoice-page">
  <div class="card">
    <div class="card-header flex justify-between items-center">
      <h3 class="mb-2 font-semibold">Patient Invoice</h3>
      <button class="btn btn-outline" onclick="exitAddInvoiceForm()" style="border: 1px solid #181818;">← Back</button>
    </div>

    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label>Patient Name</label>
          <input type="text" id="addInvoicePatientName" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="addInvoicePatientAge" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Sex</label>
          <select id="addInvoicePatientSex">
            <option value="">Select</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="O">Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Contact</label>
          <input type="tel" id="addInvoicePatientContact" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Address</label>
          <textarea rows="2" id="addInvoicePatientAddress"></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Consultation Charge</label>
          <input type="number" id="addInvoicePatientConsultationCharge" class="charge-field" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" id="procedureListContainer">
          <!-- Procedures will be loaded dynamically -->
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" id="medicineListContainer">
          <!-- Medicine will be loaded dynamically -->
        </div>
      </div>

       <div class="form-row">
        <div class="form-group" id="addInvoicePatientTestReports">
          <!-- Test Reports will be loaded dynamically -->
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Payment Mode</label>
          <select id="addInvoicePatientPaymentMode">
            <option value="">Select</option>
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="UPI">UPI</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Discount %</label>
          <input type="number" id="addInvoicePatientDiscount" class="charge-field" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Total</label>
          <input type="number" id="addInvoicePatientTotal" readonly />
        </div>
      </div>

      <!-- <div class="form-row">
        <button class="btn btn-primary w-full" onclick="processInvoice()">💾 Process Invoice</button>
      </div> -->
    </div>
  </div>
</div>
