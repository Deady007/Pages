<!-- allDocumentReview.js start -->
<script>
    var drRecordList = [];
    var drCurrentRecordId = '';
    var drCurrentReviewerRecordId = '';
    var drFileId = '';
    var drStatusOfRecord = '';
    var drDocumentNumber = '';
    var drPurposeOfRecord = '';

    function loadDocumentReviewRecords() {
        JSUTIL.callAJAXGet(
            JSUTIL.getUrl('/api/quality-document-request-reviewers/reviewer/' + FOX.employeeId),
            function (response) {
                var all = Array.isArray(response) ? response : [];
                drRecordList = all.filter(function (r) {
                    var req = r.request || {};
                    var status = (r.processStatus || '').toLowerCase();
                    return req.inApprovalWorkflow === true && status !== 'approved' && status !== 'rejected';
                });
                drBuildTable(drRecordList);
            }
        );
    }

    function drBuildTable(list) {
        if ($.fn.DataTable.isDataTable('#documentReviewTable')) {
            $('#documentReviewTable').DataTable().destroy();
        }
        $('#drAllDocumentTable').empty();

        // Sort by request number descending — latest first
        var sorted = (list || []).slice().sort(function (a, b) {
            var numA = parseInt(((a.request || {}).number || '').replace(/\D/g, '')) || 0;
            var numB = parseInt(((b.request || {}).number || '').replace(/\D/g, '')) || 0;
            return numB - numA;
        });

        if (sorted.length > 0) {
            var innerHtml = '';
            $.each(sorted, function (i, val) {
                var req = val.request || {};
                var docName = req.purpose === 'New'
                    ? (req.documentName || '')
                    : (req.document ? req.document.name : '');
                var status = req.processStatus || '';
                var statusLabel = '';
                if (status === 'New' || status.toLowerCase().includes('review') || status.toLowerCase().includes('approval') || status.toLowerCase().includes('signing')) {
                    statusLabel = '<span class="label" style="margin-left:10px;">' + status + '</span>';
                } else if (status === 'Training' || status === 'Effective' || status === 'Issuance' || status === 'CFT') {
                    statusLabel = '<span class="label label-success" style="margin-left:10px;">' + status + '</span>';
                } else if (status.toLowerCase().includes('rejected')) {
                    statusLabel = '<span class="label label-danger" style="margin-left:10px;">' + status + '</span>';
                }
                innerHtml +=
                    '<tr>' +
                    '<td class="itemNum"><a href="javascript:void(0);" class="drSelectRecordBtn" data-reviewer-id="' + val.id + '" data-request-id="' + (req.id || '') + '">' + (req.number || '') + '</a></td>' +
                    '<td>' + docName + '</td>' +
                    '<td>' + (req.documentType ? req.documentType.name : '') + '</td>' +
                    '<td>' + (req.purpose || '') + '</td>' +
                    '<td>' + (req.documentVersion || '') + '</td>' +
                    '<td>' + statusLabel + '</td>' +
                    '</tr>';
            });
            $('#drAllDocumentTable').append(innerHtml);
        }

        $('#documentReviewTable').DataTable({
            destroy: true,
            order: [],
            language: { emptyTable: 'No pending reviews found.' }
        });
    }

    loadDocumentReviewRecords();

    // URL param auto-open
    (function () {
        var url = new URL(window.location.href);
        var id = url.searchParams.get('id');
        if (id) {
            setTimeout(function () {
                var btn = $('#drAllDocumentTable .drSelectRecordBtn[data-request-id="' + id + '"]');
                if (btn.length) btn.trigger('click');
            }, 600);
        }
    })();
</script>
<!-- allDocumentReview.js end -->



<!-- editDocumentReview.js start -->
<script>
    var drWorkflowSteps = [
        { Sequence: 1, StepStatus: 'Initiation' },
        { Sequence: 2, StepStatus: 'Review' },
        { Sequence: 3, StepStatus: 'QA' },
        { Sequence: 4, StepStatus: 'Training' },
        { Sequence: 5, StepStatus: 'Training Complete' },
        { Sequence: 6, StepStatus: 'Effective' }
    ];

    function drGenerateProgressTracker(currentStatus) {
        var stepsContainer = $('#dr-process-steps');
        stepsContainer.empty();
        var statusMap = { 'new': 'initiation' };
        var normalizedStatus = (currentStatus || '').toLowerCase();
        var mappedStatus = statusMap[normalizedStatus] || normalizedStatus;

        drWorkflowSteps.sort(function (a, b) { return a.Sequence - b.Sequence; });
        var stepWidth = 100 / drWorkflowSteps.length;

        drWorkflowSteps.forEach(function (step, index) {
            stepsContainer.append(
                '<div class="step" style="width:' + stepWidth + '%">' +
                '<div class="step-circle">' + (index + 1) + '</div>' +
                '<div class="step-label">' + step.StepStatus + '</div>' +
                '</div>'
            );
        });

        var stepsToComplete = [];
        var foundCurrent = false;
        drWorkflowSteps.forEach(function (step) {
            if (!foundCurrent) stepsToComplete.push(step.StepStatus.toLowerCase());
            if (step.StepStatus.toLowerCase() === mappedStatus) foundCurrent = true;
        });

        var currentStepIndex = 0;
        $('#dr-process-steps .step').each(function (i) {
            var stepText = $(this).find('.step-label').text().toLowerCase();
            if (stepsToComplete.indexOf(stepText) !== -1) $(this).addClass('completed');
            if (stepText === mappedStatus) {
                $(this).removeClass('completed').addClass('current');
                currentStepIndex = i;
            }
        });

        setTimeout(function () {
            var $steps = $('#dr-process-steps .step');
            if ($steps.length > 1) {
                var containerLeft = $('.progress-container').offset().left + 20;
                var firstCenter = $steps.first().offset().left + ($steps.first().outerWidth() / 2);
                var lastCenter = $steps.last().offset().left + ($steps.last().outerWidth() / 2);
                var currentCenter = $steps.eq(currentStepIndex).offset().left + ($steps.eq(currentStepIndex).outerWidth() / 2);
                var trackLeft = firstCenter - containerLeft;
                $('.progress-track').css({ left: trackLeft + 'px', width: (lastCenter - firstCenter) + 'px' });
                $('.progress-bar').css({ left: trackLeft + 'px', width: (currentCenter - firstCenter) + 'px' });
            }
        }, 100);
    }

    function drDownloadFileById(id) {
        if (!id) return;
        fetch(JSUTIL.getUrl('/api/files/download/' + id))
            .then(function (res) {
                if (!res.ok) { console.error('File download failed', res.status); return; }
                var contentType = res.headers.get('Content-Type') || '';
                var disposition = res.headers.get('Content-Disposition') || '';
                var filename = 'file';
                var match = disposition.match(/filename[^;=\n]*=(['"]?)([^'";\n]*)\1/);
                if (match) filename = match[2];
                return res.blob().then(function (blob) {
                    var url = URL.createObjectURL(blob);
                    var isWord = contentType.includes('word') || contentType.includes('officedocument') || filename.match(/\.(doc|docx)$/i);
                    var a = document.createElement('a');
                    a.href = url;
                    if (isWord) { a.download = filename; } else { a.target = '_blank'; }
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
                });
            })
            .catch(function (err) { console.error('Download error', err); });
    }

    function drExtractRemarks(entry) {
        var remarks = '';
        if (entry.notes) {
            var clean = entry.notes.trim();
            try {
                if (clean.startsWith('{') && clean.endsWith('}')) {
                    var obj = JSON.parse(clean);
                    remarks = obj.remarks || obj.requestId || '';
                } else {
                    remarks = clean.replace(/^"|"$/g, '');
                }
            } catch (e) {
                remarks = clean.replace(/^"|"$/g, '');
            }
        }
        return remarks;
    }

    function drGetMaxLocation(activities) {
        return (Array.isArray(activities) ? activities : []).reduce(function (max, e) {
            var loc = parseInt(e.location);
            return !isNaN(loc) && loc > max ? loc : max;
        }, 0);
    }

    function drCreateActivity(name, notes, next) {
        JSUTIL.callAJAXGet(
            JSUTIL.getUrl('/api/process-activities/parent/' + drCurrentRecordId),
            function (activities) {
                var maxLocation = drGetMaxLocation(activities);
                JSUTIL.callAJAXPost('/api/process-activities', JSON.stringify({
                    parentRecordId: Number(drCurrentRecordId),
                    name: name,
                    performedBy: { id: Number(FOX.employeeId) },
                    notes: notes || '',
                    location: String(maxLocation)
                }), function () {
                    if (typeof next === 'function') next();
                    else location.reload();
                });
            }
        );
    }

    // ── Record click ─────────────────────────────────────────────────────────
    $(document).on('click', '#drAllDocumentTable .drSelectRecordBtn', function () {
        drCurrentReviewerRecordId = String($(this).data('reviewer-id'));
        drCurrentRecordId = String($(this).data('request-id'));

        var reviewerRecord = null;
        for (var i = 0; i < drRecordList.length; i++) {
            if (String(drRecordList[i].id) === drCurrentReviewerRecordId) {
                reviewerRecord = drRecordList[i];
                break;
            }
        }
        if (!reviewerRecord) return;

        var req = reviewerRecord.request || {};
        drFileId = req.extFileId || '';
        drStatusOfRecord = req.processStatus || '';
        drDocumentNumber = req.number || '';
        drPurposeOfRecord = req.purpose || '';

        // Populate fields
        $('#drEditRecordTitle').text(req.number || '');
        $('#drEditType').val(req.documentType ? req.documentType.name : '');
        $('#drEditPurpose').val(req.purpose || '');
        $('#drVersionNumber').val(req.documentVersion || '');
        $('#drReason').val(req.reason || '');

        if (req.purpose === 'New') {
            $('#drDocNameCol').show();
            $('#drDocRefCol').hide();
            $('#drDocumentName').val(req.documentName || '');
        } else {
            $('#drDocNameCol').hide();
            $('#drDocRefCol').show();
            $('#drDocumentRef').val(req.document ? (req.document.number + ' - ' + req.document.name) : '');
        }

        drGenerateProgressTracker(req.processStatus);

        // Buttons
        if (drFileId) { $('.drOpenDocumentBtn').show(); } else { $('.drOpenDocumentBtn').hide(); }
        var statusLower = drStatusOfRecord.toLowerCase();
        if (statusLower.includes('review')) {
            $('.drApproveRejectBtn').show();
        } else {
            $('.drApproveRejectBtn').hide();
        }
        $('.drEsignBtn').hide();

        // Reset tabs
        $('#drEditDocTabs li').removeClass('active');
        $('#drEditDocTabs li:first').addClass('active');
        $('.dr-tab-pane').removeClass('active');
        $('#drUploads').addClass('active');

        $('#drAllRecordPanel').hide();
        $('#drEditRecordPanel').show();

        drLoadAnnexures();
        drLoadHistory();
    });

    // ── Tabs ─────────────────────────────────────────────────────────────────
    $(document).on('click', '#drEditDocTabs .dr-tab-link', function (e) {
        e.preventDefault();
        var tabId = $(this).data('tab');
        $('#drEditDocTabs li').removeClass('active');
        $(this).closest('li').addClass('active');
        $('.dr-tab-pane').removeClass('active');
        $('#' + tabId).addClass('active');
    });

    // ── Close ─────────────────────────────────────────────────────────────────
    $(document).on('click', '.drCancelBtn', function () {
        $('#drEditRecordPanel').hide();
        $('#drAllRecordPanel').show();
    });

    // ── Open Document ─────────────────────────────────────────────────────────
    $(document).on('click', '.drOpenDocumentBtn', function () {
        if (drFileId) drDownloadFileById(drFileId);
    });

    // ── Approve/Reject Modal (with e-sign) ────────────────────────────────────
    $(document).on('click', '.drApproveRejectBtn', function () {
        $('#drEsignPassword').val('');
        $('#drApprovalRemarks').val('');
        $('#drEsignErrorPanel').hide();
        $('#drApprovalErrorPanel').hide();
        $('#drEsignStep1').show();
        $('#drEsignStep2').hide();
        $('#drVerifyBtn').show();
        $('#drRejectBtn').hide();
        $('#drApproveBtn').hide();
        $('#drEsignUsername').val(FOX.employeeUsername);
        new bootstrap.Modal(document.getElementById('drApprovalModal')).show();
    });

    // ── Reject ────────────────────────────────────────────────────────────────
    $(document).off('click.drReject', '#drRejectBtn').on('click.drReject', '#drRejectBtn', function () {
        var remarks = $('#drApprovalRemarks').val();
        if (!remarks) { $('#drApprovalErrorPanel').text('Please give remarks').show(); return; }

        // Mark this reviewer as Rejected
        JSUTIL.callAJAXPost(
            JSUTIL.getUrl('/api/quality-document-request-reviewers/update/' + drCurrentReviewerRecordId),
            JSON.stringify({ id: Number(drCurrentReviewerRecordId), processStatus: 'Rejected' }),
            function () {
                // Check if ALL reviewers have now decided (Approved or Rejected)
                JSUTIL.callAJAXGet(
                    JSUTIL.getUrl('/api/quality-document-request-reviewers/request/' + drCurrentRecordId),
                    function (reviewerList) {
                        var all = Array.isArray(reviewerList) ? reviewerList : [];
                        var allDecided = all.length > 0 && all.every(function (r) {
                            var s = (r.processStatus || '').toLowerCase();
                            return s === 'approved' || s === 'rejected';
                        });

                        bootstrap.Modal.getInstance(document.getElementById('drApprovalModal'))?.hide();

                        if (allDecided) {
                            // At least one rejected → send back to author
                            JSUTIL.callAJAXPost(
                                '/data/QualityDocumentRequest/update/' + drCurrentRecordId,
                                JSON.stringify({ processStatus: 'New', inApprovalWorkflow: false }),
                                function () {
                                    drCreateActivity('Rejected By ' + FOX.employeeName, remarks);
                                }
                            );
                        } else {
                            // Not everyone decided yet — just log activity
                            drCreateActivity('Rejected By ' + FOX.employeeName, remarks);
                        }
                    }
                );
            }
        );
    });

    // ── Approve ───────────────────────────────────────────────────────────────
    $(document).off('click.drApprove', '#drApproveBtn').on('click.drApprove', '#drApproveBtn', function () {
        var remarks = $('#drApprovalRemarks').val();
        if (!remarks) { $('#drApprovalErrorPanel').text('Please give remarks').show(); return; }

        // Mark this reviewer as Approved
        JSUTIL.callAJAXPost(
            JSUTIL.getUrl('/api/quality-document-request-reviewers/update/' + drCurrentReviewerRecordId),
            JSON.stringify({ id: Number(drCurrentReviewerRecordId), processStatus: 'Approved' }),
            function () {
                // Check if ALL reviewers have now decided
                JSUTIL.callAJAXGet(
                    JSUTIL.getUrl('/api/quality-document-request-reviewers/request/' + drCurrentRecordId),
                    function (reviewerList) {
                        var all = Array.isArray(reviewerList) ? reviewerList : [];
                        var allDecided = all.length > 0 && all.every(function (r) {
                            var s = (r.processStatus || '').toLowerCase();
                            return s === 'approved' || s === 'rejected';
                        });
                        var anyRejected = all.some(function (r) {
                            return (r.processStatus || '').toLowerCase() === 'rejected';
                        });
                        var allApproved = allDecided && !anyRejected;

                        bootstrap.Modal.getInstance(document.getElementById('drApprovalModal'))?.hide();

                        if (!allDecided) {
                            // Still waiting for other reviewers
                            drCreateActivity('Approved By ' + FOX.employeeName, remarks);
                        } else if (anyRejected) {
                            // All decided but at least one rejected → back to author
                            JSUTIL.callAJAXPost(
                                '/data/QualityDocumentRequest/update/' + drCurrentRecordId,
                                JSON.stringify({ processStatus: 'New', inApprovalWorkflow: false }),
                                function () {
                                    drCreateActivity('Approved By ' + FOX.employeeName, remarks);
                                }
                            );
                        } else {
                            // All approved → move to QA
                            JSUTIL.callAJAXPost(
                                '/data/QualityDocumentRequest/update/' + drCurrentRecordId,
                                JSON.stringify({ processStatus: 'QA', inApprovalWorkflow: false }),
                                function () {
                                    drCreateActivity('Approved By ' + FOX.employeeName, remarks);
                                }
                            );
                        }
                    }
                );
            }
        );
    });

    // ── Verify password → show remarks + approve/reject ───────────────────────
    $(document).off('click.drVerify', '#drVerifyBtn').on('click.drVerify', '#drVerifyBtn', function () {
        var password = $('#drEsignPassword').val();
        JSUTIL.callAJAXPost('/api/auth/validate', JSON.stringify({
            'username': FOX.employeeUsername,
            'password': password
        }), function (response) {
            if (response.result === 'FAILURE' || response.valid === false || response.success === false) {
                $('#drEsignErrorPanel').text('Invalid password, please try again').show();
            } else {
                $('#drEsignStep1').hide();
                $('#drVerifyBtn').hide();
                $('#drEsignStep2').show();
                $('#drRejectBtn').show();
                $('#drApproveBtn').show();
            }
        });
    });

    // ── Annexures ─────────────────────────────────────────────────────────────
    function drLoadAnnexures() {
        JSUTIL.callAJAXPost(JSUTIL.getUrl('/data/QualityDocumentAnnexure/list'), JSON.stringify({}), function (all) {
            var filtered = (all || []).filter(function (a) {
                return String(a.documentRequest && a.documentRequest.id) === String(drCurrentRecordId);
            });
            var innerHtml = '';
            if (!filtered.length) {
                innerHtml = '<tr><td colspan="3" class="text-center">No annexures found.</td></tr>';
            } else {
                $.each(filtered, function (i, val) {
                    innerHtml +=
                        '<tr>' +
                        '<td style="width:12%;">' +
                        '<button type="button" class="btn btn-outline btn-success drViewAnnexureBtn" data-file-id="' + (val.extFileId || '') + '">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' +
                        '</button>' +
                        '</td>' +
                        '<td>' + (val.name || '') + '</td>' +
                        '<td>' + (JSUTIL.getDate(val.createdDate) || '') + '</td>' +
                        '</tr>';
                });
            }
            $('#drAllDocumentsTable').html(innerHtml);
        });
    }

    $(document).on('click', '.drViewAnnexureBtn', function () {
        var fid = $(this).data('file-id');
        if (fid) drDownloadFileById(fid);
    });

    // ── History ───────────────────────────────────────────────────────────────
    function drLoadHistory() {
        JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/process-activities/parent/' + drCurrentRecordId), function (activities) {
            var history = Array.isArray(activities) ? activities : [];
            var innerHtml = '';
            if (!history.length) {
                innerHtml = '<tr><td colspan="3" class="text-center">No history found.</td></tr>';
            } else {
                $.each(history, function (i, val) {
                    innerHtml +=
                        '<tr>' +
                        '<td>' + (val.name || '') + '</td>' +
                        '<td>' + (JSUTIL.getDate(val.createdDate) || '') + '</td>' +
                        '<td>' + drExtractRemarks(val) + '</td>' +
                        '</tr>';
                });
            }
            $('#drAllHistoryTable').html(innerHtml);
        });
    }
</script>
<!-- editDocumentReview.js end -->
