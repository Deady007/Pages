<!-- allDocuments.js start -->
<script>
    var docAccessRecords = [];
    var docAllTypes      = [];
    var docFilteredList  = [];

    function getDocYear(r) {
        var d = (r.documentVersion && r.documentVersion.document && r.documentVersion.document.createdDate)
              || (r.documentVersion && r.documentVersion.createdDate)
              || r.createdDate || '';
        return d ? new Date(d).getFullYear() : '';
    }

    function getDocDept(r) {
        return (r.department && r.department.name)
            || (r.documentVersion && r.documentVersion.document && r.documentVersion.document.department)
            || '';
    }

    function getDocTypeName(r) {
        return (r.documentVersion && r.documentVersion.document
             && r.documentVersion.document.documentType
             && r.documentVersion.document.documentType.name) || '';
    }

    function getDocTypeId(r) {
        return (r.documentVersion && r.documentVersion.document
             && r.documentVersion.document.documentType
             && r.documentVersion.document.documentType.id) || '';
    }

    function updateDocFilterBarVisibility() {
        var typeId  = $('#docTypeFilter').val();
        var typeObj = null;
        $.each(docAllTypes, function (i, t) {
            if (String(t.id) === String(typeId)) { typeObj = t; return false; }
        });
        var filterBy = (typeObj && typeObj.filterBy) ? typeObj.filterBy : '';
        var hasYear  = filterBy.toLowerCase().indexOf('year') >= 0;
        var hasDept  = filterBy.toLowerCase().indexOf('department') >= 0;
        $('#yearFilterWrap').toggle(hasYear);
        $('#deptFilterWrap').toggle(hasDept);
        if (!hasYear) $('#docYearFilter').val('');
        if (!hasDept) $('#docDeptFilter').val('');
    }

    function populateDocSecondaryFilters() {
        var typeId = $('#docTypeFilter').val();
        var subset = docAccessRecords.filter(function (r) {
            return !typeId || String(getDocTypeId(r)) === String(typeId);
        });

        var prevYear = $('#docYearFilter').val();
        var years = [], seenY = {};
        $.each(subset, function (i, r) {
            var y = String(getDocYear(r));
            if (y && !seenY[y]) { seenY[y] = true; years.push(y); }
        });
        years.sort(function (a, b) { return b - a; });
        var $yr = $('#docYearFilter').empty().append('<option value="">All Years</option>');
        $.each(years, function (i, y) {
            $yr.append('<option value="' + y + '"' + (y === prevYear ? ' selected' : '') + '>' + y + '</option>');
        });

        var prevDept = $('#docDeptFilter').val();
        $.ajax({
            url: JSUTIL.getUrl('/api/departments'),
            type: 'GET',
            success: function (response) {
                var depts = Array.isArray(response) ? response : [];
                var $dp = $('#docDeptFilter').empty().append('<option value="">All Departments</option>');
                $.each(depts, function (i, d) {
                    if (!d.name) return;
                    $dp.append('<option value="' + d.name + '"' + (d.name === prevDept ? ' selected' : '') + '>' + d.name + '</option>');
                });
            }
        });
    }

    function buildDocAccessTable(records) {
        if ($.fn.DataTable.isDataTable('#docAccessTable')) {
            $('#docAccessTable').DataTable().destroy();
        }
        $('#docAccessTableBody').empty();

        if (records && records.length > 0) {
            $.each(records, function (i, r) {
                var ver = r.documentVersion || {};
                var doc = ver.document      || {};
                var innerHtml = '<tr>' +
                    '<td class="itemNum" style="font-weight:600"><a href="javascript:void(0);" class="selectDocumentBtn" id="' + (r.id || '') + '">' + (doc.number || '') + '</a></td>' +
                    '<td>' + (doc.name || '') + '</td>' +
                    '<td>' + (ver.currentVersion || '') + '</td>' +
                    '<td>' + getDocTypeName(r) + '</td>' +
                    '<td>' + getDocDept(r) + '</td>' +
                    '<td>' + getDocYear(r) + '</td>' +
                    '</tr>';
                $('#docAccessTableBody').append(innerHtml);
            });
        }

        $('#docAccessTable').DataTable({
            destroy: true,
            language: { emptyTable: 'No documents found.' }
        });
    }

    function applyDocFiltersAndBuild() {
        var typeId   = $('#docTypeFilter').val();
        var year     = $('#docYearFilter').val();
        var deptName = $('#docDeptFilter').val();

        docFilteredList = docAccessRecords.filter(function (r) {
            if (typeId   && String(getDocTypeId(r)) !== String(typeId)) return false;
            if (year     && String(getDocYear(r))   !== String(year))   return false;
            if (deptName && getDocDept(r)           !== deptName)       return false;
            return true;
        });

        buildDocAccessTable(docFilteredList);
    }

    function loadDocAccessList() {
        JSUTIL.callAJAXPost(JSUTIL.getUrl('/data/QualityDocumentAccess/list'), JSON.stringify({}), function (response) {
            var list = Array.isArray(response) ? response : [];

            docAccessRecords = list.filter(function (r) {
                var ver = r.documentVersion;
                if (!ver) return false;
                if (ver.isObsolete || ver.isArchived) return false;
                var memberMatch = r.member && String(r.member.id) === String(FOX.employeeId);
                var deptMatch   = r.department && r.department.name === FOX.employeeDepartment;
                return memberMatch || deptMatch;
            });

            populateDocSecondaryFilters();
            applyDocFiltersAndBuild();
        });
    }

    function loadDocTypes() {
        JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/quality-document-type'), function (response) {
            docAllTypes = Array.isArray(response) ? response : [];
            var $sel = $('#docTypeFilter').empty().append('<option value="">All Types</option>');
            $.each(docAllTypes, function (i, t) {
                $sel.append('<option value="' + t.id + '">' + t.name + '</option>');
            });
        });
    }

    $(document).ready(function () {

        $('#docTypeFilter').on('change', function () {
            updateDocFilterBarVisibility();
            populateDocSecondaryFilters();
            applyDocFiltersAndBuild();
        });

        $('#docYearFilter, #docDeptFilter').on('change', function () {
            applyDocFiltersAndBuild();
        });

        // Row click → fetch blob and render with pdf.js
        $('#allDocumentsPanel tbody').on('click', '.selectDocumentBtn', function () {
            var id = $(this).attr('id');
            var record = null;
            $.each(docFilteredList, function (i, r) {
                if (String(r.id) === String(id)) { record = r; return false; }
            });
            if (!record) return;

            var ver       = record.documentVersion || {};
            var doc       = ver.document           || {};
            var extFileId = ver.extFileId          || '';

            if (!extFileId) {
                alert('No file linked to this document.');
                return;
            }

            var title = (doc.number ? doc.number + ' - ' : '') + (doc.name || '');
            $('#docViewerTitle').text(title);
            $('#docPdfViewer').html('<div id="docPdfLoading">Loading document...</div>');
            $('#allDocumentsPanel').hide();
            $('#docViewerPanel').show();
            lucide.createIcons();

            // Fetch as blob
            $.ajax({
                url: JSUTIL.getUrl('/api/files/download/' + encodeURIComponent(extFileId)),
                type: 'GET',
                xhrFields: { responseType: 'blob' },
                success: function (blob) {
                    var fileReader = new FileReader();
                    fileReader.onload = function () {
                        var typedArray = new Uint8Array(this.result);
                        renderDocPdf(typedArray);
                    };
                    fileReader.readAsArrayBuffer(blob);
                },
                error: function () {
                    $('#docPdfViewer').html('<div id="docPdfLoading">Failed to load document.</div>');
                }
            });
        });

        function renderDocPdf(typedArray) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
            pdfjsLib.getDocument({ data: typedArray }).promise.then(function (pdfDoc) {
                $('#docPdfViewer').empty();
                var totalPages = pdfDoc.numPages;
                for (var pageNum = 1; pageNum <= totalPages; pageNum++) {
                    (function (num) {
                        pdfDoc.getPage(num).then(function (page) {
                            var dpr      = window.devicePixelRatio || 2;
                            var scale    = 2.0 * dpr;
                            var viewport = page.getViewport({ scale: scale });
                            var canvas   = document.createElement('canvas');
                            var ctx      = canvas.getContext('2d');

                            canvas.height = viewport.height;
                            canvas.width  = viewport.width;
                            canvas.style.width  = (viewport.width  / dpr) + 'px';
                            canvas.style.height = (viewport.height / dpr) + 'px';

                            $('#docPdfViewer').append(canvas);
                            page.render({ canvasContext: ctx, viewport: viewport });
                        });
                    })(pageNum);
                }
            }).catch(function () {
                $('#docPdfViewer').html('<div id="docPdfLoading">Unable to render PDF.</div>');
            });
        }

        // Close viewer → back to list
        $('#docViewerCloseBtn').on('click', function () {
            $('#docPdfViewer').empty();
            $('#docViewerPanel').hide();
            $('#allDocumentsPanel').show();
        });

        // Block Ctrl+P / Cmd+P
        window.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                e.stopImmediatePropagation();
                return false;
            }
        });

        loadDocTypes();
        loadDocAccessList();
    });
</script>
<!-- allDocuments.js end -->
