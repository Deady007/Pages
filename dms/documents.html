<!-- viewFile.js start -->
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js";
    $(document).ready(function () {
        $('.viewRecordCancelBtn').on('click', function () {
            $('#viewRecordPanel').hide();
            $('#editDocumentsPanel').show();
        });
        $('.editDocumentsDownloadBtn').on('click', function () {
            var postDocUrl = JSUTIL.getUrl('/onedrive/download/' + encodeURIComponent(documentId));
            JSUTIL.callAJAXGet(postDocUrl, callbackAfterGetDocuments);
            $('#viewRecordPanel').show();
            $('#editDocumentsPanel').hide();
        });
    });
    function callbackAfterGetDocuments(response) {
        var pdfData = atob(response);
        var binaryData = new Uint8Array(pdfData.length);
        for (var i = 0; i < pdfData.length; i++) {
            binaryData[i] = pdfData.charCodeAt(i);
        }
        var blob = new Blob([binaryData], { type: 'application/pdf' });
        var url = URL.createObjectURL(blob);
        document.getElementById('pdfViewer').style.display = 'block';
        renderPdf(url);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function renderPdf(pdfUrl) {
        var viewer = document.getElementById('pdfViewer');
        viewer.innerHTML = '';
        pdfjsLib.getDocument(pdfUrl).promise.then(function (pdfDoc_) {
            var totalPages = pdfDoc_.numPages;

            for (var pageNum = 1; pageNum <= totalPages; pageNum++) {
                pdfDoc_.getPage(pageNum).then(function (page) {
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');

                    var scale = 4.0;
                    var viewport = page.getViewport({ scale: scale });

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    page.render({
                        canvasContext: ctx,
                        viewport: viewport
                    });

                    viewer.appendChild(canvas);
                });
            }
        }).catch(function (error) {
            console.error('Error loading PDF:', error);
        });
    }
</script>
<!-- viewFile.js end -->

<script>
    const typeParameter = {
        fields: "ExtFolderId;Name",
        conditions: [],
        logic: ""
    };
    var ansUrl = JSUTIL.getUrl('/data/QualityDocumentType/list');
    JSUTIL.callAJAXPost(ansUrl, JSON.stringify(typeParameter), callbackAfterGetType);
    const departmentParameter = {
        fields: "StartDate;Name",
        conditions: [],
        logic: ""
    };
    var ansUrlDept = JSUTIL.getUrl('/data/Department/list');
    JSUTIL.callAJAXPost(ansUrlDept, JSON.stringify(departmentParameter), callbackAfterGetDepartment);

    let innerHtml = '';
    $.each(recordList, function (i, u) {
        innerHtml +=
            '<tr>' +
            '<td class="itemNum"><a href="javascript:void(0);" class="selectDocumentsBtn" name="' + u.id + '">' + u.documentVersion.document.number + '</a></td>' +
            '<td>' + u.documentVersion.document.name + '</td>' +
            '<td>' + u.documentVersion.currentVersion + '</td>' +
            '<td>' + u.documentVersion.document.documentType.name + '</td>' +
            '<td>' + u.documentVersion.document.department + '</td>' +
            '</tr>';
    });
    $('#allDocumentsTable').append(innerHtml);
    JSUTIL.reinitializeDataTable();
    $(document).ready(function () {
        $('#allDocumentsPanel').show();
        $('#newDocumentsPanel').hide();
        $('#editDocumentsPanel').hide();

        $('#typeFilter, #sampleTypeFilter').on('change', function () {
            $('.dataTables').DataTable().draw();
        });

    });
    function callbackAfterGetType(response) {
        console.log(response);
        $('#typeFilter').empty();
        var innerHtml = '<option value="">All</option>';
        $.each(response, function (i, val) {
            innerHtml += '<option value="' + val.name + '">' + val.name + '</option>';
        });
        $('#typeFilter').append(innerHtml);
    }
    function callbackAfterGetDepartment(response) {
        $('#sampleTypeFilter').empty();
        var innerHtml = '<option value="">All</option>';
        $.each(response, function (i, val) {
            innerHtml += '<option value="' + val.name + '">' + val.name + '</option>';
        });
        $('#sampleTypeFilter').append(innerHtml);
    }
    $.fn.dataTable.ext.search.push(
        function (settings, data, dataIndex) {
            var typeFilter = $('#typeFilter').val();
            var typeColVal = data[3];
            if ((typeColVal == '') || (typeColVal.indexOf(typeFilter) >= 0)) {
                return true;
            }
            return false;
        }
    );
    $.fn.dataTable.ext.search.push(
        function (settings, data, dataIndex) {
            var typeFilter = $('#sampleTypeFilter').val();
            var typeColVal = data[4];
            if (typeFilter === "" || typeColVal.indexOf(typeFilter) >= 0) {
                return true;
            }
            return false;
        }
    );   
</script>
<!-- allDocuments.js end -->

<script>
    var documentId;
    $(document).ready(function () {
        $('.editDocumentsCancelBtn').on('click', function () {
            $('#allDocumentsPanel').show();
            $('#editDocumentsPanel').hide();
        });
        $('#allDocumentsTable').on('click', '.selectDocumentsBtn', function () {
            const currentId = $(this).attr('name');
            currentRecordEquipId = currentId;
            $.each(recordList, function (i, val) {
                if (currentRecordEquipId == val.id) {
                    $('.editDocumentsInput[name="Name"]').val(val.documentVersion.document.name);
                    $('.editDocumentsInput[name="Number"]').val(val.documentVersion.document.number);
                    $('.editDocumentsInput[name="CurrentVersion"]').val(val.documentVersion.currentVersion);
                    $('#editDocumentsId').val(val.id);
                    $('#editRecordTitle').text(val.documentVersion.document.number + '-' + val.documentVersion.document.name);
                    documentId = val.documentVersion.extFileId;
                }
            });
            $('#allDocumentsPanel').hide();
            $('#editDocumentsPanel').show();
        });
        $('.recordSaveAndUpdateBtn').on('click', function () {
            JSUTIL.callAJAXFormPost('editDocumentsForm', callbackAfterEditDocumentsInput);

            $('#editDocumentsPanel').hide();

    });
