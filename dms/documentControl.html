<!-- allDocumentControl.js start -->
<script>
    var dcAllRecords    = [];
    var dcAllTypes      = [];
    var dcFilteredList  = [];
    var dcDocumentId;
    var dcFileName;
    var dcCurrentRecordId;

    /* ── helpers ───────────────────────────────────────────────── */
    function getDcYear(r) {
        var d = r.createdDate || r.modifiedDate || '';
        return d ? new Date(d).getFullYear() : '';
    }

    function getDcDept(r) {
        return r.department || '';
    }

    function getDcTypeName(r) {
        return (r.documentType && r.documentType.name) || '';
    }

    function getDcTypeId(r) {
        return (r.documentType && r.documentType.id) || '';
    }

    /* ── filter bar visibility ─────────────────────────────────── */
    function updateDcFilterVisibility() {
        var typeId  = $('#dcTypeFilter').val();
        var typeObj = null;
        $.each(dcAllTypes, function (i, t) {
            if (String(t.id) === String(typeId)) { typeObj = t; return false; }
        });
        var filterBy = (typeObj && typeObj.filterBy) ? typeObj.filterBy : '';
        var hasYear  = filterBy.toLowerCase().indexOf('year') >= 0;
        var hasDept  = filterBy.toLowerCase().indexOf('department') >= 0;
        $('#dcYearFilterWrap').toggle(hasYear);
        $('#dcDeptFilterWrap').toggle(hasDept);
        if (!hasYear) $('#dcYearFilter').val('');
        if (!hasDept) $('#dcDeptFilter').val('');
    }

    /* ── populate year dropdown ────────────────────────────────── */
    function populateDcYearFilter() {
        var typeId = $('#dcTypeFilter').val();
        var subset = dcAllRecords.filter(function (r) {
            return !typeId || String(getDcTypeId(r)) === String(typeId);
        });
        var prevYear = $('#dcYearFilter').val();
        var years = [], seen = {};
        $.each(subset, function (i, r) {
            var y = String(getDcYear(r));
            if (y && !seen[y]) { seen[y] = true; years.push(y); }
        });
        years.sort(function (a, b) { return b - a; });
        var $yr = $('#dcYearFilter').empty().append('<option value="">All Years</option>');
        $.each(years, function (i, y) {
            $yr.append('<option value="' + y + '"' + (y === prevYear ? ' selected' : '') + '>' + y + '</option>');
        });
    }

    /* ── apply filters and build table ────────────────────────── */
    function applyDcFiltersAndBuild() {
        var typeId   = $('#dcTypeFilter').val();
        var year     = $('#dcYearFilter').val();
        var deptName = $('#dcDeptFilter').val();

        dcFilteredList = dcAllRecords.filter(function (r) {
            if (typeId   && String(getDcTypeId(r)) !== String(typeId)) return false;
            if (year     && String(getDcYear(r))   !== String(year))   return false;
            if (deptName && getDcDept(r)           !== deptName)       return false;
            return true;
        });

        buildDcTable(dcFilteredList);
    }

    /* ── build DataTable — copied from allDocuments.html ──────── */
    function buildDcTable(records) {
        if ($.fn.DataTable.isDataTable('#documentControlTable')) {
            $('#documentControlTable').DataTable().destroy();
        }
        $('#documentControlTableBody').empty();

        if (records && records.length > 0) {
            $.each(records, function (i, r) {
                var innerHtml = '<tr>' +
                    '<td class="itemNum" style="font-weight:600"><a href="javascript:void(0);" class="selectDocumentsBtn" id="' + (r.id || '') + '">' + (r.number || '') + '</a></td>' +
                    '<td>' + (r.name || '') + '</td>' +
                    '<td>' + getDcDept(r) + '</td>' +
                    '<td>' + getDcTypeName(r) + '</td>' +
                    '<td>' + getDcYear(r) + '</td>' +
                    '</tr>';
                $('#documentControlTableBody').append(innerHtml);
            });
        }

        $('#documentControlTable').DataTable({
            destroy: true,
            language: { emptyTable: 'No documents found.' }
        });
    }

    /* ── fetch QualityDocument list, filter client-side ─────────── */
    function loadDcRecords() {
        JSUTIL.callAJAXPost(JSUTIL.getUrl('/data/QualityDocument/list'), JSON.stringify({}), function (response) {
            var list = Array.isArray(response) ? response : [];
            dcAllRecords = list.filter(function (r) {
                return r.isArchived !== true && r.isObsolete !== true;
            });
            populateDcYearFilter();
            applyDcFiltersAndBuild();
        });
    }

    /* ── load types ────────────────────────────────────────────── */
    function loadDcTypes() {
        JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/quality-document-type'), function (response) {
            dcAllTypes = Array.isArray(response) ? response : [];
            var $sel = $('#dcTypeFilter').empty().append('<option value="">All</option>');
            $.each(dcAllTypes, function (i, t) {
                $sel.append('<option value="' + t.id + '">' + t.name + '</option>');
            });
        });
    }

    /* ── load departments ──────────────────────────────────────── */
    function loadDcDepartments() {
        $.ajax({
            url: JSUTIL.getUrl('/api/departments'),
            type: 'GET',
            success: function (response) {
                var depts = Array.isArray(response) ? response : [];
                var $dp = $('#dcDeptFilter').empty().append('<option value="">All</option>');
                $.each(depts, function (i, d) {
                    if (!d.name) return;
                    $dp.append('<option value="' + d.name + '">' + d.name + '</option>');
                });
            }
        });
    }

    /* ── version list for edit panel ───────────────────────────── */
    function loadDcVersionsForDoc(docId) {
        JSUTIL.callAJAXPost(JSUTIL.getUrl('/data/QualityDocumentVersion/list'), JSON.stringify({}), function (response) {
            var list = Array.isArray(response) ? response : [];
            var versions = list.filter(function (v) {
                return v.document && String(v.document.id) === String(docId)
                    && v.isArchived !== true
                    && v.isObsolete !== true;
            });
            buildDcVersionsTable(versions);
        });
    }

    function buildDcVersionsTable(versions) {
        $('#dcVersionsTable').empty();
        var innerHtml = '';
        $.each(versions, function (i, val) {
            var docName   = val.document ? (val.document.name   || '') : '';
            var docNumber = val.document ? (val.document.number || '') : '';
            innerHtml +=
                '<tr><td style="width:8%;">' +
                '<button type="button" class="btn btn-default btn-sm dcPrintBtn" ' +
                    'data-ext-file-id="' + (val.extFileId || '') + '" ' +
                    'data-is-legacy="' + (val.isLegacy || false) + '" ' +
                    'data-doc-name="' + docName + '" ' +
                    'data-doc-number="' + docNumber + '" ' +
                    'data-effective-date="' + (val.effectiveDate || '') + '" ' +
                    'title="Print"><i data-lucide="printer"></i></button>' +
                '</td>' +
                '<td>' + docName + '</td>' +
                '<td>' + (val.currentVersion || '') + '</td>' +
                '<td>' + JSUTIL.getDate(val.dueDate) + '</td>' +
                '</tr>';
        });
        $('#dcVersionsTable').append(innerHtml);
        lucide.createIcons();
    }

    /* ── print modal state ──────────────────────────────────────── */
    var dcPrintTarget = {};

    /* ── fetch blob then stamp and open ─────────────────────────── */
    async function dcStampAndPrint(extFileId, isLegacy, docName, docNumber, effectiveDate, printReason) {
        try {
            var response = await $.ajax({
                url: JSUTIL.getUrl('/api/files/download/' + encodeURIComponent(extFileId)),
                type: 'GET',
                xhrFields: { responseType: 'blob' }
            });

            var arrayBuffer = await new Promise(function (resolve, reject) {
                var reader = new FileReader();
                reader.onload  = function () { resolve(reader.result); };
                reader.onerror = reject;
                reader.readAsArrayBuffer(response);
            });

            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const pdfDoc       = await PDFDocument.load(new Uint8Array(arrayBuffer));
            const regularFont  = await pdfDoc.embedFont(StandardFonts.Helvetica);
            const boldFont     = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
            const pages        = pdfDoc.getPages();

            // format dates
            var now           = new Date();
            var printDate     = now.toLocaleDateString('en-IN');
            var printTime     = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            var effectiveFmt  = effectiveDate ? new Date(effectiveDate).toLocaleString('en-IN') : '';
            var reviewFmt     = effectiveDate ? new Date(effectiveDate).toLocaleString('en-IN') : '';
            var printedBy     = (typeof FOX !== 'undefined' && FOX.employeeName) ? FOX.employeeName : '';

            var fontSize  = 7;
            var black     = rgb(0, 0, 0);
            var lineH     = 10;

            pages.forEach(function (page) {
                var w = page.getWidth();
                var h = page.getHeight();

                // draw a thin line across the bottom
                page.drawLine({
                    start: { x: 30, y: 55 },
                    end:   { x: w - 30, y: 55 },
                    thickness: 0.5,
                    color: black
                });

                // ── bottom-left ──────────────────────────────────
                var leftX  = 30;
                var startY = 50;

                page.drawText('Document Name : ' + docName, {
                    x: leftX, y: startY,
                    font: regularFont, size: fontSize, color: black
                });
                page.drawText('Document Number : ' + docNumber, {
                    x: leftX, y: startY - lineH,
                    font: regularFont, size: fontSize, color: black
                });
                page.drawText('Effective Date : ' + effectiveFmt, {
                    x: leftX, y: startY - lineH * 2,
                    font: regularFont, size: fontSize, color: black
                });
                page.drawText('Review Date : ' + reviewFmt, {
                    x: leftX, y: startY - lineH * 3,
                    font: regularFont, size: fontSize, color: black
                });

                // ── bottom-right ─────────────────────────────────
                var rightColW = 180;
                var rightX    = w - rightColW - 30;

                page.drawText('Printed By : ' + printedBy, {
                    x: rightX, y: startY,
                    font: regularFont, size: fontSize, color: black
                });
                page.drawText('Print Date : ' + printDate, {
                    x: rightX, y: startY - lineH,
                    font: regularFont, size: fontSize, color: black
                });
                page.drawText('Print Time : ' + printTime, {
                    x: rightX, y: startY - lineH * 2,
                    font: regularFont, size: fontSize, color: black
                });
                page.drawText('Print Reason : ' + printReason, {
                    x: rightX, y: startY - lineH * 3,
                    font: regularFont, size: fontSize, color: black
                });
            });

            var modifiedBytes = await pdfDoc.save();
            var blob = new Blob([modifiedBytes], { type: 'application/pdf' });
            var url  = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(function () { URL.revokeObjectURL(url); }, 2000);

        } catch (err) {
            console.error('Print error:', err);
            alert('Failed to process PDF for printing.');
        }
    }

    /* ── events ────────────────────────────────────────────────── */
    $(document).ready(function () {

        $('#dcTypeFilter').on('change', function () {
            updateDcFilterVisibility();
            populateDcYearFilter();
            applyDcFiltersAndBuild();
        });

        $('#dcYearFilter, #dcDeptFilter').on('change', function () {
            applyDcFiltersAndBuild();
        });

        /* row click */
        $('#documentControlTableBody').on('click', '.selectDocumentsBtn', function () {
            var id = $(this).attr('id');
            var record = null;
            $.each(dcFilteredList, function (i, r) {
                if (String(r.id) === String(id)) { record = r; return false; }
            });
            if (!record) return;

            dcCurrentRecordId = record.id;
            dcDocumentId      = record.id;
            dcFileName        = record.name;

            $('.editDocumentsInput[name="Name"]').val(record.name || '');
            $('.editDocumentsInput[name="Number"]').val(record.number || '');
            $('.editDocumentsInput[name="Department"]').val(record.department || '');

            if (record.withdrawalDate) {
                $('.editDocumentsInput[name="withdrawalDate"]').val(JSUTIL.getDate(record.withdrawalDate));
                $('input[name="withdrawalDate"]').closest('.form-group').show();
            } else {
                $('input[name="withdrawalDate"]').closest('.form-group').hide();
            }

            $('#editDocumentsId').val(record.id);
            $('#editRecordTitle').text((record.number || '') + ' - ' + (record.name || ''));

            $('#allDocumentsPanel').hide();
            $('#editDocumentsPanel').show();

            loadDcVersionsForDoc(record.id);
            lucide.createIcons();
        });

        /* print button → open reason modal */
        $(document).on('click', '.dcPrintBtn', function () {
            dcPrintTarget = {
                extFileId    : $(this).data('ext-file-id'),
                isLegacy     : $(this).data('is-legacy'),
                docName      : $(this).data('doc-name'),
                docNumber    : $(this).data('doc-number'),
                effectiveDate: $(this).data('effective-date')
            };
            $('#dcPrintReason').val('');
            var modal = new bootstrap.Modal(document.getElementById('dcPrintModal'));
            modal.show();
        });

        /* confirm print */
        $('#dcPrintConfirmBtn').on('click', function () {
            var reason = $('#dcPrintReason').val();
            if (!reason) { alert('Please select a print reason.'); return; }
            bootstrap.Modal.getInstance(document.getElementById('dcPrintModal')).hide();
            dcStampAndPrint(
                dcPrintTarget.extFileId,
                dcPrintTarget.isLegacy,
                dcPrintTarget.docName,
                dcPrintTarget.docNumber,
                dcPrintTarget.effectiveDate,
                reason
            );
        });

        /* close edit panel */
        $('.editDocumentsCancelBtn').on('click', function () {
            $('#allDocumentsPanel').show();
            $('#editDocumentsPanel').hide();
        });

        loadDcTypes();
        loadDcDepartments();
        loadDcRecords();
    });
</script>
<!-- allDocumentControl.js end -->
