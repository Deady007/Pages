                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" name="billingCity" class="form-control editRecordInput" readonly>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" name="billingPostalCode" class="form-control editRecordInput"
                                    readonly>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>State</label>
                                <select class="select2 form-control editRecordInput" name="billingState"
                                    id="editVendorState" disabled>
                                    <option value="">--none--</option>
                                </select>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Country</label>
                                <select class="select2 form-control editRecordInput" name="billingCountry"

                            </div>

                        </div>

                            <div class="form-group">
                                <label>Approval Valid To</label>
                                <input type="text" name="MailingState" class="datepicker form-control editRecordInput"
                                    disabled>
                            </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Approval / Rejection Date</label>

                                    disabled>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row" id="allRecordPanel">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <div class="ibox-tools">
                    <button type="button" class="btn btn-sm btn-secondary newRecordBtn"><i class="fa-plus fa"></i> New
                        Service Provider</button>
                </div>
            </div>
            <div class="ibox-content">
                <div class="table-responsive">
                    <table class="table  table-bordered table-hover dataTables">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>TAX ID</th>
                                <th>Address</th>
                            </tr>
                        </thead>
                        <tbody id="allVendorTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var innerHtml = '';

    $.each(recordList, function (i, val) {
        innerHtml += '<tr>' +
            '<td class="itemNum"><a href = "javascript:void(0);" class="selectRecordBtn" id="' + val.id + '">' + val.name + '</a></td>' +
            '<td>' + val.phone + '</td>' +
            '<td>' + val.email + '</td>' +
            '<td>' + val.gst + '</td>' +
            '<td>' + val.billingStreet + ' ' + val.billingStreet2 + ' ' + val.billingCity + ' ' + val.billingState + '</td>' +
            '</tr>';
    });
    $('#allVendorTable').append(innerHtml);
    JSUTIL.reinitializeDataTable();
    $(document).ready(function () {
        // JSUTIL.reinitializeDataTable();
    });

    var innerHtml = '';
    var layoutFields;
    $('#countryVendor').empty();
    innerHtml += '<option value = "">--none---</option>';
    $.each(countryList, function (i, val) {
        innerHtml += '<option value = "' + val.name + '">' + val.name + '</option>';
    });
    $('#countryVendor').append(innerHtml);
    var innerHtml2 = '';
    $('#stateVendor').empty();
    innerHtml2 += '<option value = "">--none---</option>';
    $.each(statesList, function (j, val2) {
        innerHtml2 += '<option value = "' + val2.name + '">' + val2.name + '</option>';
    });
    $('#stateVendor').append(innerHtml2);
    JSUTIL.callAJAXGet('/purchase/vendors/layout', buildFieldsFromLayout);
    $(document).ready(function () {
        $('.select2').select2();
        $('.newVendorSaveBtn').on('click', function () {
            JSUTIL.callAJAXFormPost('newVendorForm', callbackNewVendor);
        });
        $('.newRecordBtn').on('click', function () {
            $('#editRecordPanel').hide();
            $('#allRecordPanel').hide();
            $('#newRecordPanel').show();
        });
    });
    function callbackNewVendor(response) {
        console.log(response);
        // location.reload();
    }
    function buildFieldsFromLayout(response) {
        console.log(response);
        layoutFields = response;
        var innerHtml = LAYOUT.buildLayout(response, 'form', 'newRequestFieldInput', 'layoutRenderer_form');
        $('#layoutRenderer_form').append(innerHtml);
        $(".select2").select2();
        JSUTIL.reinitializeInputTypes();
    }
    var innerHtml = '';
    var currentRecordId = '';
    var elementToDelete = '';
    var currentRequestData;
    $('#editVendorCountry').empty();
    innerHtml += '<option value = "">--none---</option>';
    $.each(countryList, function (i, val) {
        innerHtml += '<option value = "' + val.name + '">' + val.name + '</option>';
    });
    $('#editVendorCountry').append(innerHtml);
    var innerHtml2 = '';
    $('#editVendorState').empty();
    innerHtml2 += '<option value = "">--none---</option>';
    $.each(statesList, function (j, val2) {
        innerHtml2 += '<option value = "' + val2.name + '">' + val2.name + '</option>';
    });
    $('#editVendorState').append(innerHtml2);
    $(document).ready(function () {
        $('#allRecordPanel tbody').on('click', '.selectRecordBtn', function () {
            $('.vendorSaveAndUpdateBtn').hide();
            $('.recordEditBtn').show();
            var currentId = $(this).attr('id');
            currentRecordId = currentId;
            var postUrl = JSUTIL.getUrl('/purchase/vendors/details?id=' + currentRecordId);
            JSUTIL.callAJAXGet(postUrl, getDetailsCallback);
            $.each(recordList, function (j, val2) {
                if (currentRecordId.indexOf(val2.id) >= 0) {
                    console.log(val2)
                    currentRequestData = val2;
                    buildEditFieldsFromLayout(layoutFields)
                    $('.editRecordInput[name="billingState"]').select2('val', val2.billingState);
                    $('.editRecordInput[name="billingCountry"]').select2('val', val2.billingCountry);
                    $('.editRecordInput[name="vendorType"]').select2('val', val2.vendorType);
                    $('#qualifyDisplay').text(val2.accountStatus)
                }
            });
        });
        $('.recordEditBtn').on('click', function () {
            $('.vendorSaveAndUpdateBtn').show();
        });
        $('.editRecordCancelBtn').on('click', function () {
            $('.editRecordInput').prop('disabled', true);
            $('.editRecordInput').prop('readonly', true);
        });
        $('.vendorSaveAndUpdateBtn').on('click', function () {
            let updateVendor = buildFormDataJSON('editRecordInput')
            updateNewVendor(updateVendor);
        });
        $('#deleteVendorBtn').on('click', function () {
            MODALUTIL.deleteConfirmModal(deleteVendorCallback);
        });
    });
    function getDetailsCallback(response) {
        console.log(response);
        $("#contactTable").empty();
        currentContactList = response['contacts'];
        var innerHtml = '';
        $.each(response['contacts'], function (i, val) {
            innerHtml += '<tr>' +
                '<td><button type="button" class="btn btn-default deleteTrSelect deleteContactSelect" name="' + val.id + '"><i class="fa fa-trash"></i></button><button type="button" class="btn btn-warning deleteTrSelect editContactSelect" style="margin-left: 5px;" name="' + val.id + '"><i class="fa fa-pencil "></i></button></td>' +
                '<td>' + val.firstName + ' ' + val.lastName + '</td>' +
                '<td>' + val.phone + '</td>' +
                '<td>' + val.email + '</td>' +
                '<td>' + val.city + ', ' + val.state + '</td>' +
                '</tr>';
        });
        $("#contactTable").append(innerHtml);
        $('.editContactSelect').on('click', function () {
            currentContactId = $(this).attr('name');
            $.each(currentContactList, function (i, val) {
                if (Number(currentContactId) === val.id) {
                    $('.editContactInput[name="FirstName"]').val(val.firstName);
                    $('.editContactInput[name="LastName"]').val(val.lastName);
                    $('.editContactInput[name="Phone"]').val(val.phone);
                    $('.editContactInput[name="Email"]').val(val.email);
                    $('.editContactInput[name="AddressLine1"]').val(val.addressLine1);
                    $('.editContactInput[name="AddressLine2"]').val(val.addressLine2);
                    $('.editContactInput[name="AddressLine3"]').val(val.addressLine3);
                    $('.editContactInput[name="City"]').val(val.city);
                    $('.editContactInput[name="State"]').val(val.state);
                    $('.editContactInput[name="PostalCode"]').val(val.postalCode);
                    $('.editContactInput[name="Account.Id"]').val(currentRecordId);
                    $('#editContactId').val(val.id);
                }
            });
        });
        $('.deleteContactSelect').on('click', function () {
            elementToDelete = $(this).parent().parent();
            currentContactId = $(this).attr('name');
            MODALUTIL.deleteConfirmModal(deleteContactCallback);
        });
    }
    function deleteContactCallback() {
        var postUrl = JSUTIL.getUrl('/sales/customer/delete_contact?id=' + currentContactId);
        JSUTIL.callAJAXGet(postUrl, deleteContactCompleteCallback);
    }
    function deleteContactCompleteCallback() {
        elementToDelete.remove();
    }
    function buildFormDataJSON(className) {
        let jsonPayload = {};
        $('.' + className).each(function () {
            let attrName = $(this).attr('name');
            let attrValue = $(this).val();
            console.log(attrValue);
            if (attrValue) {
                if ($(this).hasClass('datepicker') || $(this).hasClass('datepickerCompliance') || $(this).hasClass('datepickerCompliance2')) {
                    attrValue = JSUTIL.toDatabaseDate(attrValue);
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).hasClass('datetimepicker')) {
                    attrValue = JSUTIL.getDatabaseDateTime(attrValue);
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).hasClass('select2')) {
                    attrValue = $(this).select2('val');
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).attr('type') && $(this).attr('type') === 'checkbox') {
                    attrValue = $(this).prop('checked');
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).attr('type') && $(this).attr('type') === 'number') {
                    attrValue = Number(attrValue);
                    jsonPayload[attrName] = attrValue;
                } else if ($(this).attr('name') && $(this).attr('name').indexOf('.') >= 0) {
                    console.log()
                    let splitArray = $(this).attr('name').split('.');
                    jsonPayload[splitArray[0]] = {};
                    jsonPayload[splitArray[0]][splitArray[1]] = Number(attrValue);
                } else {
                    console.log(attrName);
                    if (attrName === 'id') {
                        attrValue = Number(attrValue);
                        jsonPayload[attrName] = attrValue;
                    }
                    jsonPayload[attrName] = attrValue;
                }
            }
            else if (!attrValue) {
                if ($(this).attr('type') && $(this).attr('type') === 'checkbox') {
                    attrValue = $(this).prop('checked');
                    jsonPayload[attrName] = attrValue;
                }
            }
        });
        console.info(jsonPayload);
        return jsonPayload;
    }
    function updateNewVendor(updateVendor) {
        var postUrl = JSUTIL.getUrl('/data/Account/update/' + currentRecordId);
        JSUTIL.callAJAXPost(postUrl, JSON.stringify(updateVendor), callbackAfterEditRequest);
    }
    function callbackAfterEditRequest(response) {
        console.log(response);
        location.reload();
    }
    function deleteVendorCallback() {
        var postUrl3 = JSUTIL.getUrl('/data/Account/delete?id=' + currentRecordId);
        JSUTIL.callAJAXGet(postUrl3, callbackAfterDelete);
    }
    function callbackAfterDelete() {
        location.reload();
    }
    function buildEditFieldsFromLayout(layoutFields) {
        var innerHtml = editBuildLayout(layoutFields, 'form', 'editRecordInput', 'layoutRenderer_editForm');
        $('#layoutRenderer_editForm').append(innerHtml);
        populateLayoutFields(layoutFields);
        $(".select2").select2();
        JSUTIL.reinitializeInputTypes();
    }
    function populateLayoutFields(layoutFields) {
        $.each(layoutFields, function (i, field) {
            let currentFieldVal = currentRequestData[JSUTIL.lowerCaseFirstLetter(field.name)];
            if (!field.type || (field.type.indexOf('Text') >= 0 || field.type.indexOf('Number') >= 0)) {
                $('.editRecordInput[name="' + JSUTIL.lowerCaseFirstLetter(field.name) + '"]').val(currentFieldVal);
            }
            else if (field.type && field.type.indexOf('Date') >= 0 && field.type.indexOf('DateTime') < 0) {
                $('.editRecordInput[name="' + JSUTIL.lowerCaseFirstLetter(field.name) + '"]').val(JSUTIL.getDate(currentFieldVal));
            }
            else if (field.type && field.type.indexOf('DateTime') >= 0) {
                $('.editRecordInput[name="' + JSUTIL.lowerCaseFirstLetter(field.name) + '"]').val(JSUTIL.getDateTime(currentFieldVal));
            }
            else if (field.type && field.type.indexOf('Picklist') >= 0) {
                $('.editRecordInput[name="' + JSUTIL.lowerCaseFirstLetter(field.name) + '"]').select2('val', currentFieldVal);
            }
        });
    }
    function editBuildLayout(layoutFields, type, layoutClass, layoutFormId) {
        var layoutMarkup = '';
        try {
            $.each(layoutFields, function (i, val) {
                if (!val.label) {
                    val.label = '';
                }
                if (type === 'form') {
                    $(`#${layoutFormId} .layoutRenderer_element`).remove();
                    layoutMarkup += '<div class="col-sm-6 layoutRenderer_element"><div class="form-group"><label>' + val.label + '</label>';
                } else if (type === 'table') {
                    layoutMarkup += '<td>';
                }
                var isRequired = val.required ? 'required' : '';

                if (!val.type || (val.type && val.type.indexOf('Text') >= 0)) {
                    layoutMarkup += '<input class="form-control ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" ' + isRequired + ' readonly>';
                } else if (val.type && val.type.indexOf('Number') >= 0) {
                    layoutMarkup += '<input type="number" class="form-control ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" ' + isRequired + 'readonly>';
                } else if (val.type && val.type.indexOf('Date') >= 0 && val.type.indexOf('DateTime') < 0 && val.type.indexOf('DateFromToday') < 0 && val.type.indexOf('DateTillToday') < 0) {
                    layoutMarkup += '<input class="form-control datepicker ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" ' + isRequired + 'disabled>';
                } else if (val.type && val.type.indexOf('DateFromToday') >= 0) {
                    layoutMarkup += '<input onkeydown="return false" class="form-control datepickerCompliance ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" ' + isRequired + 'disabled>';
                } else if (val.type && val.type.indexOf('DateTillToday') >= 0) {
                    layoutMarkup += '<input onkeydown="return false" class="form-control datepickerCompliance2 ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" ' + isRequired + 'disabled>';
                } else if (val.type && val.type.indexOf('DateTime') >= 0) {
                    layoutMarkup += '<input class="form-control datetimepicker ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" ' + isRequired + 'disabled>';
                } else if (val.type && val.type.indexOf('Picklist') >= 0) {
                    layoutMarkup += '<select class="select2 form-control ' + layoutClass + '" name="' + JSUTIL.lowerCaseFirstLetter(val.name) + '" disabled>';
                    if (val.name === 'SampleUnit') {
                        if (uomList) {
                            layoutMarkup += '<option value="">--none--</option>';
                            $.each(uomList, function (o, option) {
                                layoutMarkup += '<option>' + option.name + '</option>';
                            });
                        }
                    } else {
                        layoutMarkup += LAYOUT.populatePicklistValues(layoutFields, val, layoutClass);
                    }
                    layoutMarkup += '</select>';
                }
                if (type === 'form') {
                    layoutMarkup += '</div></div>'
                } else if (type === 'table') {
                    layoutMarkup += '</td>';
                }
            });
        } catch (e) { console.info(e); }
        return layoutMarkup;
    }
</script>
