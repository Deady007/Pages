<style>

<script>
    try { lucide.createIcons(); } catch(e) { console.error("lucide init:", e); }

    if ($.fn && !$.fn.datepicker)     { $.fn.datepicker     = function() { return this; }; }
    if ($.fn && !$.fn.datetimepicker) { $.fn.datetimepicker = function() { return this; }; }

    // ── Globals ──
    var currentRequestId       = '';
    var currentSampleRequest   = {};
    var currentRequestLineItems = [];
    var currentParameterItemList = [];
    var testResult2            = '';
    var recordList             = [];
    var lastSelectedTestId     = null;
    var resultParameterCache   = {};
    var resultTestResultCache  = {};

    // ── Current mode: 'worksheet' | 'result' | null ──
    var currentTestMode = null;

    // ── processStatus helpers ──
    var PROCESS_STATUS = {
        WORKSHEET        : 'Worksheet',
        RESULT_RECORDING : 'Result Recording',
        WORKSHEET_REVIEW : 'Worksheet Review',
        RESULT_REVIEW    : 'Result Review'
    };

    function getProcessBadgeClass(status) {
        if (!status) return '';
        var s = status.toLowerCase();
        if (s.includes('worksheet') && s.includes('review')) return 'badge-review';
        if (s.includes('result')    && s.includes('review')) return 'badge-review';
        if (s.includes('worksheet'))    return 'badge-worksheet';
        if (s.includes('result'))       return 'badge-result';
        return 'badge-review';
    }

    function isTestDisabled(status) {
        if (!status) return false;
        var s = status.toLowerCase();
        return s.includes('review');
    }

    // ── DataTable helpers ──
    function destroyQcDataTable() {
        if (!$.fn || !$.fn.DataTable) return;
        if ($.fn.DataTable.isDataTable('#allQualityControlDataTable')) {
            $('#allQualityControlDataTable').DataTable().clear().destroy();
        }
    }
    function initQcDataTable() {
        if (!$.fn || !$.fn.DataTable) return;
        if ($.fn.DataTable.isDataTable('#allQualityControlDataTable')) return;
        $('#allQualityControlDataTable').DataTable({ order: [], destroy: true });
    }

    function getQcStatusBadge(status) {
        var cls = 'status-submitted';
        if (status === 'QC Analysis')          cls = 'status-new';
        else if (status === 'QC Review' || status === 'Completed') cls = 'status-completed';
        return '<span class="status-badge ' + cls + '">' + (status || '-') + '</span>';
    }

    function buildQcTable() {
        destroyQcDataTable();
        $('#allServiceRequestTable').empty();
        var rows = '';
        $.each(recordList, function(i, val) {
            if (val.requestStatus !== 'QC Analysis' && val.requestStatus !== 'QC Result Recording') return;
            var badge = getQcStatusBadge(val.requestStatus);
            rows +=
                '<tr>' +
                '<td><div class="checkbox" style="margin:0;"><input class="selectRequestChkbox" type="checkbox" name="' + val.id + '"><label></label></div></td>' +
                '<td class="itemNum"><a href="javascript:void(0)" class="selectRequestBtn" id="' + val.id + '">' + (val.referenceNumber || '') + '</a></td>' +
                '<td>' + (val.description || '') + '</td>' +
                '<td>' + (val.sampleType   || '') + '</td>' +
                '<td>' + (val.sampleId     || '') + '</td>' +
                '<td>' + JSUTIL.getDate(val.receivedDate) + '</td>' +
                '<td>' + badge + '</td>' +
                '</tr>';
        });
        $('#allServiceRequestTable').append(rows);
        initQcDataTable();
        try { lucide.createIcons(); } catch(e) {}
    }

    // ── Build test dropdown with processStatus badges ──
    function buildTestDropdown(itemList) {
        var html = '<a class="dropdown-item qc-test-item" href="#" data-value="" data-process-status="">-- None --</a>';
        $.each(itemList, function(i, val) {
            var processStatus = val.processStatus || '';
            var disabled      = isTestDisabled(processStatus);
            var badgeClass    = getProcessBadgeClass(processStatus);
            var badgeHtml     = processStatus
                ? '<span class="test-process-badge ' + badgeClass + '">' + processStatus + '</span>'
                : '';
            var disabledClass = disabled ? ' disabled-test' : '';
            html += '<a class="dropdown-item qc-test-item' + disabledClass + '" href="#"' +
                ' data-value="' + val.service.id + '"' +
                ' data-process-status="' + processStatus + '"' +
                (disabled ? ' aria-disabled="true" tabindex="-1"' : '') +
                '>' +

    // ─────────────────────────────────────────────
    // Result Recording helpers
    // ─────────────────────────────────────────────
    function ensureParamList(paramList, svc) {
        if (paramList && paramList.length > 0) return paramList;
        // Synthesize a single parameter from the test itself, treated as type="on"
        return [{
            id               : 'svc_' + svc.id,     // string id so it won't collide with numeric param ids
            name             : svc.name,
            number           : '',
            specification    : svc.description || '',
            unit             : svc.unit || '',
            formula          : '',
            numberOfReadings : 1,
            numberOfDecimals : 2,
            defaultValues    : '',
            type             : 'on'                  // drives testResult2 in collectResultParameterValues
        }];
    }
    function loadResultForm(selectedItem) {
        if (!selectedItem) return;
        var serviceId = selectedItem.service.id;
        JSUTIL.startSpinner();
        JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/test-request-items/' + selectedItem.id), function(fullItem) {
            var savedResult = fullItem.testResult || null;
            if (savedResult && typeof savedResult === 'string') {
                try { savedResult = JSON.parse(savedResult); } catch(e) { savedResult = null; }
            }
            resultTestResultCache[serviceId] = savedResult;
            selectedItem._testResultObj = savedResult;
            if (resultParameterCache[serviceId]) {
                buildResultParameterForm(serviceId, ensureParamList(resultParameterCache[serviceId], selectedItem.service), savedResult);
            } else {
                JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/lab-services/' + serviceId + '/parameters'), function(paramList) {
                    var finalList = ensureParamList(paramList, selectedItem.service);
                    resultParameterCache[serviceId] = finalList;   // cache the synthesized list so re-selects work
                    buildResultParameterForm(serviceId, finalList, savedResult);
                });
            }

        });
    }

    function buildResultParameterForm(serviceId, parameterList, savedValues) {
        currentParameterItemList = parameterList.slice().sort(function(a, b) { return a.id - b.id; });
        var html = '<table class="table table-bordered table-hover"><thead><tr><th>Parameter</th><th>Specification</th><th>Test Result</th><th>Unit</th></tr></thead><tbody>';
        $.each(parameterList, function(i, val) {
            var isFormula    = val.formula && val.formula.trim() !== '';
            var readonlyAttr = isFormula ? 'readonly' : '';
            var fieldClass   = isFormula ? 'nonEditableField' : 'editableField';
            html += '<tr><td>' + val.name + (val.number ? ' (' + val.number + ')' : '') + '</td><td>' + val.specification + '</td><td>';
            if (val.numberOfReadings > 1) {
                for (var k = 0; k < val.numberOfReadings; k++) {
                    var sv = (savedValues && savedValues[val.id]) ? (savedValues[val.id].split(';')[k] || '') : '';
                    html += '<input type="text" value="' + sv + '" class="form-control result-param-input ' + fieldClass + '"' +
                        ' aria-details="' + val.number + '" aria-parameter-id="' + val.id + '" aria-description="' + k + '" ' + readonlyAttr + '>';
                }
            } else {
                var sv = (savedValues && savedValues[val.id] !== undefined) ? savedValues[val.id] : (val.defaultValues || '');
                html += '<input type="text" value="' + sv + '" class="form-control result-param-input ' + fieldClass + '"' +
                    ' aria-details="' + val.number + '" aria-parameter-id="' + val.id + '" aria-description="0" ' + readonlyAttr + '>';
            }
            html += '</td><td>' + (val.unit || '') + '</td></tr>';
        });
        html += '</tbody></table>';
        $('#resultParameterContainer').html(html).show();
        attachResultParameterAutoSave();
        JSUTIL.stopSpinner();
    }

    function attachResultParameterAutoSave() {
        $('#resultParameterContainer .result-param-input').off('input change').on('input change', function () {
            var selectedId  = $('#selectTestInput').val();
            var currentItem = currentRequestLineItems.find(function(i) {

    function collectResultParameterValues() {
        var obj = {};
        testResult2 = '';
        $('#resultParameterContainer .result-param-input').each(function () {
            var paramId = $(this).attr('aria-parameter-id').toString();
            var reading = parseInt($(this).attr('aria-description'));
            var val     = $(this).val();
            if (reading > 0) { obj[paramId] = obj[paramId] ? obj[paramId] + ';' + val : val; }
            else             { obj[paramId] = val; }
            var meta = currentParameterItemList.find(function(p) { return String(p.id) === String(paramId); });
            if (meta && meta.type === 'on') { testResult2 = obj[paramId]; }
        });
        return obj;

    // ─────────────────────────────────────────────
    // MATHJS
    // ─────────────────────────────────────────────
    var MATHJS = {
        calculate: function(fieldId, index, visitedIds) {
            visitedIds = visitedIds || new Set();
            if (visitedIds.has(String(fieldId))) return;
            visitedIds.add(String(fieldId));
            $.each(currentParameterItemList, function(_, param) {
                if (param.formula && param.formula.includes('{' + fieldId + '}')) {
                    if (param.numberOfReadings > 1) {
                        MATHJS.recalculateFormulaMultiple(param.formula, param.id, true, param.numberOfDecimals, index);
                    } else {
                        MATHJS.recalculateFormula(param.formula, param.id, true, param.numberOfDecimals);
                    }
                    MATHJS.calculate(param.id, index, visitedIds);
                    $.each(currentParameterItemList, function(_, param2) {
                        if (param2.formula && param2.formula.includes('{' + param.number + '}')) {
                            if (param2.numberOfReadings > 1) {
                                MATHJS.recalculateFormulaMultiple(param2.formula, param2.id, true, param2.numberOfDecimals, index);
                            } else {
                                MATHJS.recalculateFormula(param2.formula, param2.id, true, param2.numberOfDecimals);
                            }
                            MATHJS.calculate(param2.id, index, visitedIds);
                        }
                    });
                }
            });
        },
        recalculateFormula: function(formula, targetFieldId, isTestResult, numberOfDecimals) {
            var matches = [], regEx = /{([^}]+)}/g, text = '', avgList = [];
            while ((text = regEx.exec(formula))) { matches.push(text[1]); }
            $.each(matches, function(i, paramId) {
                var inputs = $('input[aria-details="' + paramId + '"]');
                if (inputs.length > 1) {
                    var values = [];
                    inputs.each(function() { if (this.value && !isNaN(this.value)) values.push(this.value.trim()); });
                    avgList.push.apply(avgList, values);
                    formula = formula.split('{' + paramId + '}').join(values.join(','));
                } else {
                    var sv = inputs.val();
                    if (sv && !isNaN(sv)) { avgList.push(sv.trim()); formula = formula.split('{' + paramId + '}').join(sv.trim()); }
                }
            });
            try {
                var result = MATHJS.computeFormulaResult(formula, avgList);
                if (!isNaN(result)) {
                    var dec = numberOfDecimals ? Number(numberOfDecimals) : 2;
                    $('input[aria-parameter-id="' + targetFieldId + '"]').val(result.toFixed(dec));
                }
            } catch(e) { console.error('Formula Error:', e); }
        },
        recalculateFormulaMultiple: function(formula, targetFieldId, isTestResult, numberOfDecimals, index) {
            var matches = [], regEx = /{([^}]+)}/g, text = '', avgList = [];
            while ((text = regEx.exec(formula))) { matches.push(text[1]); }
            $.each(matches, function(i, paramId) {
                var oneVal = $('input[aria-details="' + paramId + '"]')[index];
                if (oneVal && oneVal.value && !isNaN(oneVal.value)) {
                    avgList.push(oneVal.value.trim());
                    formula = formula.split('{' + paramId + '}').join(oneVal.value.trim());
                }
            });
            try {
                var result = MATHJS.computeFormulaResult(formula, avgList);
                if (!isNaN(result)) {
                    var dec = numberOfDecimals ? Number(numberOfDecimals) : 2;
                    $('input[aria-parameter-id="' + targetFieldId + '"][aria-description="' + index + '"]').val(result.toFixed(dec));
                }
            } catch(e) { console.error('Formula Error:', e); }
        },
        computeFormulaResult: function(expr, avgList) {
            if (expr.includes('AVG(')   && avgList.length) return math.mean(avgList);
            if (expr.includes('MIN('))  return math.min(avgList);
            if (expr.includes('MAX('))  return math.max(avgList);
            if (expr.includes('SUM('))  return math.sum(avgList);
            if (expr.includes('STDEV('))return math.std(avgList);
            if (expr.includes('SQRT(')) return math.sqrt(avgList);
            return math.eval(expr);
        }
    };

            if (lastSelectedTestId) {
                var prevItem = currentRequestLineItems.find(function(i) {
                    return i.service.id.toString() === lastSelectedTestId.toString();
                });
                if (prevItem) {
                    if (currentTestMode === 'worksheet' && $('#worksheetPreviewContainer').is(':visible')) {
                        prevItem.worksheet = getWorksheetHtmlWithValues();
                    } else if (currentTestMode === 'result' && $('#resultParameterContainer').is(':visible')) {
                        prevItem._testResultObj = collectResultParameterValues();
                    }
                }
            }

            $('#selectTestBtn').text(label + (processStatus ? '' : ''));
            // Rebuild button text to keep badge visual in button (show status text inline)
            $('#selectTestBtn').text(label);
            $('#selectTestInput').val(val);
            $(this).siblings().removeClass('active');
            $(this).addClass('active');

            // Reset areas
            $('#qcWorksheetArea').hide();
            $('#qcResultArea').hide();
            $('#worksheetPreviewContainer').hide();
            $('#resultParameterContainer').empty().hide();
            lastSelectedTestId = val ? val.toString() : null;

            if (!val) { showMode(null); return; }

            var selectedItem = currentRequestLineItems.find(function(i) {
                return i.service.id.toString() === val.toString();
            });

            var ps = (processStatus || '').toLowerCase();

            if (ps.includes('worksheet') && !ps.includes('review')) {
                // ── Worksheet mode ──
                showMode('worksheet');
                if (selectedItem && selectedItem.worksheet) {
                    displayWorksheetPreview(selectedItem.worksheet);
                } else {
                    $('#worksheetPreviewContainer').show();
                    $('#worksheetPreviewContent').html('');
                }

            } else if (ps.includes('result') && !ps.includes('review')) {
                // ── Result Recording mode ──
                showMode('result');
                loadResultForm(selectedItem);

            } else {
                // disabled — shouldn't reach here, but guard anyway
                showMode(null);
            }
        });

        // ── Dropdown: Department ──
        $(document).on('click', '#editDepartmentDropdownMenu .edit-department-item', function(e) {
            e.preventDefault();
            $('#editDepartmentBtn').text($(this).text());
            $('#editDepartmentDropdownMenu').closest('.form-group').find('.inward-dropdown-hidden').val($(this).data('value'));
            $(this).siblings().removeClass('active'); $(this).addClass('active');
        });

        // ── Dropdown: Material Type ──
        $(document).on('click', '#editMaterialTypeDropdownMenu .edit-materialtype-item', function(e) {
            e.preventDefault();
            $('#editMaterialTypeBtn').text($(this).text());
            $('#editMaterialTypeDropdownMenu').closest('.form-group').find('.inward-dropdown-hidden').val($(this).data('value'));
            $(this).siblings().removeClass('active'); $(this).addClass('active');
        });

        // ── Dropdown: Sample Unit ──
        $(document).on('click', '#editSampleUnitMenu .dropdown-item', function(e) {
            e.preventDefault();
            $('#editSampleUnitBtn').text($(this).text());
            $('#editSampleUnitMenu').closest('.form-group').find('.inward-dropdown-hidden').val($(this).data('value'));
            $(this).siblings().removeClass('active'); $(this).addClass('active');
        });

        // ── Dropdown: STP ──
        $(document).on('click', '#editStpDropdownMenu .dropdown-item', function(e) {
            e.preventDefault();
            $('#editStpBtn').text($(this).text());
            $('#editStpSelectionInput').val($(this).data('value'));
            $(this).siblings().removeClass('active'); $(this).addClass('active');
        });
    });
</script>
