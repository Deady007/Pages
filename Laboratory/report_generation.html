function parseDate(dateStr) {
    if (!dateStr) return null;
    const parts = dateStr.split('/');
    return new Date(parts[2], parts[1] - 1, parts[0]);
}

function filterByDate() {
    const fromDateVal = $('#fromDate').val();
    const toDateVal = $('#toDate').val();
    if (!fromDateVal || !toDateVal) {
        JSUTIL.buildErrorModal('Please select both From Date and To Date');
        return;
    }

    const fromDate = parseDate(fromDateVal);
    const toDate = parseDate(toDateVal);
    $('#allRequestTable').show();

    let hasData = false;
    $('#allServiceRequestTable tr').each(function () {
        const receivedDateText = $(this).find('td:eq(4)').text().trim();
        const receivedDate = parseDate(receivedDateText);

        let show = true;

        if (receivedDate < fromDate) show = false;
        if (receivedDate > toDate) show = false;

        $(this).toggle(show);

        if (show) hasData = true;
    });
    if (!hasData) {
        console.log('No records found for selected date range');
    }
}

        // Fetch full testResult for each line item before generating COA
        JSUTIL.startSpinner();
        var pending = currentRequestLineItems.length;
        if (pending === 0) {
            generateCoaPreview(template);
            $('#generateCoaPanel2').show();
            $('#editReviewPanel2').hide();
            JSUTIL.stopSpinner();
            return;
        }
        $.each(currentRequestLineItems, function(i, item) {
            JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/test-request-items/' + item.id), function(fullItem) {
                item.testResult = fullItem.testResult || null;
                pending--;
                if (pending <= 0) {
                    JSUTIL.stopSpinner();
                    generateCoaPreview(template);
                    $('#generateCoaPanel2').show();
                    $('#editReviewPanel2').hide();
                }
            });
        });
    });
    $('#selectTestInput').on('change', function () {
        const newTestId = $(this).val();
        const selectedItem = currentRequestLineItems.find(
            i => i.service.id.toString() === newTestId
        );
        if (selectedItem && selectedItem.worksheet) {
            displayWorksheetPreview(selectedItem.worksheet);
        } else {
            $('#worksheetPreviewContainer').hide();
        }
    });
    $('#selectTestParameterInput').on('change', function () {
        var newTestId = $(this).val();
        if (!newTestId) { $('#allParametersTable').hide(); return; }
        currentTestId = newTestId;
        var selectedItem = currentRequestLineItems.find(function(i) {
            return i.service.id.toString() === newTestId;
        });
        if (!selectedItem) return;
        JSUTIL.startSpinner();
        // Fetch individual item to get testResult (not in list response)
        JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/test-request-items/' + selectedItem.id), function(fullItem) {
            var savedResult = fullItem.testResult || null;
            if (savedResult && typeof savedResult === 'string') {
                try { savedResult = JSON.parse(savedResult); } catch(e) { savedResult = null; }
            }
            savedParameters[newTestId] = savedResult || {};
            // Fetch parameters for this service
            var postUrl = JSUTIL.getUrl('/api/lab-services/' + newTestId + '/parameters');
            JSUTIL.callAJAXGet(postUrl, selectServiceCallback);
        });

                        if (val.includes(";")) {

                        }
                    }
                });
            });
        }
    }
    JSUTIL.stopSpinner();

function getTestResultDisplay(item) {
    if (!item.testResult) return '-';
    try {
        var obj = typeof item.testResult === 'string' ? JSON.parse(item.testResult) : item.testResult;
        var parts = [];
        $.each(obj, function(k, v) { if (v) parts.push(v); });
        return parts.length > 0 ? parts.join(', ') : '-';
    } catch(e) {
        return item.testResult;
    }
}

                </div>
                <div class="coa-meta-item">
                    <span class="badge bg-secondary">COA Date:</span><span>${formatDate(today)}</span>
                </div>
            </div>

            <div class="coa-section">
                <h4>Test Results</h4>
                <table class="coa-table">
                    <thead>
                        <tr>
                            <th style="width:30%;">Parameter</th>
                            <th style="width:30%;">Specification</th>
                            <th style="width:20%;">Result</th>
                            <th style="width:20%;">Remark</th>
                        </tr>
                    </thead>
                    <tbody>`;

    $.each(currentRequestLineItems, function(idx, item) {
        coaHtml += `
                        <tr>
                            <td>${escapeHtml(item.service ? item.service.name : '-')}</td>
                            <td>${escapeHtml(item.service ? (item.service.description || '-') : '-')}</td>
                            <td>${escapeHtml(getTestResultDisplay(item))}</td>
                            <td>${escapeHtml(item.remarks || '-')}</td>
                        </tr>`;
    });

    coaHtml += `
                    </tbody>
                </table>
            </div>

            <div class="coa-section">
                <h4>Sample Information</h4>
                <table class="coa-table">
                    <tr><td style="width:30%;font-weight:600;">Sample ID</td><td>${escapeHtml(req.sampleId || '-')}</td></tr>
                    <tr><td style="font-weight:600;">Sample Name</td><td>${escapeHtml(req.sampleCondition || '-')}</td></tr>
                    <tr><td style="font-weight:600;">Sample Type</td><td>${escapeHtml(req.sampleType || '-')}</td></tr>
                    <tr><td style="font-weight:600;">Sample Quantity</td><td>${req.sampleQuantity || '-'} ${escapeHtml(req.sampleUnit || '')}</td></tr>
                    <tr><td style="font-weight:600;">Received By</td><td>${escapeHtml(req.sampleDrawnBy || '-')}</td></tr>
                </table>
            </div>

            <div class="coa-footer">
                ${(template.footer || 'This is a system-generated Certificate of Analysis.').replace(/\n/g, '<br>')}
            </div>
        </div>
    `;
    $('#generateCoaPanel2 .ibox-content').html(coaHtml);
}

// Helper function to escape HTML
function escapeHtml(str) {
    if (str == null) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// Print COA function
function printCoa() {
    var coaEl = document.getElementById('coaPreview');
    if (!coaEl) {
        toastr.warning('No COA to print. Generate the COA first.');
        return;
    }
    var printWindow = window.open('', '_blank', 'width=900,height=800');
    if (!printWindow) { alert('Popup blocked. Please allow popups for this site.'); return; }
    printWindow.document.write('<!DOCTYPE html><html><head><title>Certificate of Analysis</title>');
    printWindow.document.write('<style>');
    printWindow.document.write('body { font-family: Arial, sans-serif; margin: 20px; }');
    printWindow.document.write('.coa-preview { background: white; padding: 20px; max-width: 100%; }');
    printWindow.document.write('.coa-header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #436482; padding-bottom: 10px; }');
    printWindow.document.write('.coa-header h2 { margin: 10px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 3px; }');
    printWindow.document.write('.coa-header .header-text { font-size: 12px; color: #555; line-height: 1.6; }');
    printWindow.document.write('.coa-header .subtitle { font-size: 13px; color: #666; }');
    printWindow.document.write('.coa-header .regulatory-tags { font-size: 11px; color: #777; }');
    printWindow.document.write('.coa-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; padding: 15px; background: #f9fafb; font-size: 12px; }');
    printWindow.document.write('.coa-meta-item { display: flex; flex-direction: column; }');
    printWindow.document.write('.coa-meta-item .badge { font-weight: 600; margin-bottom: 2px; }');
    printWindow.document.write('.coa-section { margin-top: 20px; page-break-inside: avoid; }');
    printWindow.document.write('.coa-section h4 { font-size: 14px; font-weight: 600; text-transform: uppercase; color: #436482; border-bottom: 2px solid #436482; padding-bottom: 6px; margin-bottom: 10px; }');
    printWindow.document.write('.coa-table { width: 100%; border-collapse: collapse; font-size: 11px; }');
    printWindow.document.write('.coa-table th, .coa-table td { padding: 8px 10px; border: 1px solid #ddd; text-align: left; }');
    printWindow.document.write('.coa-table thead { background: #f3f4f6; }');
    printWindow.document.write('.coa-table th { font-weight: 600; }');
    printWindow.document.write('.coa-footer { margin-top: 30px; padding-top: 10px; border-top: 2px solid #ddd; font-size: 10px; text-align: center; color: #666; }');
    printWindow.document.write('</style></head><body>');
    printWindow.document.write(coaEl.outerHTML);
    printWindow.document.write('<script>window.onload = function() { window.print(); }<\/script>');
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.focus();
}

// Export COA to PDF function
function exportCoaToPdf() {
    const element = document.getElementById('coaPreview');
    if (!element) {
        toastr.warning('No COA to export');
        return;
    }
    
    // Check if html2pdf is loaded
    if (typeof html2pdf === 'undefined') {
        toastr.error('PDF library not loaded. Please include html2pdf.js');
        return;
    }
    
    const template = window.currentCoaTemplate;
    const filename = 'COA-' + (template?.name || 'template') + '-' + new Date().getTime() + '.pdf';
    
    const opt = {
        margin: 10,
        filename: filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    html2pdf().set(opt).from(element).save();
}
