<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CASE RECORD</title>

  <!-- Remove Tailwind for production; using Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Small, focused helpers to keep look compact */
    .card-case { border-radius: .75rem; border: 2px solid #d1d5db; box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
    .section-label { min-width: 8rem; font-weight: 600; color: #1f2937; }
    .notes-row { border-bottom: 1px solid #e5e7eb; padding: .5rem 0; }
    .notes-head { background: #f3f4f6; border-bottom: 2px solid #d1d5db; }
    .card-body-scroll { max-height: 80vh; overflow: auto; }
    .small-input { font-size: .95rem; padding: .35rem .5rem; }
  </style>
</head>
<body class="bg-light">
    <div class="container-fluid my-3 px-3 px-md-4">
    <div class="w-100">
      <div class="card card-case overflow-hidden w-100">
        <!-- Header -->
            <div class="card-header bg-light text-center py-3">
            <div class="border rounded bg-transparent px-3 py-1 w-100" style="border-color:#d1d5db;">
                <h1 class="h5 mb-0 text-center">CASE RECORD</h1>
            </div>
            </div>
        <!-- Scrollable content area -->
        <div class="card-body card-body-scroll p-3">
          <!-- Patient Information Section -->
          <div class="mb-3 pb-3" style="border-bottom:2px solid #d1d5db;">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Name :</label>
                  <div class="col">
                    <input type="text" id="patientName" class="form-control-plaintext small-input" readonly />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Age / Sex :</label>
                  <div class="col">
                    <input type="text" id="ageSex" class="form-control-plaintext small-input" readonly />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Address :</label>
                  <div class="col">
                    <input type="text" id="address" class="form-control-plaintext small-input" readonly />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Phone NO:</label>
                  <div class="col">
                    <input type="text" id="phoneNo" class="form-control-plaintext small-input" readonly />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Diagnosis :</label>
                  <div class="col">
                    <input type="text" id="diagnosis" class="form-control small-input" placeholder="" />
                  </div>
                </div>
              </div>

              <div class="col-12 col-md-6">
                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Date :</label>
                  <div class="col">
                    <input type="text" id="consultationDate" class="form-control-plaintext small-input" readonly />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">DOD / DEL :</label>
                  <div class="col">
                    <input type="text" id="dodDel" class="form-control small-input caserecord-datepicker" placeholder="DD/MM/YYYY" autocomplete="off" />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">DOD :</label>
                  <div class="col">
                    <input type="text" id="dod" class="form-control small-input caserecord-datepicker" placeholder="DD/MM/YYYY" autocomplete="off" />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">IPD NO :</label>
                  <div class="col">
                    <input type="text" id="ipdNo" class="form-control small-input" placeholder="Auto-generated" />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Consulting Dr. :</label>
                  <div class="col">
                    <input type="text" id="consultingDr" class="form-control-plaintext small-input" readonly />
                  </div>
                </div>

                <div class="row align-items-center mb-2">
                  <label class="col-auto section-label">Medical Officer :</label>
                  <div class="col">
                    <input type="text" id="medicalOfficer" class="form-control small-input" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Clinical Notes Table Header -->
          <div class="notes-head py-2">
            <div class="row text-center gx-0">
              <div class="col-2 border-end">
                <strong>Date</strong>
              </div>
              <div class="col-6 border-end">
                <strong>Clinical Note</strong>
              </div>
              <div class="col-4">
                <strong>Treatment</strong>
              </div>
            </div>
          </div>

          <!-- Table Body - notes -->
          <div id="clinicalNotesContainer" class="mt-2">
            <template id="clinical-note-row-template">
              <div class="row notes-row align-items-start gx-0">
                <div class="col-2 pe-2">
                  <input type="text" class="form-control form-control-sm small-input caserecord-datepicker" placeholder="DD/MM/YYYY" autocomplete="off" />
                </div>
                <div class="col-6 pe-2">
                  <textarea rows="2" class="form-control form-control-sm" placeholder="Enter clinical observations and notes..."></textarea>
                </div>
                <div class="col-4">
                  <textarea rows="2" class="form-control form-control-sm" placeholder="Enter treatment details..."></textarea>
                </div>
              </div>
            </template>

            <!-- initial rows (kept as provided) -->
            <div class="row notes-row gx-0">
              <div class="col-2 pe-2">
                <input type="text" class="form-control form-control-sm small-input caserecord-datepicker" placeholder="DD/MM/YYYY" autocomplete="off" value="03/12/2025" />
              </div>
              <div class="col-6 pe-2">
                <textarea rows="2" class="form-control form-control-sm" placeholder="Enter clinical observations and notes..."></textarea>
              </div>
              <div class="col-4">
                <textarea rows="2" class="form-control form-control-sm" placeholder="Enter treatment details..."></textarea>
              </div>
            </div>

            <!-- additional placeholder rows (if you want more, JS addNewRow will clone template) -->
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="card-footer bg-white">
          <div class="d-flex flex-wrap justify-content-center gap-2">
            <button type="button" class="btn btn-light border" onclick="addNewRow()">
              <i class="ri-add-line me-2"></i> Add Row
            </button>

            <button type="button" class="btn btn-light border" onclick="cancel()">
              <i class="ri-close-line me-2"></i> Cancel
            </button>

            <button type="button" class="btn btn-primary" onclick="saveRecord()">
              <i class="ri-save-line me-2"></i> Save Record
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- keep case-record.js unchanged -->
  <script src="../assets/js/case-record.js"></script>
  <!-- Bootstrap JS bundle (optional, for interactive components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      function init() {
        if (window.JSUTIL && typeof JSUTIL.initDatePicker === 'function') {
          JSUTIL.initDatePicker('.caserecord-datepicker');
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
