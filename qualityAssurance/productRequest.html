    <script>
        lucide.createIcons();
        // allMaterialRequestPanel.js start
        if (typeof window.jQuery === 'undefined') {
            console.log('jQuery is not loaded. Please ensure /js/vendors.min.js is loaded before this page.');
        }
        var MATERIAL_REQUEST_API_BASE = '/api/quality-assurance/product-versions';
        var recordList = Array.isArray(window.recordList)
            ? window.recordList.map(normalizeMaterialRecord)
            : [];

        function normalizeMaterialRecord(item) {
            if (!item || typeof item !== 'object') {
                return {};
            }

            var product = item.product || item.Product || null;
            var normalized = $.extend(true, {}, item);

            normalized.id = item.id != null ? item.id : item.Id;
            normalized.number = item.number != null ? item.number : item.Number;
            normalized.name = item.name != null ? item.name : item.Name;
            normalized.version = item.version != null ? item.version : item.Version;
            normalized.purpose = item.purpose != null ? item.purpose : item.Purpose;
            normalized.type = item.type != null ? item.type : item.Type;
            normalized.description = item.description != null ? item.description : item.Description;
            normalized.hsn = item.hsn != null ? item.hsn : item.Hsn;
            normalized.uom = item.uom != null ? item.uom : item.Uom;
            normalized.category = item.category != null ? item.category : item.Category;
            normalized.unitPrice = item.unitPrice != null ? item.unitPrice : item.UnitPrice;
            normalized.restockQuantity = item.restockQuantity != null ? item.restockQuantity : item.RestockQuantity;
            normalized.processStatus = item.processStatus != null ? item.processStatus : item.ProcessStatus;
            normalized.isKsm = item.isKsm != null ? item.isKsm : item.IsKsm;
            var initiator = item.initiator || item.Initiator || null;
            if (initiator && typeof initiator === 'object') {
                normalized.initiator = $.extend(true, {}, initiator);
                normalized.initiator.id = initiator.id != null ? initiator.id : initiator.Id;
                normalized.initiator.name = initiator.name != null ? initiator.name : initiator.Name;
            }

            if (product && typeof product === 'object') {
                normalized.product = $.extend(true, {}, product);
                normalized.product.id = product.id != null ? product.id : product.Id;
                normalized.product.name = product.name != null ? product.name : product.Name;
                normalized.product.number = product.number != null ? product.number : product.Number;
            }

            return normalized;
        }

        function pickValue(obj, keys, defaultValue) {
            if (!obj || typeof obj !== 'object') {
                return defaultValue;
            }
            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                if (obj[key] !== undefined && obj[key] !== null && obj[key] !== '') {
                    return obj[key];
                }
            }
            return defaultValue;
        }

        function refreshMaterialRequestList() {
            JSUTIL.callAJAXGet(
                JSUTIL.getUrl(MATERIAL_REQUEST_API_BASE),
                function (response) {
                    if (Array.isArray(response)) {
                        recordList = response.map(normalizeMaterialRecord);
                        window.recordList = recordList;
                    } else {

            var sorted = (records || []).slice().sort(function (a, b) {
                var sa = String(a.processStatus || '').toLowerCase().trim();
                var sb = String(b.processStatus || '').toLowerCase().trim();
                var oa = statusOrder[sa] || 99;
                var ob = statusOrder[sb] || 99;
                if (oa !== ob) return oa - ob;
                var na = String(a.name || (a.product && a.product.name) || '').toLowerCase();
                var nb = String(b.name || (b.product && b.product.name) || '').toLowerCase();
                if (na < nb) return -1;
                if (na > nb) return 1;
                return 0;
            });
            var innerHtml = '';
            $.each(sorted, function (i, val) {

            var unique = {};
            var allUoms = [];

            if (Array.isArray(window.uomList)) {
                $.each(window.uomList, function (_, uom) {
                    var name = (uom && (uom.name || uom.Name)) ? (uom.name || uom.Name) : '';

        function getProgressStepForStatus(status) {
            const normalized = (status || '').toLowerCase();
            if (!normalized) {
                return 1;
            }
            if (normalized === 'new' || normalized === 'rejected') {
                return 1;
            }
            if (normalized === 'in review') {
                return 2;
            }
            if (normalized === 'accepted') {
                return 3;
            }
            return 1;
        }

        function updateProgressSteps(status) {
            const currentStep = getProgressStepForStatus(status);
            const $steps = $('.step-button');
            $steps.each(function () {
                var stepNumber = Number($(this).data('step'));
                $(this).removeClass('active completed');
                const isCompleted = stepNumber < currentStep;
                const isActive = stepNumber === currentStep;
                $(this).toggleClass('completed', isCompleted);
                $(this).toggleClass('active', isActive);
            });
        }

        // Cache to avoid repeated server hits and to allow case-insensitive client-side filtering
        var productSearchCache = null;
        function createBootstrapDropdownForSelect(selectEl, proxyContainerEl, opts) {
            var $select = $(selectEl);
            var $proxy = $(proxyContainerEl);
            var placeholder = (opts && opts.placeholder) || 'Choose Option';

            $select.addClass('d-none'); // hide real select, keep for logic/payload

            function buildMenuHtml() {
                var html = '';
                $select.find('option').each(function () {
                    var val = $(this).attr('value');
                    var text = $(this).text();
                    if (val === '') return; // skip --none--
                    html += '<button type="button" class="dropdown-item bs-select-item" data-value="' +
                        String(val).replace(/"/g, '&quot;') + '">' +
                        $('<div/>').text(text).html() +
                        '</button>';
                });
                return html;
            }

            var dropdownId = 'bsDD_' + Math.random().toString(36).slice(2);

            $proxy.html(
                '<div class="dropdown w-100">' +
                '<button class="btn btn-default dropdown-toggle w-100 text-start" type="button" id="' + dropdownId + '" data-bs-toggle="dropdown" aria-expanded="false">' +
                placeholder +
                '</button>' +
                '<div class="dropdown-menu w-100" aria-labelledby="' + dropdownId + '" style="max-height:260px; overflow:auto;">' +
                buildMenuHtml() +
                '</div>' +
                '</div>'
            );

            var $btn = $proxy.find('button.dropdown-toggle');
            var $menu = $proxy.find('.dropdown-menu');

            function syncLabel() {
                var v = $select.val();
                if (!v) { $btn.text(placeholder); return; }
                var t = $select.find('option[value="' + v.replace(/"/g, '\\"') + '"]').text();
                $btn.text(t || placeholder);
            }

            $proxy.off('click.bsSelect').on('click.bsSelect', '.bs-select-item', function () {
                var newVal = $(this).data('value');
                $select.val(newVal).trigger('change'); // IMPORTANT: keeps your existing logic
                syncLabel();
            });

            function rebuildMenu() {
                $menu.html(buildMenuHtml());
                syncLabel();
            }

            $select.on('change.bsSelectSync', function () {
                syncLabel();
            });

            syncLabel();

            return { rebuildMenu: rebuildMenu, syncLabel: syncLabel };
        }
        $(document).ready(function () {

            // Bootstrap dropdown proxies (selects must have ids in HTML)

            var uomProxy = createBootstrapDropdownForSelect(

            window.uomProxy = uomProxy;

                $('#editRecordPanel').hide();
                $('#allRecordPanel').show();
            }

            $('.newRecordBtn').on('click', function () {

            });

            $('.newRecordCancelBtn').on('click', function () {
                showAllRecordsPanel();
            });

            $('#purposeValue').on('change', function () {
                var purpose = $('#purposeValue').val();
                var $np = $('#newRecordPanel');
                selectedDocumentForDuplication = null;
                $('.serviceSelectInput').val('');
                $('#versionNumber').val('');

                if (purpose === 'New') {
                    $np.find('input[name="name"]').closest('.col-sm-6').show();
                    $np.find('input[name="number"]').closest('.col-sm-6').show();
                    $np.find('input[name="product.id"]').closest('.col-sm-6').hide();
                    document.getElementById('versionNumber').value = '01';
                } else {
                    $np.find('input[name="name"]').closest('.col-sm-6').hide();
                    $np.find('input[name="number"]').closest('.col-sm-6').hide();
                    $np.find('input[name="product.id"]').closest('.col-sm-6').show();
                    document.getElementById('versionNumber').value = '';
                }
            });

            // Product search typeahead functionality
            $('.serviceSelectInput').on('input', function () {
                var searchTerm = $(this).val();

                if (searchTerm.length >= 2) {
                    var searchTermLower = searchTerm.toLowerCase();
                    fetchProductsForSearch(function (products) {
                        var filtered = (products || []).filter(function (product) {
                            var nameLower = (product.name || product.Name || '').toLowerCase();
                            var numberLower = (product.number || product.Number || '').toLowerCase();
                            return nameLower.indexOf(searchTermLower) !== -1 || numberLower.indexOf(searchTermLower) !== -1;
                        });
                        callbackProductSearch(filtered, searchTerm);
                    });
                } else {
                    // Clear search results when search term is less than 2 characters
                    $('.product-search-results').remove();
                }
            });

            // Handle product selection
            $(document).on('click', '.product-search-item', function () {
                var selectedProduct = $(this).data();
                populateSelectedProduct(selectedProduct);
                $('.product-search-results').remove();
            });

            $(document).off('click.materialReqSave', '.newMaterialSaveBtn');
            $(document).on('click.materialReqSave', '.newMaterialSaveBtn', function () {
                saveNewMaterialRequest($(this));
            });

            var uomSelect = $('select[name="uom"]');
            uomSelect.empty().append(buildUomOptionsHtml());
            if (window.uomProxy) window.uomProxy.rebuildMenu();


            // Ensure Is KSM is only available for Raw Material on load
            toggleIsKsmField($typeSelect.val());

            // Auto-uppercase Material Code on both panels
            $(document).on('input', '.newRecordInput[name="number"], .editRecordInput[name="number"]', function () {
                var v = String($(this).val() || '');
                var up = v.toUpperCase();
                if (v !== up) {
                    var pos = this.selectionStart;
                    $(this).val(up);
                    try { this.setSelectionRange(pos, pos); } catch (e) { }
                }
            });

            // Normalize unitPrice / restockQuantity to 2 decimal places on blur
            $(document).on('blur', '.newRecordInput[name="unitPrice"], .editRecordInput[name="unitPrice"], .newRecordInput[name="restockQuantity"], .editRecordInput[name="restockQuantity"]', function () {
                var raw = $(this).val();
                if (raw === '' || raw == null) return;
                var num = parseFloat(raw);
                if (isNaN(num)) { $(this).val(''); return; }
                $(this).val(num.toFixed(2));
            });
        });

        var employeeCache = null;
        var employeeCachePromise = null;
        function fetchEmployeesOnce(cb) {
            if (employeeCache) { cb(employeeCache); return; }
            if (employeeCachePromise) { employeeCachePromise.then(cb); return; }
            employeeCachePromise = fetch('/api/employees', { method: 'GET' })
                .then(function (r) { return r.ok ? r.json() : []; })
                .then(function (list) {
                    employeeCache = Array.isArray(list) ? list : [];
                    return employeeCache;
                })
                .catch(function () { employeeCache = []; return employeeCache; });
            employeeCachePromise.then(cb);
        }
        function getEmployeeNameById(id, cb) {
            if (id == null || id === '') { cb(''); return; }
            fetchEmployeesOnce(function (list) {
                var match = list.find(function (e) {
                    var eid = (e && (e.id != null ? e.id : e.Id));
                    return String(eid) === String(id);
                });
                if (!match) { cb(''); return; }
                var nm = match.name || match.Name || match.fullName || match.FullName
                    || ((match.firstName || '') + (match.lastName ? ' ' + match.lastName : '')).trim()
                    || match.username || match.Username || '';
                cb(nm);
            });
        }

        function checkMaterialCodeUnique(number, excludeVersionId, cb) {
            if (!number) { cb(true); return; }
            var needle = String(number).toUpperCase().trim();
            var versions = (window.recordList || []);
            var clashInVersions = versions.some(function (r) {
                if (excludeVersionId != null && Number(r.id) === Number(excludeVersionId)) return false;
                var rn = r.number || r.Number || '';
                return String(rn).toUpperCase().trim() === needle;
            });
            if (clashInVersions) { cb(false); return; }
            JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/products'), function (products) {
                var clashInProducts = (products || []).some(function (p) {
                    var pn = (p && (p.number || p.Number)) || '';
                    return String(pn).toUpperCase().trim() === needle;
                });
                cb(!clashInProducts);
            }, function () { cb(true); });
        }

        // Fetch and cache products once, then filter client-side for case-insensitive search
        function fetchProductsForSearch(callback) {
            if (productSearchCache) {
                if (typeof callback === 'function') {
                    callback(productSearchCache);
                }
                return;
            }

            JSUTIL.callAJAXGet(JSUTIL.getUrl('/api/products'), function (res) {
                productSearchCache = res || [];
                if (typeof callback === 'function') {
                    callback(productSearchCache);
                }
            });
        }

        function callbackProductSearch(response, searchTerm) {
            // Remove existing results
            $('.product-search-results').remove();

            if (response && response.length > 0) {
                var resultsHtml = '<div class="product-search-results" style="position: absolute; z-index: 1000; background: white; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; width: 100%;">';

                $.each(response, function (i, product) {
                    var name = pickValue(product, ['name', 'Name'], '');
                    var number = pickValue(product, ['number', 'Number'], '');
                    var version = pickValue(product, ['version', 'Version'], '00');
                    var id = pickValue(product, ['id', 'Id'], '');
                    var type = pickValue(product, ['type', 'Type'], '');
                    var description = pickValue(product, ['description', 'Description'], '');
                    var hsn = pickValue(product, ['hsn', 'Hsn'], '');
                    var uom = pickValue(product, ['uom', 'Uom'], '');
                    var unitPrice = pickValue(product, ['unitPrice', 'UnitPrice', 'unitprice'], '');
                    var category = pickValue(product, ['category', 'Category'], '');
                    var restockQuantity = pickValue(product, ['restockQuantity', 'RestockQuantity', 'restockquantity'], '');
                    resultsHtml += '<div class="product-search-item" style="padding: 8px; cursor: pointer; border-bottom: 1px solid #eee;" ' +
                        'data-id="' + id + '" ' +
                        'data-name="' + name + '" ' +
                        'data-number="' + number + '" ' +
                        'data-type="' + type + '" ' +
                        'data-description="' + description + '" ' +
                        'data-hsn="' + hsn + '" ' +
                        'data-uom="' + uom + '" ' +
                        'data-unitprice="' + unitPrice + '" ' +
                        'data-category="' + category + '" ' +
                        'data-restockquantity="' + restockQuantity + '" ' +
                        'data-version="' + version + '">' +
                        '<strong>' + name + '</strong>' +
                        (number ? ' <span style="color: #555;">| ' + number + '</span>' : '') +
                        ' <span style="color: #999;">(v' + version + ')</span>' +
                        '</div>';
                });

                resultsHtml += '</div>';

                $('.serviceSelectInput').parent().css('position', 'relative').append(resultsHtml);

                // Add hover effect
                $('.product-search-item').hover(
                    function () {
                        $(this).css('background-color', '#f5f5f5');
                    },
                    function () {
                        $(this).css('background-color', 'white');
                    }
                );
            }
        }

        function incrementVersion(currentVersion) {
            if (!currentVersion || currentVersion === '') {
                return '01';
            }

            // Parse the version number
            var versionNum = parseInt(currentVersion, 10);

            if (isNaN(versionNum)) {
                return '01';
            }

            // Increment and format with leading zero if needed
            var newVersionNum = versionNum + 1;
            return newVersionNum.toString().padStart(2, '0');
        }

        function callbackNewProduct(response) {
            
            console.log(response);
            location.reload()
            if (Array.isArray(response)) {
                recordList = response.map(normalizeMaterialRecord);
                window.recordList = recordList;
                renderMaterialRequestTable(recordList);
                $('#newRecordPanel').hide();
                $('#allRecordPanel').show();
                return;
            }
            refreshMaterialRequestList();
            $('#newRecordPanel').hide();
            $('#allRecordPanel').show();
        }

        function callbackNewProductFailure() {
            console.log('Save failed. Please check API endpoint and required fields.');
        }

        function saveNewMaterialRequest($btn) {
            var categoryPayload = JSUTIL.buildFormDataJSON('newRecordInput');
            var _missing = [];
            if (!categoryPayload.purpose) _missing.push('Purpose');
            if (categoryPayload.purpose === 'New') {
                if (!categoryPayload.name) _missing.push('Material Name');
                if (!categoryPayload.number) _missing.push('Material Code');
            } else if (categoryPayload.purpose === 'Revised') {
                if (!categoryPayload['product.id']) _missing.push('Material');
            }
            if (!categoryPayload.uom) _missing.push('UOM');
            if (!categoryPayload.type) _missing.push('Type');
            if (categoryPayload.unitPrice === '' || categoryPayload.unitPrice == null) _missing.push('Unit Price');
            if (categoryPayload.restockQuantity === '' || categoryPayload.restockQuantity == null) _missing.push('Restock/Minimum Quantity');
            if (_missing.length) {
                alert('Please fill the required field(s): ' + _missing.join(', '));
                return;
            }
            categoryPayload.isKsm = $('#isKsmCheckbox').is(':checked');
            categoryPayload.category = $('#blendingMaterialCheckbox').is(':checked') ? 'Blending Material' : '';
            if (categoryPayload.number) {
                categoryPayload.number = String(categoryPayload.number).toUpperCase();
            }
            try {
                var _fox = (typeof FOX !== 'undefined' && FOX) ? FOX : (window.FOX || {});
                var _iniId = _fox.employeeId != null ? _fox.employeeId : _fox.userId;
                categoryPayload.initiator = { id: _iniId };
                delete categoryPayload['initiator.id'];
                console.log('[materialReq] initiator payload:', categoryPayload.initiator, 'FOX:', _fox);
            } catch (e) { console.warn('[materialReq] initiator set failed', e); }

            var codeToCheck = categoryPayload.purpose === 'New' ? categoryPayload.number : '';
            checkMaterialCodeUnique(codeToCheck, null, function (isUnique) {
                if (!isUnique) {
                    alert('Material Code "' + categoryPayload.number + '" already exists. Please use a unique code.');
                    return;
                }
                if ($btn && $btn.prop) $btn.prop('disabled', true);

                var postUrl = MATERIAL_REQUEST_API_BASE;
                var headers = {
                    'Content-Type': 'application/json'
                };
                var token = $("meta[name='_csrf']").attr("content");
                var csrfHeader = $("meta[name='_csrf_header']").attr("content");
                if (token && csrfHeader) {
                    headers[csrfHeader] = token;
                }

                fetch(postUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(categoryPayload)
                })
                    .then(function (res) {
                        if (!res.ok) {
                            return res.text().then(function (txt) {
                                throw new Error('Create failed (' + res.status + '): ' + txt);
                            });
                        }
                        return res.json();
                    })
                    .then(function (data) {
                        callbackNewProduct(data);
                    })
                    .catch(function (err) {
                        console.error(err);
                        console.log('Save failed: ' + (err.message || 'Unknown error'));
                        if ($btn && $btn.prop) $btn.prop('disabled', false);
                        callbackNewProductFailure();
                    });
            });
        }

        function populateSelectedProduct(product) {
            var selectedVersion = pickValue(product, ['version', 'Version'], '');
            var nextVersion = incrementVersion(selectedVersion);
            var selectedName = pickValue(product, ['name', 'Name'], '');
            var selectedId = pickValue(product, ['id', 'Id'], '');
            var selectedNumber = pickValue(product, ['number', 'Number'], '');
            var selectedHsn = pickValue(product, ['hsn', 'Hsn'], '');
            var selectedDescription = pickValue(product, ['description', 'Description'], '');
            var selectedUnitPrice = pickValue(product, ['unitPrice', 'UnitPrice', 'unitprice'], '');
            var selectedRestockQuantity = pickValue(product, ['restockQuantity', 'RestockQuantity', 'restockquantity'], '');
            var selectedType = pickValue(product, ['type', 'Type'], '');
            var selectedUom = pickValue(product, ['uom', 'Uom'], '');
            var selectedCategory = pickValue(product, ['category', 'Category'], '');

            $('.serviceSelectInput').val(selectedName);
            $('.selectSearchInputAutoCompleteId1').val(selectedId);
            $('input[name="name"]').val(selectedName);
            $('input[name="number"]').val(selectedNumber);
            $('#versionNumber').val(nextVersion);
            $('input[name="hsn"]').val(selectedHsn);
            $('input[name="description"]').val(selectedDescription);
            $('input[name="unitPrice"]').val(selectedUnitPrice);
            $('input[name="restockQuantity"]').val(selectedRestockQuantity);

            setSelectValue('select[name="type"]', selectedType);
            setSelectValue('select[name="uom"]', selectedUom);
            var isBlending = selectedCategory === 'Blending Material';
            $('#blendingMaterialCheckbox').prop('checked', isBlending);
            $('#categoryHiddenInput').val(isBlending ? 'Blending Material' : '');
        }

        // Close dropdown when clicking outside
        $(document).on('click', function (e) {
            if (!$(e.target).closest('.serviceSelectInput').length) {
                $('.product-search-results').remove();
            }
        });
