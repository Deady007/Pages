  function setEditPlantSelection(plantIds) {
    var normalizedIds = normalizePlantIdArray(plantIds);
    var dropdown = $('#editBOMPlantSelect');
    if (!normalizedIds.length) {
      var choices = dropdown.data('choices-instance');
      if (choices) {
        choices.removeActiveItems();
      } else {
        dropdown.val(null);
      }
      return;
    }
    if (!editPlantOptionsCache) {
      loadPlantList(function () {
        setEditPlantSelection(normalizedIds);
      });
      return;
    }
    normalizedIds.forEach(function (plantId) {
      if (dropdown.find('option[value="' + plantId + '"]').length) {
        return;
      }
      var plant = (editPlantOptionsCache || []).find(function (p) {
        return String(p.id || p.Id) === String(plantId);
      });
      var name = plant ? (plant.name || plant.Name || '') : '';
      var number = plant ? (plant.number || plant.Number || '') : '';
      var label = number ? (number + ' | ' + name) : (name || plantId);
      dropdown.append('<option value="' + plantId + '">' + label + '</option>');
    });
    var choices = dropdown.data('choices-instance');
    if (choices) {
      choices.setChoiceByValue(normalizedIds);
    } else {
      dropdown.val(normalizedIds).trigger('change');
    }
  }

  function normalizePlantIdArray(value) {
    if (value === undefined || value === null) {
      return [];
    }
    if (Array.isArray(value)) {
      return value.reduce(function (acc, item) {
        return acc.concat(normalizePlantIdArray(item));
      }, []).filter(function (id) { return id !== ''; }).map(String);
    }
    if (typeof value === 'object') {
      var objectId = value.id || value.Id;
      return objectId ? normalizePlantIdArray(objectId) : [];
    }
    var strVal = String(value);
    if (!strVal) {
      return [];
    }
    if (strVal.indexOf(';') !== -1) {
      return strVal.split(';').map(function (id) { return id.trim(); }).filter(function (id) { return id !== ''; });
    }
    return [strVal];
  }

  function getPlantIdsFromData(data) {
    if (!data) {
      return [];
    }
    var ids = [];
    ids = ids.concat(normalizePlantIdArray(data.plants || data.Plants));
    ids = ids.concat(normalizePlantIdArray(data.plant || data.Plant));
    var seen = {};
    return ids.filter(function (id) {
      if (!id) {
        return false;
      }
      if (seen[id]) {
        return false;
      }
      seen[id] = true;
      return true;
    });
  }

  function bindUppercaseInput(selector) {
    $(document).on('input', selector, function () {
      var current = $(this).val() || '';
      var upper = current.toUpperCase();
      if (upper !== current) {
        $(this).val(upper);
      }
    });
  }

  function toUpperSafe(value) {
    return (value || '').toString().toUpperCase();
  }

  window.showEditBOMPanel = function (record) {
    if (!record) {
      console.error('No BOM record supplied to edit panel');
      return;
    }

    currentBOMRecord = record;
    currentBOMRecordId = record.id || record.Id;
    hideApprovalRemarksPanel();
    populateEditBOMForm(record);
    var displayName = record.name || record.Name || '';
    var bpcr = record.masterBatchRecord || record.MasterBatchRecord || '';
    var title = (displayName ? displayName : '') + (bpcr ? ' | ' + bpcr : '');
    $('#editBOMName').text(title ? title : '');
    var permissions = getBOMPermissionFlags();
    var isLocked = isBOMLocked();
    var canEdit = permissions.canSubmit;
    $('.editBOMEditBtn').toggle(canEdit && !isLocked);
    $('.saveBOMEditBtn').hide();
    setBOMEditState(false);
    $('#allBOMPanel').hide();
    $('#newBOMPanel').hide();
    $('#editBOMPanel').show();
    isRevisingBOM = false;
    setReviseButtonState(false);
    recipeStepList = [];
    clearStepMaterialStores();
    renderStepList();
    applyMaterialPermissions();
    var status = (record.processStatus || record.ProcessStatus || '').toLowerCase();
    var recordRemarks = record.approvalRemarks || record.ApprovalRemarks || '';
    recordRemarks = recordRemarks && recordRemarks.toString ? recordRemarks.toString().trim() : '';
    if (recordRemarks) {
      showApprovalRemarksPanel(recordRemarks);
    } else if (status === 'returned') {
      fetchReturnRemarks(currentBOMRecordId);
    }
    loadRecipeSteps(currentBOMRecordId, function () {
      fetchRecipeItems(currentBOMRecordId);
    });
  };
  // editBomPanel.js end



  // newBOMPanel.js start 
  var stageOptionsCache = [];
  var plantOptionsCache = [];

  $(document).ready(function () {

    bindUppercaseInput('.newBOMInput[name="masterBatchRecord"]');

    $('.newRecipesButton').on("click", function () {

  function fetchDetails() {
    var postUrl = '/data/ProductStage/list'
    var postData = {
      fields: "Name;Product.Id;Plant.Id;Number;ProcessStatus",
    }
    JSUTIL.callAJAXPost(postUrl, JSON.stringify(postData), function (res) {

      // Filter to only show Approved stages

      var dropdown = $('select[name="stage.id"]');

        const productCode = product.number || product.Number || '';
        const paddedStage = stageName.padEnd(15, ' ').replace(/ /g, '\u00A0');

        dropdown.append(`<option value="${id}">${stageCode} | ${paddedStage} </option>`);
      });

  }

  function updateNewBOMProductDetails(stageId) {

      if (choices) {
        choices.removeActiveItems();
      } else {

    // Ensure options are loaded before setting value
    if (!plantOptionsCache || !plantOptionsCache.length) {
      loadPlantOptions(normalizedIds);

    normalizedIds.forEach(function (plantId) {
      if (dropdown.find('option[value="' + plantId + '"]').length) {

      var name = plant ? (plant.name || plant.Name || '') : '';
      var number = plant ? (plant.number || plant.Number || '') : '';
      var label = number ? (number + ' | ' + name) : (name || plantId);
      dropdown.append('<option value="' + plantId + '">' + label + '</option>');
    });
    var choices = dropdown.data('choices-instance'); if (choices) { choices.setChoiceByValue(normalizedIds); } else { dropdown.val(normalizedIds); }
  }


  function createBOMApi(postData) {
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    var headers = {
      "Content-Type": "application/json"
    };
    if (token && header) {
      headers[header] = token;
    }

    fetch('/api/product-recipes', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(postData)
    }).then(async function (response) {
      if (!response.ok) {
        var text = await response.text();
        throw new Error(text || ('HTTP ' + response.status));
      }
      return response.text();
    }).then(function (responseText) {
      var parsed = {};
      try {
        parsed = responseText ? JSON.parse(responseText) : {};
      } catch (e) { }
      console.log('BOM created:', parsed);
      window.location.hash = 'list';
      location.reload();
    }).catch(function (error) {
      console.error('Error creating BOM:', error);
      JSUTIL.buildErrorModal('Error creating BOM: ' + error.message);
    });
  }
