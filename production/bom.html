<style>
/* ═══════════════════════════════════════════════════════════════════
   BOM DARK MODE — reference: departments.html
   Activate by adding class="dark-mode" to <body> or any ancestor.
═══════════════════════════════════════════════════════════════════ */
.dark-mode {
  --bom-bg:           #1a1d23;
  --bom-bg-secondary: #22262f;
  --bom-bg-card:      #2a2f3b;
  --bom-bg-input:     #1e2230;
  --bom-bg-input-ro:  #181c27;
  --bom-bg-thead:     #252a36;
  --bom-border:       #3a4055;
  --bom-border-light: #2e3347;
  --bom-text:         #e2e8f0;
  --bom-text-muted:   #8892a4;
  --bom-text-label:   #a0aec0;
  --bom-accent:       #4f8ef7;
  --bom-accent-green: #34d399;
  --bom-shadow:       0 2px 8px rgba(0,0,0,0.4);
}

/* ── Base panel ── */
.dark-mode .qa-white-panel,
.dark-mode #allBOMPanel,
.dark-mode #editBOMPanel,
.dark-mode #newBOMPanel {
  background: var(--bom-bg) !important;
  color: var(--bom-text) !important;
}

/* ── ibox ── */
.dark-mode .ibox,
.dark-mode .ibox.float-e-margins {
  background: var(--bom-bg-secondary) !important;
  border-color: var(--bom-border) !important;
  box-shadow: var(--bom-shadow) !important;
}
.dark-mode .ibox-title {
  background: var(--bom-bg-secondary) !important;
  border-bottom-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}
.dark-mode .ibox-content {
  background: var(--bom-bg-secondary) !important;
  border-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}

/* ── Cards ── */
.dark-mode .bom-lot-card,
.dark-mode .bom-history-card {
  background: var(--bom-bg-card) !important;
  border-color: var(--bom-border) !important;
  box-shadow: var(--bom-shadow) !important;
}

/* ── Titles ── */
.dark-mode .details-subtitle {
  color: var(--bom-accent) !important;
  border-left-color: var(--bom-accent) !important;
}

/* ── Labels ── */
.dark-mode label,
.dark-mode .form-group label {
  color: var(--bom-text-label) !important;
}

/* ── Inputs ── */
.dark-mode .form-control,
.dark-mode input.form-control,
.dark-mode select.form-control,
.dark-mode textarea.form-control {
  background-color: var(--bom-bg-input) !important;
  border-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}
.dark-mode .form-control:focus {
  background-color: var(--bom-bg-input) !important;
  border-color: var(--bom-accent) !important;
  color: var(--bom-text) !important;
  box-shadow: 0 0 0 2px rgba(79,142,247,0.25) !important;
}
.dark-mode .form-control[readonly],
.dark-mode .form-control:disabled,
.dark-mode input[readonly],
.dark-mode select:disabled {
  background-color: var(--bom-bg-input-ro) !important;
  color: var(--bom-text-muted) !important;
  border-color: var(--bom-border-light) !important;
  opacity: 1 !important;
}

/* ── Material row inputs ── */
.dark-mode .material-product-code,
.dark-mode .material-product-search,
.dark-mode .material-uom,
.dark-mode .material-type-display,
.dark-mode .material-qty-input {
  background-color: var(--bom-bg-input) !important;
  border-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}

/* ── Tables ── */
.dark-mode .table {
  color: var(--bom-text) !important;
  border-color: var(--bom-border) !important;
}
.dark-mode .table thead th {
  background: var(--bom-bg-thead) !important;
  color: var(--bom-text-muted) !important;
  border-color: var(--bom-border) !important;
}
.dark-mode .table tbody td,
.dark-mode .table tbody th {
  border-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}
.dark-mode .table-bordered,
.dark-mode .table-bordered td,
.dark-mode .table-bordered th { border-color: var(--bom-border) !important; }
.dark-mode .table tbody tr.info,
.dark-mode .table tbody tr.info td {
  background: rgba(79,142,247,0.12) !important;
  color: var(--bom-text) !important;
}
.dark-mode .table-responsive { border-color: var(--bom-border) !important; }

/* ── DataTables — matches departments.html dark style ── */
.dark-mode .dataTables_wrapper { color: var(--bom-text) !important; }

.dark-mode .dataTables_wrapper .dataTables_length,
.dark-mode .dataTables_wrapper .dataTables_filter {
  color: var(--bom-text-muted) !important;
  padding: 8px 4px;
}
.dark-mode .dataTables_wrapper .dataTables_length label,
.dark-mode .dataTables_wrapper .dataTables_filter label {
  color: var(--bom-text-muted) !important;
  font-size: 13px;
}
.dark-mode .dataTables_wrapper .dataTables_length select {
  background: var(--bom-bg-input) !important;
  border: 1px solid var(--bom-border) !important;
  color: var(--bom-text) !important;
  border-radius: 4px;
  padding: 2px 6px;
}
.dark-mode .dataTables_wrapper .dataTables_filter input {
  background: var(--bom-bg-input) !important;
  border: 1px solid var(--bom-border) !important;
  color: var(--bom-text) !important;
  border-radius: 4px;
  padding: 4px 8px;
  outline: none;
}
.dark-mode .dataTables_wrapper .dataTables_filter input:focus {
  border-color: var(--bom-accent) !important;
  box-shadow: 0 0 0 2px rgba(79,142,247,0.2) !important;
}
.dark-mode .dataTables_wrapper .dataTables_info {
  color: var(--bom-text-muted) !important;
  font-size: 13px;
  padding-top: 10px;
}
.dark-mode .dataTables_wrapper .dataTables_paginate { padding-top: 8px; }
.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button {
  background: transparent !important;
  border: 1px solid transparent !important;
  color: var(--bom-text-muted) !important;
  border-radius: 4px;
  padding: 4px 10px !important;
  margin: 0 1px;
  font-size: 13px;
}
.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
  background: var(--bom-bg-card) !important;
  border-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}
.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button.current,
.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
  background: var(--bom-accent) !important;
  border-color: var(--bom-accent) !important;
  color: #fff !important;
  font-weight: 600;
}
.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button.disabled,
.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button.disabled:hover {
  background: transparent !important;
  border-color: transparent !important;
  color: #444c60 !important;
  cursor: default;
}
.dark-mode table.dataTable thead .sorting:after,
.dark-mode table.dataTable thead .sorting_asc:after,
.dark-mode table.dataTable thead .sorting_desc:after,
.dark-mode table.dataTable thead .sorting:before,
.dark-mode table.dataTable thead .sorting_asc:before,
.dark-mode table.dataTable thead .sorting_desc:before {
  color: var(--bom-text-muted) !important;
  opacity: 0.6;
}
/* odd/even stripe removed — matches departments.html (no row background, transparent) */
.dark-mode table.dataTable tbody tr.odd,
.dark-mode table.dataTable tbody tr.even { background: transparent !important; }
.dark-mode table.dataTable tbody tr:hover,
.dark-mode table.dataTable tbody tr.odd:hover,
.dark-mode table.dataTable tbody tr.even:hover { background: rgba(79,142,247,0.07) !important; }

/* ── BOM list link ── */
.dark-mode #allBOMDataTable .selectBOMRecord { color: var(--bom-accent) !important; }

/* ── Buttons ── */
.dark-mode .btn-default,
.dark-mode .btn-white {
  background: var(--bom-bg-card) !important;
  border-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}
.dark-mode .btn-default:hover,
.dark-mode .btn-white:hover {
  background: #343a4a !important;
  border-color: var(--bom-accent) !important;
}
.dark-mode .btn-secondary {
  background: var(--bom-accent) !important;
  border-color: var(--bom-accent) !important;
  color: #fff !important;
}
.dark-mode .btn-primary  { background: #2563eb !important; border-color: #2563eb !important; color: #fff !important; }
.dark-mode .btn-warning  { background: #d97706 !important; border-color: #d97706 !important; color: #fff !important; }
/* ── Lot collapse panels ── */
.dark-mode .panel-default { background: var(--bom-bg-card) !important; border-color: var(--bom-border) !important; }
.dark-mode .panel-default > .panel-heading {
  background: var(--bom-bg-card) !important;
  border-bottom-color: var(--bom-border) !important;
  color: var(--bom-text) !important;
}
.dark-mode .panel-default > .panel-heading a { color: var(--bom-text) !important; }
.dark-mode .panel-body { background: var(--bom-bg-card) !important; color: var(--bom-text) !important; }

/* ── Step type badges ── */
.dark-mode .label-success { background: #065f46 !important; color: #a7f3d0 !important; }
.dark-mode .label-primary { background: #1e3a8a !important; color: #bfdbfe !important; }
.dark-mode .label-info    { background: #164e63 !important; color: #a5f3fc !important; }

/* ── Misc ── */
.dark-mode .text-muted { color: var(--bom-text-muted) !important; }
.dark-mode .border-bottom { border-bottom-color: var(--bom-border) !important; }
.dark-mode .material-empty-row td {
  color: var(--bom-text-muted) !important;
  background: var(--bom-bg-card) !important;
}
.dark-mode .delete-material-row {
  background: transparent !important;
  border-color: var(--bom-border) !important;
  color: #f87171 !important;
}
.dark-mode .delete-material-row:hover {
  background: rgba(248,113,113,0.15) !important;
  border-color: #f87171 !important;
}

/* ── Modals ── */

.dark-mode .modal-footer { background: var(--bom-bg-card) !important; border-top-color: var(--bom-border) !important; }

/* ── Scrollbars ── */
.dark-mode ::-webkit-scrollbar { width: 6px; height: 6px; }

<script>
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }





  window.FOX.userGroupNames = ['production_head', 'production'];
  window.recordList = [];

  function getNextBOMNumber() {
    // Format: TI-XXXX-RR  (XXXX = base 4-digit, RR = revision 2-digit)
    // New BOM always gets RR = 00  e.g. TI-0001-00, TI-0002-00
    var maxBase = 0;
    (window.recordList || []).forEach(function (item) {
      var name = item.name || item.Name || '';
      // Match TI-XXXX  OR  TI-XXXX-RR
      var m = String(name).match(/^TI-0*(\d+)(?:-\d+)?$/);
      if (m) {
        var base = parseInt(m[1], 10);
        if (!isNaN(base) && base > maxBase) { maxBase = base; }
      }
    });
    return 'TI-' + String(maxBase + 1).padStart(4, '0') + '-00';
  }

  // Returns the next revision name for an existing BOM name.
  // TI-0001-00  →  TI-0001-01
  // TI-0001-03  →  TI-0001-04
  // TI-0001     →  TI-0001-01  (legacy format fallback)
  function getNextRevisionName(currentName) {
    var name = String(currentName || '').trim();
    var m = name.match(/^(TI-\d{4})-(\d+)$/);
    if (m) {
      var nextRev = parseInt(m[2], 10) + 1;
      return m[1] + '-' + String(nextRev).padStart(2, '0');
    }
    // Legacy format without suffix
    var m2 = name.match(/^(TI-\d{4})$/);
    if (m2) { return m2[1] + '-01'; }
    // Unknown – just append -01
    return name + '-01';
  }
  window.recipeStepList = [];

  function renderBOMTable(data) {
    try {
      if ($.fn.DataTable && $.fn.DataTable.isDataTable('.dataTables')) {
        $('.dataTables').DataTable().destroy();
      }
      $('#allBOMTable').empty();
      var innerHtml = "";

      (data || []).forEach(function (val) {
        var displayName = val.name || val.Name || '';
        var bpcrNumber = val.masterBatchRecord || val.MasterBatchRecord || '';
        var product = val.productStage && (val.productStage.product || val.productStage.Product) || {};
        var stage = val.productStage || {};
        var productCode = product.number || product.Number || '';
        var productName = product.name || product.Name || '';
        var stageCode = stage.number || stage.Number || '';
        var stageName = stage.name || stage.Name || '';

        innerHtml += `
            <tr data-id="${val.id || val.Id || ''}" class="bom-record-row">
                <td><a href="javascript:void(0);" class="selectBOMRecord" data-id="${val.id || val.Id || ''}">${displayName}</a></td>
                <td>${bpcrNumber}</td>
                <td>${val.type || val.Type || ''}</td>
                <td>${productCode} | ${productName}</td>
                <td>${stageCode} | ${stageName}</td>
                <td>${val.processStatus || val.ProcessStatus || ''}</td>
            </tr>
        `;
      });

      $('#allBOMTable').html(innerHtml);
      // Single clean DataTable init (matches departments.html pattern)
      if ($.fn && $.fn.DataTable) {
        if ($.fn.DataTable.isDataTable('#allBOMDataTable')) {
          $('#allBOMDataTable').DataTable().clear().destroy();

        $('#allBOMDataTable').DataTable({
          order: [[0, 'desc']],

        });
      }

      console.error('Error rendering BOM table:', e);
    }
  }

  function fetchBOMList(onDone) {

        if (!response.ok) {
          var text = await response.text();
          throw new Error(text || ('HTTP ' + response.status));
        }
        return response.json();
      })
      .then(function (recipes) {
        window.recordList = Array.isArray(recipes) ? recipes : [];
        renderBOMTable(window.recordList);
        if (typeof onDone === 'function') {
          onDone(window.recordList);
        }
      })
      .catch(function (error) {
        console.error('BOM list load failed:', error);
        if (typeof onDone === 'function') {
          onDone([]);
        }
      });

    var isProduction = groups.indexOf('qa') !== -1 || groups.indexOf('production') !== -1 || isFox;

  function getActivityTimestamp(activity) {
    var dateValue = activity && (activity.createdDate || activity.CreatedDate || activity.modifiedDate || activity.ModifiedDate) || '';
    var parsed = Date.parse(dateValue);
    if (!isNaN(parsed)) {
      return parsed;
    }
    var idValue = Number(activity && (activity.id || activity.Id));
    return isNaN(idValue) ? 0 : idValue;
  }

  function getLatestReturnReason(activityList) {
    if (!Array.isArray(activityList) || !activityList.length) {
      return '';
    }
    var normalized = activityList.filter(function (item) {
      var reason = (item && (item.reason || item.Reason) || '').trim();
      // var status = (item && (item.status || item.Status) || '').toLowerCase();
      if (!reason) {
        return false;
      }
      return true;
    });
    var listToUse = normalized.length ? normalized : activityList;
    listToUse.sort(function (a, b) {
      return getActivityTimestamp(b) - getActivityTimestamp(a);
    });
    var latest = listToUse[0] || {};
    return (latest.reason || latest.Reason || '').trim();
  }

  function fetchReturnRemarks(bomId) {

    // NOTE: /api/process-activities/list POST with conditions body returns [] (not supported).
    // Use GET /api/process-activities/parent/{id} and filter client-side for latest return reason.
    // var payload_unused_post = {
    //   fields: 'Id;Reason;Status;ParentRecordId',

          if (isEditable) {

          }

    $('.editBOMInput[name="masterBatchRecord"]').val(masterBatchRecord);

  function populateStageDropdown(record) {
    var dropdown = $('#editStageId');
    var selectedStageId = '';
    var selectedStageName = '';

    if (record.stage && record.stage.id) {
      selectedStageId = record.stage.id;
      selectedStageName = record.stage.name || '';
    } else if (record.productStage && record.productStage.id) {
      selectedStageId = record.productStage.id;
      selectedStageName = record.productStage.name || '';
    } else if (record.stageId) {
      selectedStageId = record.stageId;
    } else if (record.productStage && typeof record.productStage === 'string') {
      selectedStageName = record.productStage;
    }

    loadStageList(function (stageList) {
      dropdown.empty();
      dropdown.append('<option value="">--none--</option>');

      stageList.forEach(function (stage) {
        var name = (stage.name || stage.Name || '').padEnd(15, ' ').replace(/ /g, '\u00A0');
        var product = stage.product || stage.Product || {};
        var productName = product.name || product.Name || '';
        var productCode = product.number || product.Number || '';
        var optionLabel = stage.number + ' | ' + name + ' | ' + (productCode ? productCode + ' | ' : '') + productName;
        dropdown.append('<option value="' + (stage.id || stage.Id) + '">' + optionLabel + '</option>');
      });

      if (!selectedStageId && selectedStageName) {
        var match = stageList.find(function (stage) {
          return stage.name === selectedStageName;
        });
        if (match) {
          selectedStageId = match.id;
        }
      }

      dropdown.val(selectedStageId || '');
      dropdown.trigger('change');
      if (!updateEditProductDetailsFromStage(selectedStageId)) {
        setEditProductFields(extractProductInfoFromRecord(record));
      }
    });

  function loadStageList(callback) {
    if (cachedStageList) {
      if (typeof callback === 'function') {
        callback(cachedStageList);
      }
      return;
    }

    var postUrl = '/data/ProductStage/list';
    var postData = {
      fields: 'Name;Product.Id;Product.Name;Product.Number;Product.Uom;Plant.Id;Plant.Name;Plant.Number;Number;ProcessStatus'
    };

    JSUTIL.callAJAXPost(postUrl, JSON.stringify(postData), function (response) {
      // Filter to only show Approved stages
      cachedStageList = (response || []).filter(function (item) {
        var status = (item.processStatus || item.ProcessStatus || '').trim();
        return status === 'Approved';
      });
      if (typeof callback === 'function') {
        callback(cachedStageList);
      }
    });
  }

  function setReviseButtonState(isDisabled) {
    $('#reviseBOMBtn').prop('disabled', !!isDisabled);
  }

  function resolveNextRevisionVersion(record) {
    var currentVersion = Number(record && (record.version || record.Version || 0));
    if (isNaN(currentVersion)) {
      currentVersion = 0;
    }
    return currentVersion + 1;
  }

  function startBOMRevision() {
    if (isRevisingBOM) {
      return;
    }
    if (!currentBOMRecordId || !currentBOMRecord) {
      JSUTIL.buildErrorModal('Select a BOM before revising.');
      return;
    }
    var permissions = getBOMPermissionFlags();
    if (!permissions.canSubmit) {
      return;
    }
    if (!isBOMApproved()) {
      JSUTIL.buildErrorModal('Only an approved BOM can be revised.');
      return;
    }
    isRevisingBOM = true;
    setReviseButtonState(true);
    var nextVersion = resolveNextRevisionVersion(currentBOMRecord);
    fetchRevisionBlueprint(currentBOMRecordId, function (steps, materials) {
      createRevisedBOMRecord(nextVersion, steps, materials);
    }, function (msg) {
      handleRevisionError(msg || 'Unable to prepare BOM revision.');
    });
  }

  function fetchRevisionBlueprint(bomId, onSuccess, onError) {
    fetchRevisionSteps(bomId, function (steps) {
      fetchRevisionMaterials(bomId, function (materials) {
        if (typeof onSuccess === 'function') {
          onSuccess(steps, materials);
        }
      }, onError);
    }, onError);
  }

  function fetchRevisionSteps(bomId, callback, onError) {
    fetch('/api/product-recipe-steps/product-recipe/' + Number(bomId))
      .then(function (res) { return res.json(); })
      .then(function (res) {
        var sorted = (res || []).sort(function (a, b) {
          var seqA = Number(a.sequence || a.Sequence || 0);
          var seqB = Number(b.sequence || b.Sequence || 0);
          return seqA - seqB;
        });
        if (typeof callback === 'function') {
          callback(sorted);
        }
      })
      .catch(function () {
        if (typeof onError === 'function') {
          onError('Unable to fetch steps for revision.');
        }
      });
  }

  function fetchRevisionMaterials(bomId, callback, onError) {
    // NOTE: /api/product-recipe-byproducts/list POST with conditions body returns [] (not supported).
    // Use the dedicated GET endpoint: /api/product-recipe-byproducts/product-recipe/{id}
    // var payload_unused_post = {
    //   fields: 'Id;Type;Quantity;Product.Id;Product.Name;Product.Number;Product.Uom;Step.Id;Step.Name;Step.Sequence;ProductRecipe.Id',
    //   conditions: ['ProductRecipe.Id = ' + Number(bomId)],
    //   logic: '{0}'
    // };
    JSUTIL.callAJAXGet('/api/product-recipe-byproducts/product-recipe/' + Number(bomId), function (res) {
      if (typeof callback === 'function') {
        callback(res || []);
      }
    }, function () {
      if (typeof onError === 'function') {
        onError('Unable to fetch materials for revision.');
      }
    });
  }

  function buildRevisionPayload(nextVersion) {
    var record = currentBOMRecord || {};
    var stage = record.productStage || record.ProductStage || record.stage || record.Stage || {};
    var plantIds = getPlantIdsFromData(record);
    if (!plantIds.length) {
      plantIds = getPlantIdsFromData(stage);
    }
    var quantityVariation = record.quantityVariation;
    if (quantityVariation === undefined || quantityVariation === null) {
      quantityVariation = record.QuantityVariation;
    }
    var currentName = record.name || record.Name || '';
    var masterBatchRecord = record.masterBatchRecord || record.MasterBatchRecord || currentName;
    // Name format: TI-XXXX-RR — getNextRevisionName increments the RR suffix
    // e.g. TI-0006-00 → TI-0006-01, TI-0006-01 → TI-0006-02
    var revisedName = getNextRevisionName(currentName);
    // version field stays the same as the source record (name suffix tracks iteration)
    var sourceVersion = Number(record.version || record.Version || 1) || 1;
    var payload = {
      masterBatchRecord: toUpperSafe(masterBatchRecord),
      name: toUpperSafe(revisedName),
      type: record.type || '',
      productQuantity: Number(record.productQuantity || record.ProductQuantity || 0) || 0,
      quantityVariation: Number(quantityVariation || 0) || 0,
      version: sourceVersion,
      processStatus: 'New',
      createdDate: new Date().toISOString()
    };
    var stageId = stage.id || stage.Id || record.stageId;
    if (stageId) {
      payload.productStage = { id: stageId };
    }
    if (plantIds.length) {
      payload.plants = plantIds.join(';');
    }
    return payload;
  }

  function formatRevisionName(currentName, nextVersion) {
    // Derive the new name purely from currentName, ignoring nextVersion.
    // Delegates to getNextRevisionName so both Revise and Submit-for-Review
    // use the same naming logic.
    return getNextRevisionName(currentName);
  }

  function createRevisedBOMRecord(nextVersion, steps, materials) {
    var payload = buildRevisionPayload(nextVersion);
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    var headers = {
      "Content-Type": "application/json"
    };
    if (token && header) {
      headers[header] = token;
    }

    console.log('Creating revised BOM with payload:', JSON.stringify(payload));
    fetch('/api/product-recipes', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(payload)
    }).then(async function (response) {
      if (!response.ok) {
        var text = await response.text();
        throw new Error('Server ' + response.status + ': ' + (text || 'Unknown error'));
      }
      return response.json();
    }).then(function (res) {
      var newId = res && (res.id || res.Id);
      if (!newId) {
        console.error('createRevisedBOMRecord: server response had no id:', res);
        handleRevisionError('Unable to create revised BOM');
        return;
      }
      createRevisionSteps(newId, steps, function (stepIdMap) {
        copyMaterialsToRevision(newId, materials, stepIdMap, function () {
          markOriginalBOMDeprecated().then(function () {
            openRevisedBOM(newId, nextVersion, res);
          });
        }, handleRevisionError);
      }, handleRevisionError);
    }).catch(function (error) {
      console.error('Revision Failed:', error);
      handleRevisionError('Unable to create revised BOM: ' + error.message);
    });
  }

  function createRevisionSteps(newRecipeId, steps, callback, onError) {
    // Strategy:
    //  1. Create all steps sequentially via POST (POST returns full list - cannot trust response for id)
    //  2. After ALL steps are created, do ONE GET /product-recipe-steps/product-recipe/{newRecipeId}
    //  3. Build stepIdMap by matching each old step (name + sequence) → new step id
    var oldStepMeta = (steps || []).map(function (s) {
      return {
        oldKey:  getStepKey(s.id || s.Id),
        name:    String(s.name || s.Name || '').trim(),
        seq:     Number(s.sequence || s.Sequence || 0),
        type:    s.type || s.Type || ''
      };
    });

    var queue = oldStepMeta.slice();

    function postNextStep() {
      if (!queue.length) {
        // All POSTs done — now GET the created steps and build the map
        resolveStepIdMap();
        return;
      }
      var meta = queue.shift();
      var payload = {
        name:          meta.name,
        productRecipe: { id: Number(newRecipeId) },
        type:          meta.type,
        sequence:      meta.seq
      };
      JSUTIL.callAJAXPost('/api/product-recipe-steps', JSON.stringify(payload), function () {
        // Ignore response — POST returns full list; we resolve ids via GET after all are created
        postNextStep();
      }, function () {
        if (typeof onError === 'function') {
          onError('Unable to copy steps to revised BOM.');
        }
      });
    }

    function resolveStepIdMap() {
      fetch('/api/product-recipe-steps/product-recipe/' + Number(newRecipeId))
        .then(function (r) { return r.json(); })
        .then(function (newSteps) {
          var stepIdMap = {};
          oldStepMeta.forEach(function (meta) {
            // Match by name + sequence against the newly created steps
            var match = (newSteps || []).find(function (ns) {
              return String(ns.name || ns.Name || '').trim() === meta.name &&
                     Number(ns.sequence || ns.Sequence || 0) === meta.seq;
            });
            if (match && (match.id || match.Id)) {
              stepIdMap[meta.oldKey] = match.id || match.Id;
              console.log('stepIdMap:', meta.oldKey, '→', stepIdMap[meta.oldKey], '(', meta.name, ')');
            } else {
              console.warn('No match for step:', meta.name, 'seq:', meta.seq);
            }
          });
          if (typeof callback === 'function') {
            callback(stepIdMap);
          }
        })
        .catch(function (err) {
          console.error('resolveStepIdMap GET failed:', err);
          // Return empty map so materials still get created (just without step assignment)
          if (typeof callback === 'function') {
            callback({});
          }
        });
    }

    postNextStep();
  }

  function copyMaterialsToRevision(newRecipeId, materials, stepIdMap, callback, onError) {
    var payload = (materials || []).map(function (item) {
      var productId = getMaterialProductId(item);
      var qtyValue = Number(getMaterialQuantityValue(item) || 0);
      if (!productId || !qtyValue) {
        return null;
      }
      var sourceStepId = getMaterialStepId(item);
      var mappedStepId = sourceStepId ? stepIdMap[getStepKey(sourceStepId)] : '';
      var entry = {
        productRecipe: { id: Number(newRecipeId) },
        product: { id: Number(productId) || productId },
        type: item.type || item.Type || MATERIAL_DEFAULT_META.typeValue,
        quantity: qtyValue,
        name: getMaterialProductName(item) || item.name || item.Name || ''
      };
      if (mappedStepId) {
        entry.step = { id: Number(mappedStepId) || mappedStepId };
      }
      return entry;
    }).filter(Boolean);

    if (!payload.length) {
      if (typeof callback === 'function') {
        callback();
      }
      return;
    }

    JSUTIL.callAJAXPost('/api/product-recipe-byproducts/create_multiple', JSON.stringify(payload), function () {
      if (typeof callback === 'function') {
        callback();
      }
    }, function () {
      if (typeof onError === 'function') {
        onError('Unable to copy materials to revised BOM.');
      }
    });
  }

  function markOriginalBOMDeprecated() {
    if (!currentBOMRecordId) {
      return Promise.resolve();
    }
    var originalId = currentBOMRecordId;
    // Full GET then PUT so no fields are wiped by a partial payload
    return fetch('/api/product-recipes/' + originalId, { method: 'GET' })
      .then(function (res) { return res.json(); })
      .then(function (r) {
        var deprecatedPayload = {
          id:                r.id,
          name:              r.name              || '',
          masterBatchRecord: r.masterBatchRecord || '',
          type:              r.type              || '',
          productQuantity:   r.productQuantity   || 0,
          quantityVariation: r.quantityVariation || 0,
          version:           r.version           || 1,
          plants:            r.plants            || '',
          processStatus:     'Deprecated',
          createdDate:       r.createdDate       || r.CreatedDate  || null,
          approvedDate:      r.approvedDate      || r.ApprovedDate || null
        };
        if (r.productStage && r.productStage.id) {
          deprecatedPayload.productStage = { id: r.productStage.id };
        }
        var token  = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");
        var headers = { 'Content-Type': 'application/json' };
        if (token && header) { headers[header] = token; }
        return fetch('/api/product-recipes/' + originalId, {
          method:  'PUT',
          headers: headers,
          body:    JSON.stringify(deprecatedPayload)
        });
      })
      .then(function () {
        // Update local cache
        if (Array.isArray(window.recordList)) {
          var existing = window.recordList.find(function (item) {
            return String(item.id || item.Id) === String(originalId);
          });
          if (existing) { existing.processStatus = 'Deprecated'; }
        }
        console.log('Original BOM marked Deprecated:', originalId);
      })
      .catch(function (err) {
        console.warn('Failed to deprecate original BOM:', err);
      });
  }

  function openRevisedBOM(newId, newVersion, createResponse) {
    isRevisingBOM = false;
    setReviseButtonState(false);
    // Reload the page with the new record's hash so:
    //  1. The BOM list is re-fetched fresh from the server (old record shows as Deprecated)
    //  2. The new revised record is opened directly from server data
    var newHash = 'edit/' + newId;
    if (window.location.hash.replace('#', '') !== newHash) {
      window.location.hash = newHash;
    }
    location.reload();
  }

  function handleRevisionError(message) {
    isRevisingBOM = false;
    setReviseButtonState(false);
    if (message) {
      JSUTIL.buildErrorModal(message);
    }
  }

  function updateBOMProcessStatus(nextStatus) {
    if (!currentBOMRecordId) {
      return;
    }
    // Problem: sending only { processStatus } in PUT wipes all other fields (backend does full replacement).
    // Fix: GET the full record first, then PUT back all fields with only processStatus changed.
    // GET response shape (from API): { id, name, type, productQuantity, quantityVariation,
    //   masterBatchRecord, version, processStatus, plants, productStage: { id, ... } }
    fetch('/api/product-recipes/' + currentBOMRecordId, { method: 'GET' })
      .then(function (res) { return res.json(); })
      .then(function (r) {
        var postData = {
          id:                r.id,
          name:              r.name              || '',
          type:              r.type              || '',
          productQuantity:   r.productQuantity   || 0,
          quantityVariation: r.quantityVariation || 0,
          masterBatchRecord: r.masterBatchRecord || '',
          version:           r.version           || 1,
          plants:            r.plants            || '',
          processStatus:     nextStatus         
        };
        // Preserve the productStage relation using just its id (avoid sending the full nested object)
        if (r.productStage && r.productStage.id) {
          postData.productStage = { id: r.productStage.id };
        }
        if (String(nextStatus || '').toLowerCase() === 'approved') {
          postData.approvedDate = new Date().toISOString();
        }
        var token  = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");
        var headers = { 'Content-Type': 'application/json' };
        if (token && header) { headers[header] = token; }
        return fetch('/api/product-recipes/' + currentBOMRecordId, {
          method:  'PUT',
          headers: headers,
          body:    JSON.stringify(postData)
        });
      })
      .then(function (res) { return res.json(); })
      .then(function (res) {
        console.log('Status updated:', res);
        if (currentBOMRecord) {
          currentBOMRecord.processStatus = nextStatus;
          if (String(nextStatus || '').toLowerCase() === 'approved') {
            currentBOMRecord.approvedDate = new Date().toISOString();
          }
        }
        location.reload();
      })
      .catch(function (err) {
        console.error('Failed to update process status:', err);
        JSUTIL.buildErrorModal('Failed to update status: ' + (err.message || err));
      });
  }

  function fetchBOMVersionHistory(record) {
    var masterBatchRecord = record && (record.masterBatchRecord || record.MasterBatchRecord);
    if (!masterBatchRecord || !String(masterBatchRecord).trim()) {
      renderBOMVersionHistory([]);
      return;
    }
    // NOTE: /api/product-recipes/list POST with conditions body returns [] (not supported).
    // Use GET /api/product-recipes and filter client-side by masterBatchRecord.
    // var payload_unused_post = {
    //   fields: 'Id;Name;MasterBatchRecord;Version;ProcessStatus;ApprovedDate;CreatedDate',
    //   conditions: ["MasterBatchRecord = '" + safeMBR + "'"],
    //   orderBy: 'Version DESC',
    //   logic: '{0}'
    // };
    // JSUTIL.callAJAXPost('/api/product-recipes/list', JSON.stringify(payload_unused_post), ...)
    JSUTIL.callAJAXGet('/api/product-recipes', function (res) {
      // Filter client-side: only show records with the same masterBatchRecord (case-insensitive)
      var mbrLower = masterBatchRecord.trim().toLowerCase();
      var filtered = (res || []).filter(function (item) {
        var itemMBR = (item.masterBatchRecord || item.MasterBatchRecord || '').trim().toLowerCase();
        return itemMBR === mbrLower;
      });
      filtered.sort(function (a, b) {
        return Number(b.version || b.Version || 0) - Number(a.version || a.Version || 0);
      });
      renderBOMVersionHistory(filtered);
    }, function () {
      renderBOMVersionHistory([]);
    });
  }

  function renderBOMVersionHistory(list) {
    var $body = $('#bomVersionHistoryBody');
    if (!$body.length) {
      return;
    }
    $body.empty();
    if (!list || !list.length) {
      $body.append('<tr class="text-muted"><td colspan="5">No versions found.</td></tr>');
      return;
    }
    var currentId = currentBOMRecord && (currentBOMRecord.id || currentBOMRecord.Id);
    list.sort(function (a, b) {
      return Number(b.version || b.Version || 0) - Number(a.version || a.Version || 0);
    });
    list.forEach(function (item) {
      var version = item.version || item.Version || '';
      var status = item.processStatus || item.ProcessStatus || '';
      var name = item.name || item.Name || '';
      var rowId = item.id || item.Id || '';
      var approvedDate = item.approvedDate || item.ApprovedDate || '';
      var createdDate = item.createdDate || item.CreatedDate || '';
      var isCurrent = currentId && rowId && String(currentId) === String(rowId);
      var approvedDisplay = approvedDate ? formatDisplayDate(approvedDate) : '';
      var createdDisplay = createdDate ? formatDisplayDate(createdDate) : '';
      var rowHtml = '' +
        '<tr class="' + (isCurrent ? 'info' : '') + '">' +
        '<td>' + sanitizeInputValue(version) + (isCurrent ? ' (current)' : '') + '</td>' +
        '<td>' + sanitizeInputValue(status) + '</td>' +
        '<td>' + sanitizeInputValue(name) + '</td>' +
        '<td>' + sanitizeInputValue(createdDisplay) + '</td>' +
        '<td>' + sanitizeInputValue(approvedDisplay) + '</td>' +
        '</tr>';
      $body.append(rowHtml);
    });
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  }

  function formatDisplayDate(dateValue) {
    if (!dateValue) {
      return '';
    }
    var parsed = Date.parse(dateValue);
    if (!isNaN(parsed)) {
      var d = new Date(parsed);
      return d.toLocaleString();
    }
    return String(dateValue);
  }

  function renderStepList(activeStepId) {
    var $container = $('#editStepListContainer');
    if (!$container.length) {
      return;
    }
    $container.empty();
    var hasSteps = recipeStepList && recipeStepList.length;
    var normalizedActive = activeStepId ? getStepKey(activeStepId) : '';
    if (!hasSteps) {
      $container.append('<div class="text-muted">No steps yet. Use Add Lot to create your first step.</div>');
      applyMaterialPermissions();
      return;
    }
    (recipeStepList || []).forEach(function (step, idx) {
      var stepKey = getStepKey(step.id || step.Id);
      ensureStepMaterialStore(stepKey);
      var collapseId = 'collapse-' + stepKey;
      var safeName = sanitizeInputValue(step.name || step.Name || ('Lot ' + (idx + 1)));
      var stepTypeValue = step.type || step.Type || '';
      var stepTypeLabel = stepTypeValue ? getMaterialTypeLabel(stepTypeValue) : '';
      var badgeClass = 'label-info';
      var normalizedType = String(stepTypeValue).toLowerCase();
      if (normalizedType.indexOf('raw') !== -1) badgeClass = 'label-success';
      else if (normalizedType.indexOf('packing') !== -1) badgeClass = 'label-primary';
      else if (normalizedType.indexOf('general') !== -1) badgeClass = 'label-info';

      var stepTypeBadge = stepTypeLabel ? ('<span class="label ' + badgeClass + ' step-type-badge pull-right">' + sanitizeInputValue(stepTypeLabel) + '</span>') : '';
      var isOpen = normalizedActive ? normalizedActive === stepKey : idx === 0;
      var panelHtml = '' +
        '<div class="panel panel-default step-panel">' +
        '<div class="panel-heading">' +
        '<h5 class="panel-title clearfix">' +
        '<a data-toggle="collapse" data-bs-toggle="collapse" data-parent="#editStepListContainer" data-bs-parent="#editStepListContainer" href="#' + collapseId + '" data-target="#' + collapseId + '" data-bs-target="#' + collapseId + '" aria-expanded="' + (isOpen ? 'true' : 'false') + '">' +
        '<i class="fa ' + (isOpen ? 'fa-caret-down' : 'fa-caret-right') + ' step-toggle-icon" style="margin-right:6px; pointer-events: none;"></i>' +
        'Lot - ' + safeName +
        '</a>  ' + stepTypeBadge +
        '</h5>' +
        '</div>' +
        '<div id="' + collapseId + '" class="panel-collapse collapse ' + (isOpen ? 'in show' : '') + '">' +
        '<div class="panel-body">' +
        '<div class="row" style="padding-bottom:10px;">' +
        '<div class="col-sm-6 text-muted">Add materials to this step.</div>' +
        '<div class="col-sm-6" align="right">' +
        '<button type="button" class="btn btn-default btn-sm material-add-btn" data-step-id="' + stepKey + '"><i data-lucide="plus"></i> Add Material</button> ' +
        '<button type="button" class="btn btn-sm btn-secondary material-save-btn" data-step-id="' + stepKey + '"><i data-lucide="check"></i> Save</button>' +
        '</div>' +
        '</div>' +
        '<div class="table-responsive">' +
        '<table class="table table-bordered table-hover">' +
        '<thead><tr><th style="width:50px;"></th><th>Product Code</th><th>Product Name</th><th>Product UOM</th><th>Type</th><th>Standard Qty</th></tr></thead>' +
        '<tbody id="' + getMaterialTableBodyId(stepKey) + '" data-step-key="' + stepKey + '"></tbody>' +
        '</table>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';
      $container.append(panelHtml);
    });
    (recipeStepList || []).forEach(function (step) {
      var stepKey = getStepKey(step.id || step.Id);
      buildMaterialTableRows(stepKey, stepMaterialsMap[stepKey] || []);
    });
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
    applyMaterialPermissions();
  }

  function applyMaterialPermissions() {
    if (!currentBOMRecord) {
      return;
    }
    var permissions = getBOMPermissionFlags();
    var isLocked = isBOMLocked();
    var isInReview = currentBOMRecord && currentBOMRecord.processStatus === 'In-Review';
    var isApproved = currentBOMRecord && currentBOMRecord.processStatus === 'Approved';
    var isDeprecated = isBOMDeprecated();
    var showEditActions = permissions.canSubmit && !isLocked;
    var canRevise = permissions.canSubmit && !!currentBOMRecordId && !isRevisingBOM && isApproved;

    $('.material-add-btn').toggle(showEditActions);
    $('.material-save-btn').toggle(showEditActions);
    $('.add-step-btn').toggle(showEditActions);
    $('.submitBOMReview').toggle(permissions.canSubmit && !isLocked);
    $('.approveBOMBtn, .rejectBOMBtn').toggle(permissions.canApprove && isInReview);
    $('.material-qty-input').prop('disabled', !!isLocked);
    $('.material-product-search').prop('disabled', !!isLocked);
    $('.material-product-code').prop('disabled', !!isLocked);
    $('.delete-material-row').toggle(!isLocked && !isDeprecated);
    $('#reviseBOMBtn').toggle(canRevise).prop('disabled', !canRevise);
  }

  function resetAddStepModalState() {
    $('#addStepNameInput').val('');
    $('#addStepNameError').hide();
    $('#addStepTypeSelect').val('');
    $('#addStepTypeError').hide();
    $('#confirmAddStepBtn').prop('disabled', false);
  }

  function handleAddStep() {
    if (!currentBOMRecordId) {
      JSUTIL.buildErrorModal('Please save or select a BOM before adding steps.');
      return;
    }
    if (isBOMLocked()) {
      return;
    }
    resetAddStepModalState();
    (bootstrap.Modal.getInstance($('#addStepModal')[0]) || new bootstrap.Modal($('#addStepModal')[0])).show();
  }

  function submitAddStep() {
    if (!currentBOMRecordId) {
      JSUTIL.buildErrorModal('Please save or select a BOM before adding steps.');
      bootstrap.Modal.getInstance($('#addStepModal')[0])?.hide();
      return;
    }
    if (isBOMLocked()) {
      bootstrap.Modal.getInstance($('#addStepModal')[0])?.hide();
      return;
    }

    if ($('#confirmAddStepBtn').prop('disabled')) {
      return;
    }

    var stepName = ($('#addStepNameInput').val() || '').trim();
    if (!stepName) {
      $('#addStepNameError').show();
      $('#addStepNameInput').focus();
      return;
    }
    var stepType = ($('#addStepTypeSelect').val() || '').trim();
    if (!stepType) {
      $('#addStepTypeError').show();
      $('#addStepTypeSelect').focus();
      return;
    }
    $('#addStepNameError').hide();
    $('#addStepTypeError').hide();
    $('#confirmAddStepBtn').prop('disabled', true);

    var payload = {
      name: stepName,
      productRecipe: { id: Number(currentBOMRecordId) },
      type: stepType,
      sequence: (recipeStepList.length || 0) + 1
    };
    var enableModalActions = function () {
      $('#confirmAddStepBtn').prop('disabled', false);
    };

    JSUTIL.callAJAXPost('/api/product-recipe-steps', JSON.stringify(payload), function (res) {
      enableModalActions();
      bootstrap.Modal.getInstance($('#addStepModal')[0])?.hide();
      loadRecipeSteps(currentBOMRecordId, function () {
        var newStepId = (res && (res.id || res.Id)) || '';
        ensureStepMaterialStore(getStepKey(newStepId));
        renderStepList(newStepId || '');
        fetchRecipeItems(currentBOMRecordId);
      });
    }, function () {
      enableModalActions();
      JSUTIL.buildErrorModal('Unable to add step. Please try again.');
    });
  }

  function loadRecipeSteps(recipeId, callback) {
    if (!recipeId) {
      recipeStepList = [];
      renderStepTabs();
      if (typeof callback === 'function') {
        callback([]);
      }
      return;
    }
    fetch('/api/product-recipe-steps/product-recipe/' + Number(recipeId))
      .then(function (res) { return res.json(); })
      .then(function (res) {
        recipeStepList = (res || []).sort(function (a, b) {
          var seqA = Number(a.sequence || a.Sequence || 0);
          var seqB = Number(b.sequence || b.Sequence || 0);
          return seqA - seqB;
        });
        renderStepList();
        if (typeof callback === 'function') {
          callback(recipeStepList);
        }
      });
  }

  function saveBOMRecord() {
    if (!currentBOMRecordId) {
      return;
    }

    var $form = $('#editBOMForm');
    var payload = {
      id: Number($('#editBOMId').val()) || currentBOMRecordId,
      masterBatchRecord: toUpperSafe($form.find('[name="masterBatchRecord"]').val()),
      version: Number($form.find('[name="version"]').val()) || 0,
      type: $form.find('[name="type"]').val(),
      productQuantity: Number($form.find('[name="productQuantity"]').val()) || 0,
      quantityVariation: Number($form.find('[name="quantityVariation"]').val()) || 0,
      productStage: {
        id: Number($('#editStageId').val())
      }
    };

    var selectedPlantIds = normalizePlantIdArray($('#editBOMPlantSelect').val());
    payload.plants = selectedPlantIds.join(';');

    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    var headers = {
      "Content-Type": "application/json"
    };
    if (token && header) {
      headers[header] = token;
    }

    fetch('/api/product-recipes/' + currentBOMRecordId, {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify(payload)
    }).then(async function (response) {
      if (!response.ok) {
        var text = await response.text();
        throw new Error(text || ('HTTP ' + response.status));
      }
      return response.text();
    }).then(function (responseText) {
      setBOMEditState(false);
      console.log('Update Success:', responseText);
      window.location.hash = 'list';
      location.reload();
    }).catch(function (error) {
      console.error('Update Failed:', error);
      JSUTIL.buildErrorModal('Update failed: ' + error.message);
    });
  }

  function setupMaterialTabHandlers() {
    var isAddingMaterial = false;
    $(document).on('click', '.add-step-btn', function () {
      handleAddStep();
    });

    $(document).on('click', '#confirmAddStepBtn', function () {
      submitAddStep();
    });

    $(document).on('shown.bs.modal', '#addStepModal', function () {
      $('#addStepNameInput').focus();
    });

    $(document).on('hidden.bs.modal', '#addStepModal', function () {
      resetAddStepModalState();
    });

    $(document).on('input', '#addStepNameInput', function () {
      $('#addStepNameError').hide();
    });
    $(document).on('change', '#addStepTypeSelect', function () {
      $('#addStepTypeError').hide();
    });

    $(document).on('keypress', '#addStepNameInput', function (event) {
      if (event.which === 13) {
        event.preventDefault();
        submitAddStep();
      }
    });

    $(document).on('click', '.material-add-btn', function (e) {
      e.preventDefault();
      e.stopPropagation();

      if (isAddingMaterial) { return; }
      isAddingMaterial = true;

      var stepKey = $(this).data('step-id');
      if (isBOMLocked()) { isAddingMaterial = false; return; }
      if (!currentBOMRecordId) {
        JSUTIL.buildErrorModal('Select a BOM record before adding materials.');
        isAddingMaterial = false;
        return;
      }
      if (!stepKey) {
        JSUTIL.buildErrorModal('Create a step before adding materials.');
        isAddingMaterial = false;
        return;
      }
      addMaterialRow(stepKey);

      // Reset guard after a short delay to allow UI to settle
      setTimeout(function () { isAddingMaterial = false; }, 300);
    });

    $(document).on('click', '.material-save-btn', function () {
      var stepKey = $(this).data('step-id');
      handleMaterialSave(stepKey);
    });

    $(document).on('show.bs.collapse', '.step-panel .panel-collapse', function () {
      var $icon = $(this).closest('.step-panel').find('.step-toggle-icon');
      $icon.removeClass('fa-caret-right').addClass('fa-caret-down');
    });

    $(document).on('hide.bs.collapse', '.step-panel .panel-collapse', function () {
      var $icon = $(this).closest('.step-panel').find('.step-toggle-icon');

  function addMaterialRow(stepKey, itemData) {
    var tableBody = $('#' + getMaterialTableBodyId(stepKey));
    if (!tableBody.length) {
      return;
    }
    tableBody.find('.material-empty-row').remove();
    var rowHtml = buildMaterialRowHtml(itemData, stepKey);
    var $row = $(rowHtml);
    $row.attr('data-step-key', stepKey);
    tableBody.append($row);
    initializeMaterialRow($row, itemData, stepKey);

    // Defer icon creation to avoid event re-triggering
    setTimeout(function () {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    }, 50);
  }

  function buildMaterialRowHtml(itemData, stepKey) {
    var rowId = (itemData && (itemData.id || itemData.Id)) || '';
    var productName = getMaterialProductName(itemData) || '';
    var productCode = getMaterialProductCode(itemData) || '';
    var uomValue = getMaterialProductUom(itemData) || '';
    var qtyValue = getMaterialQuantityValue(itemData) || '';
    var productId = getMaterialProductId(itemData) || '';
    var safeProductName = sanitizeInputValue(productName);
    var safeQty = sanitizeInputValue(qtyValue);
    var safeProductId = sanitizeInputValue(productId);
    var safeRowId = sanitizeInputValue(rowId);
    var safeUomValue = sanitizeInputValue(uomValue);
    var safeStepId = sanitizeInputValue(stepKey || getMaterialStepId(itemData));
    var itemType = (itemData && (itemData.type || itemData.Type)) || MATERIAL_DEFAULT_META.typeValue;
    var typeLabel = sanitizeInputValue(getMaterialTypeLabel(itemType));
    var safeProductCode = sanitizeInputValue(productCode);

    return '' +
      '<tr class="material-data-row" data-material-type="single">' +
      '<td>' +

      '<i data-lucide="trash"></i>' +
      '</button>' +
      '</td>' +
      '<td>' +
      '<div class="typeahead-container" style="position: relative;">' +
      '<input type="text" class="form-control material-product-code" placeholder="Search code" autocomplete="off" value="' + safeProductCode + '">' +
      '</div>' +
      '</td>' +
      '<td>' +
      '<div class="typeahead-container" style="position: relative;">' +
      '<input type="text" class="form-control material-product-search ' + MATERIAL_DEFAULT_META.typeaheadClass + '" placeholder="Search product" autocomplete="off" value="' + safeProductName + '">' +
      '</div>' +
      '<input type="hidden" class="material-product-id" value="' + safeProductId + '">' +
      '<input type="hidden" class="material-item-id" value="' + safeRowId + '">' +
      '<input type="hidden" class="material-step-id" value="' + safeStepId + '">' +
      '</td>' +
      '<td>' +
      '<input type="text" class="form-control material-uom" readonly value="' + safeUomValue + '">' +
      '</td>' +
      '<td>' +
      '<input type="text" class="form-control material-type-display" readonly value="' + typeLabel + '">' +
      '<input type="hidden" class="material-type" value="' + sanitizeInputValue(itemType) + '">' +
      '</td>' +
      '<td>' +
      '<input type="number" class="form-control material-qty-input" min="0" placeholder="Standard quantity" value="' + safeQty + '">' +
      '</td>' +
      '</tr>';
  }

  function buildMaterialTypeOptions(selectedValue) {
    var normalized = selectedValue || MATERIAL_DEFAULT_META.typeValue;
    var optionsHtml = '';
    (MATERIAL_TYPE_OPTIONS || []).forEach(function (opt) {
      var isSelected = String(normalized || '').toLowerCase() === String(opt.value || '').toLowerCase();
      optionsHtml += '<option value="' + opt.value + '"' + (isSelected ? ' selected' : '') + '>' + opt.label + '</option>';
    });
    return optionsHtml;
  }
  function setMaterialTypeValue($row, typeValue) {
    var normalizedType = typeValue || '';
    var label = getMaterialTypeLabel(normalizedType);
    $row.find('.material-type').val(normalizedType || '');
    $row.find('.material-type-display').val(label || '');
  }

  function initializeMaterialRow($row, itemData, stepKey) {
    var stepType = getStepType(stepKey);
    initializeMaterialTypeahead($row.find('.material-product-search'), { mode: 'name', allowedType: stepType });
    initializeMaterialTypeahead($row.find('.material-product-code'), { mode: 'code', allowedType: stepType });
    var typeVal = ($row.find('.material-type').val() || MATERIAL_DEFAULT_META.typeValue);
    if (!itemData && stepType) {
      typeVal = stepType;
      $row.find('.material-type').val(stepType);
    }
    setMaterialTypeValue($row, typeVal);
  }

  function initializeMaterialTypeahead($input, options) {
    options = options || {};
    var mode = options.mode || 'name';
    loadProductsForMaterialType(options.allowedType, function (results) {
      try {
        $input.typeahead('destroy');
      } catch (e) {
        // ignore destroy errors
      }

      $input.typeahead({
        appendTo: $input.parent(),
        fitToElement: true,
        source: function (query, process) {
          query = (query || '').toLowerCase();
          var filteredItems = results.filter(function (item) {
            if (!query) {
              return true;
            }
            var matchesSearch = item.search.indexOf(query) !== -1;
            var matchesNumber = item.numberLower.indexOf(query) !== -1;
            var matchesName = item.nameLower.indexOf(query) !== -1;
            return matchesSearch || matchesNumber || matchesName;
          }).map(function (item) {
            return mode === 'code' ? item.codeLabel : item.text;
          });
          process(filteredItems);
        },
        afterSelect: function (selectedText) {
          var chosen = results.find(function (item) {
            return item.text === selectedText || item.codeLabel === selectedText;
          });
          var $row = $input.closest('tr');
          var productId = chosen ? chosen.id : '';
          var productCode = chosen ? (chosen.number || '') : '';
          var productName = '';
          if (chosen) {
            productName = chosen.name || '';
            if (!productName && chosen.text) {
              productName = chosen.text.split('|')[0].trim();
            }
          }
          var productUom = chosen ? (chosen.uom || '') : '';
          $row.find('.material-product-id').val(productId);
          $row.find('.material-product-code').val(productCode);
          $row.find('.material-product-search').val(productName);
          $row.find('.material-uom').val(productUom);
          setMaterialTypeValue($row, chosen ? chosen.type : '');
          if (mode === 'code') {
            $input.val(productCode);
          } else {
            $input.val(productName);
          }
        }
      });
    });
  }

  function filterProductsByType(list, allowedType) {
    var normalized = (allowedType || '').toLowerCase();
    if (!normalized) {
      return (list || []).slice();
    }
    return (list || []).filter(function (item) {
      return String(item.type || '').toLowerCase() === normalized;
    });
  }

  function loadProductsForMaterialType(allowedType, callback) {
    var normalizedType = (allowedType || '').toLowerCase();
    var cacheKey = normalizedType ? ('type-' + normalizedType) : 'all';

    if (productSearchCacheByType[cacheKey]) {
      if (typeof callback === 'function') {
        callback(productSearchCacheByType[cacheKey]);
      }
      return;
    }

    if (productSearchCacheByType['all']) {
      productSearchCacheByType[cacheKey] = filterProductsByType(productSearchCacheByType['all'], normalizedType);
      if (typeof callback === 'function') {
        callback(productSearchCacheByType[cacheKey]);
      }
      return;
    }

    JSUTIL.callAJAXGet('/api/products', function (res) {
      var mapped = (res || []).map(function (item) {
        var id = item.Id || item.id;
        var name = item.Name || item.name || '';
        var type = item.Type || item.type || '';
        var uom = item.Uom || item.uom || '';
        var number = item.Number || item.number || '';
        var nameLower = (name || '').toLowerCase();
        var numberLower = (number || '').toLowerCase();
        var searchTokens = [name, type, id, number].filter(Boolean).join(' ').toLowerCase();
        var labelParts = [name, "|", number];
        var displayText = labelParts.join(' ');
        var codeLabelParts = [];
        if (number) {
          codeLabelParts.push(number);
        }
        if (name) {
          if (codeLabelParts.length) {
            codeLabelParts.push('|');
          }
          codeLabelParts.push(name);
        }
        var codeLabel = codeLabelParts.join(' ');
        return {
          id: id,
          text: displayText,
          codeLabel: codeLabel || displayText,
          search: searchTokens,
          name: name,
          nameLower: nameLower,
          numberLower: numberLower,
          number: number,
          uom: uom,
          type: type
        };
      });
      productSearchCacheByType['all'] = mapped;
      productSearchCacheByType[cacheKey] = filterProductsByType(mapped, normalizedType);
      if (typeof callback === 'function') {
        callback(productSearchCacheByType[cacheKey]);
      }
    });
  }

  function collectMaterialPayload(stepKey) {
    var tableBody = $('#' + getMaterialTableBodyId(stepKey));
    if (!tableBody.length) {
      return [];
    }
    var rows = tableBody.find('tr.material-data-row');
    var payload = [];
    var isValid = true;

    rows.each(function () {
      var $row = $(this);
      var productId = $row.find('.material-product-id').val();
      var qty = $row.find('.material-qty-input').val();
      var qtyValue = Number(qty);
      if (!productId) {
        JSUTIL.buildErrorModal('Please select a product for this step.');
        isValid = false;
        return false;
      }

      if (!qty || isNaN(qtyValue) || qtyValue <= 0) {
        JSUTIL.buildErrorModal('Please enter a valid quantity for this step.');
        isValid = false;
        return false;
      }

      var recordId = $row.find('.material-item-id').val();
      var productName = ($row.find('.material-product-search').val() || '').trim();
      var rowIndex = $row.index();
      var itemType = $row.find('.material-type').val() || MATERIAL_DEFAULT_META.typeValue;
      $row.find('.material-type').val(itemType);

      var record = buildByproductPayload(rowIndex, productId, productName, qtyValue, $row.find('.material-step-id').val() || stepKey, itemType);

      if (recordId) {
        record.id = Number(recordId);
      }

      payload.push(record);
    });

    if (!isValid) {
      return null;
    }

    return payload;
  }

  function buildByproductPayload(rowIndex, productId, productName, qtyValue, stepId, typeValue) {
    var position = rowIndex + 1;
    var payload = {
      productRecipe: { id: Number(currentBOMRecordId) },
      product: { id: Number(productId) },
      type: typeValue || MATERIAL_DEFAULT_META.typeValue,
      quantity: qtyValue,
      name: productName || (MATERIAL_DEFAULT_META.label + ' ' + position)
    };
    if (stepId && stepId !== UNASSIGNED_STEP_KEY) {
      payload.step = { id: Number(stepId) || stepId };
    }
    return payload;
  }

  function handleMaterialSave(stepKey) {
    if (!currentBOMRecordId) {
      JSUTIL.buildErrorModal('Select a BOM record first.');
      return;
    }
    if (isBOMLocked()) {
      return;
    }
    if (!stepKey) {
      JSUTIL.buildErrorModal('Select a step before saving materials.');
      return;
    }

    ensureStepMaterialStore(stepKey);

    var payload = collectMaterialPayload(stepKey);
    if (payload === null) {
      return;
    }

    // Split into NEW records (no id → create) and EXISTING records (has id → update)
    var newRecords      = payload.filter(function (r) { return !r.id; });
    var existingRecords = payload.filter(function (r) { return !!r.id; });

    var processDeletesAndRefresh = function () {
      processMaterialDeletes(stepKey, function () {
        fetchRecipeItems(currentBOMRecordId);
      });
    };

    // Chain: update existing → create new → process deletes → refresh
    function updateExistingThenCreate() {
      if (!existingRecords.length) {
        createNewRecords();
        return;
      }
      // PUT each existing record individually
      var queue = existingRecords.slice();
      function updateNext() {
        if (!queue.length) {
          createNewRecords();
          return;
        }
        var rec = queue.shift();
        var token  = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");
        var headers = { 'Content-Type': 'application/json' };
        if (token && header) { headers[header] = token; }
        fetch('/api/product-recipe-byproducts/' + rec.id, {
          method:  'PUT',
          headers: headers,
          body:    JSON.stringify(rec)
        }).then(function () {
          updateNext();
        }).catch(function (err) {
          console.warn('Update material failed:', err);
          updateNext(); // continue even if one fails
        });
      }
      updateNext();
    }

    function createNewRecords() {
      if (!newRecords.length) {
        processDeletesAndRefresh();
        return;
      }
      // POST only genuinely new rows (no id)
      JSUTIL.callAJAXPost('/api/product-recipe-byproducts/create_multiple', JSON.stringify(newRecords), function () {
        processDeletesAndRefresh();
      }, function () {
        JSUTIL.buildErrorModal('Failed to save new materials. Please try again.');
        processDeletesAndRefresh();
      });
    }

    updateExistingThenCreate();
  }

  function processMaterialDeletes(stepKey, callback) {
    ensureStepMaterialStore(stepKey);
    var queue = stepMaterialDeleteQueue[stepKey] || [];
    if (!queue.length) {
      if (typeof callback === 'function') {
        callback();
      }
      return;
    }

    var ids = queue.slice(0);
    stepMaterialDeleteQueue[stepKey] = [];

    var processNext = function () {
      if (!ids.length) {
        if (typeof callback === 'function') {
          callback();
        }
        return;
      }

      var currentId = ids.shift();
      if (!currentId) {
        processNext();
        return;
      }

      fetch('/api/product-recipe-byproducts/' + currentId, {
        method: 'DELETE'
      })
        .then(function (response) {
          if (!response.ok) console.warn('Delete failed for byproduct ' + currentId);
          processNext();
        })
        .catch(function (error) {
          console.warn('Delete error for byproduct ' + currentId, error);
          processNext();
        });
    };

    processNext();
  }

  function fetchRecipeItems(recipeId) {
    if (!recipeId) {
      return;
    }

    // NOTE: /api/product-recipe-byproducts/list POST with conditions body returns [] (not supported).
    // Use the dedicated GET endpoint: /api/product-recipe-byproducts/product-recipe/{id}
    // var payload_unused_post = {
    //   fields: 'Id;Type;Quantity;Product.Id;Product.Name;Product.Number;Product.Uom;Step.Id;Step.Name;Step.Sequence;ProductRecipe.Id',
    //   conditions: ['ProductRecipe.Id = ' + Number(recipeId)],
    //   logic: '{0}'
    // };
    // JSUTIL.callAJAXPost('/api/product-recipe-byproducts/list', JSON.stringify(payload_unused_post), ...)

    JSUTIL.callAJAXGet('/api/product-recipe-byproducts/product-recipe/' + Number(recipeId), function (response) {
      renderMaterialTables(response || []);
    });
  }

  function ensureStepExists(stepKey, stepName, stepType) {
    var exists = recipeStepList.some(function (step) {
      return getStepKey(step.id || step.Id) === stepKey;
    });
    if (!exists) {
      recipeStepList.push({
        id: stepKey,
        name: stepName || ('Step ' + stepKey),
        type: stepType || ''
      });
      return true;
    }
    return false;
  }

  function syncStepsFromMaterials(items) {
    var added = false;
    var hasUnassigned = false;
    (items || []).forEach(function (item) {
      var step = item && (item.step || item.Step || item.productRecipeStep || item.ProductRecipeStep);
      var stepId = step && (step.id || step.Id);
      if (!stepId) {
        hasUnassigned = true;
        return;
      }
      var stepKey = getStepKey(stepId);
      var stepName = step.name || step.Name;
      var stepType = step.type || step.Type || '';
      if (ensureStepExists(stepKey, stepName, stepType)) {
        added = true;
      }
    });
    if (hasUnassigned) {
      added = ensureStepExists(UNASSIGNED_STEP_KEY, 'Unassigned') || added;
    }
    return added;
  }

  function renderMaterialTables(items) {
    console.info('-->items: ', items);
    currentMaterial = items
    var addedSteps = syncStepsFromMaterials(items);
    if (addedSteps) {
      renderStepList();
    }
    clearStepMaterialStores();
    (recipeStepList || []).forEach(function (step) {
      ensureStepMaterialStore(getStepKey(step.id));
    });

    (items || []).forEach(function (item) {
      var stepKey = getStepKey(getMaterialStepId(item));
      ensureStepMaterialStore(stepKey);
      stepMaterialsMap[stepKey].push(item);
    });

    Object.keys(stepMaterialsMap).forEach(function (stepKey) {
      buildMaterialTableRows(stepKey, stepMaterialsMap[stepKey] || []);
    });
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
    applyMaterialPermissions();
  }

  function buildMaterialTableRows(stepKey, list) {
    var tableBody = $('#' + getMaterialTableBodyId(stepKey));
    if (!tableBody.length) {
      return;
    }

    tableBody.empty();

    if (!list || !list.length) {
      tableBody.html('<tr class="material-empty-row"><td colspan="' + getMaterialColumnCount(tableBody) + '" class="text-center text-muted">' + MATERIAL_DEFAULT_META.emptyStateText + '</td></tr>');
      return;
    }

    list.forEach(function (item) {
      addMaterialRow(stepKey, item);
    });
  }

  function getMaterialProductName(item) {
    if (item && item.product) {
      return item.product.name || item.product.Name || '';
    }
    if (item) {
      return item.name || item.Name || '';
    }
    return '';
  }

  function getMaterialProductId(item) {
    if (item && item.product) {
      return item.product.id || item.product.Id;
    }
    return item && (item.productId || item.productID || item.ProductId || item.ProductID) || '';
  }

  function getMaterialProductCode(item) {
    if (item && item.product) {
      return item.product.number || item.product.Number || '';
    }
    return item && (item.productNumber || item.ProductNumber || item.number || item.Number) || '';
  }

  function getMaterialProductUom(item) {
    if (item && item.product) {
      return item.product.uom || item.product.Uom || '';
    }
    return item && (item.uom || item.Uom) || '';
  }

  function getMaterialQuantityValue(item) {
    if (!item) {
      return '';
    }
    if (item.quantity !== undefined && item.quantity !== null) {
      return item.quantity;
    }
    if (item.minimumQuantity !== undefined && item.minimumQuantity !== null) {
      return item.minimumQuantity;
    }
    if (item.minQuantity !== undefined && item.minQuantity !== null) {
      return item.minQuantity;
    }
    return '';
  }

  function getMaterialStepId(item) {
    if (!item) {
      return '';
    }
    var direct = item.stepId || item.StepId || item.productRecipeStepId || item.ProductRecipeStepId;
    if (direct) {
      return direct;
    }
    var step = item.step || item.Step || item.productRecipeStep || item.ProductRecipeStep;
    if (step) {
      return step.id || step.Id || '';
    }
    return '';
  }

  $(document).on('click', '.delete-material-row', function (event) {
    event.preventDefault();
    var $row    = $(this).closest('tr');
    var recordId = $row.find('.material-item-id').val();
    var stepKey  = $row.data('step-key') || $row.closest('tbody').data('step-key') || UNASSIGNED_STEP_KEY;

    // Remove the row from the UI immediately
    $row.remove();
    var tableBody = $('#' + getMaterialTableBodyId(stepKey));
    if (tableBody && !tableBody.find('tr').length) {
      buildMaterialTableRows(stepKey, []);
    }

    if (!recordId) {
      // Row was unsaved (no id) — nothing to delete on the server
      return;
    }

    // Saved record → DELETE immediately via API
    var token  = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    var headers = {};
    if (token && header) { headers[header] = token; }

    fetch('/api/product-recipe-byproducts/' + Number(recordId), {
      method:  'DELETE',
      headers: headers
    })
    .then(function (response) {
      if (!response.ok) {
        console.warn('DELETE failed for byproduct id=' + recordId + ', status=' + response.status);
      } else {
        console.log('Deleted byproduct id=' + recordId);
      }
    })
    .catch(function (err) {
      console.warn('DELETE error for byproduct id=' + recordId, err);
    });
  });

  $(document).on('input', '.material-product-search', function () {
    var $row = $(this).closest('tr');
    $row.find('.material-product-id').val('');
    $row.find('.material-uom').val('');
    setMaterialTypeValue($row, '');
  });

  $(document).on('input', '.material-product-code', function () {
    var $row = $(this).closest('tr');
    $row.find('.material-product-id').val('');
    $row.find('.material-product-search').val('');
    $row.find('.material-uom').val('');
    setMaterialTypeValue($row, MATERIAL_DEFAULT_META.typeValue);
  });

  function getMaterialColumnCount(tableBody) {
    var headerCount = tableBody.closest('table').find('thead th').length;
    return headerCount || 3;
  }

  function findStageById(list, id) {
    if (!id) {
      return null;
    }
    return (list || []).find(function (stage) {
      return String(stage.id || stage.Id) === String(id);
    }) || null;
  }

  function extractStageProductInfo(stage) {
    var product = stage && (stage.product || stage.Product) || {};
    var plant = stage && (stage.plant || stage.Plant) || {};
    var plantIds = getPlantIdsFromData(stage);
    var primaryPlantId = plantIds.length ? plantIds[0] : '';
    return {
      code: product.number || product.Number || '',
      name: product.name || product.Name || '',
      uom: product.uom || product.Uom || '',
      plantId: primaryPlantId,
      plantIds: plantIds,
      plantName: plant.name || plant.Name || ''
    };
  }

  function extractProductInfoFromRecord(record) {
    if (!record) {
      return { code: '', name: '', uom: '', plantId: '', plantIds: [], plantName: '' };
    }
    var stage = record.productStage || record.ProductStage || record.stage || record.Stage || {};
    var product = stage.product || stage.Product || record.product || record.Product || {};
    var plantIds = getPlantIdsFromData(record);
    if (!plantIds.length) {
      plantIds = getPlantIdsFromData(stage);
    }
    var plant = stage.plant || stage.Plant || record.plant || record.Plant || {};
    return {
      code: product.number || product.Number || '',
      name: product.name || product.Name || '',
      uom: product.uom || product.Uom || '',
      plantId: plantIds[0] || '',
      plantIds: plantIds,
      plantName: plant.name || plant.Name || ''
    };
  }

  function setEditProductFields(productInfo) {
    $('#editBOMProductCode').val((productInfo && productInfo.code) || '');
    $('#editBOMProductName').val(productInfo.name || '');
    $('#editBOMProductUom').val((productInfo && productInfo.uom) || '');
    setEditPlantSelection((productInfo && productInfo.plantIds) || []);
  }

  function updateEditProductDetailsFromStage(stageId) {
    var stage = findStageById(cachedStageList, stageId);
    if (!stage) {
      setEditProductFields({ code: '', name: '', uom: '', plantId: '', plantIds: [], plantName: '' });
      return false;
    }
    var productInfo = extractStageProductInfo(stage);
    // Stage payload sometimes omits plant; fall back to the record's plant so we don't lose selection
    if ((!productInfo.plantIds || !productInfo.plantIds.length || !productInfo.plantName) && currentBOMRecord) {
      var recordPlantIds = getPlantIdsFromData(currentBOMRecord);
      if (recordPlantIds.length) {
        productInfo.plantIds = recordPlantIds;
        productInfo.plantId = recordPlantIds[0];
      }
      var recordInfo = extractProductInfoFromRecord(currentBOMRecord);
      productInfo.plantName = productInfo.plantName || recordInfo.plantName;
    }
    setEditProductFields(productInfo);
    return Boolean(productInfo.code || productInfo.name || productInfo.uom || (productInfo.plantIds && productInfo.plantIds.length));
  }

  function loadPlantList(callback) {
    if (editPlantOptionsCache && editPlantOptionsCache.length) {
      if (typeof callback === 'function') {
        callback(editPlantOptionsCache);
      } else {
        renderEditPlantOptions();
      }
      return;
    }
    var payload = {
      fields: 'Id;Name;Number'
    };
    JSUTIL.callAJAXPost('/data/Plant/list', JSON.stringify(payload), function (res) {
