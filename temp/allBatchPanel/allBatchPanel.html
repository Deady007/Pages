<div class="row animated fadeInRight aasaanPanel" id="allBPCRPanel">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <div class="ibox-tools">
                    <button type="button" class="btn btn-sm btn-success newBPCRButton"><i class="fa-plus fa"></i> BPCR Requisition</button>
                </div>
            </div>
            <div class="ibox-content m-b-sm border-bottom">
                <div class="row m-b-md">
                    <div class="col-sm-4">
                        <label for="plantFilter" class="control-label">Plant</label>
                        <select id="plantFilter" class="form-control input-sm">
                            <option value="">All Plants</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover dataTables">
                    <thead>
                        <tr>
                            <th>Doc Code</th>
                            <th>Batch Number</th>
                            <th>Product</th>
                            <th>Stage</th>
                            <th>Plant</th>
                            <!-- <th>Type</th> -->
                            <th>Owner</th>
                            <th>Status</th>
                        </tr>
                    </thead>                        
                    <tbody id="allBPCRTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    <div class="modal-dialog modal-lg" style="width: 90%; max-width: 1200px;">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">New Batch</h4>
                <small class="font-bold"></small>
            </div>
            <div class="modal-body">

                    <div class="col-sm-12">

                <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>Product</label>
                            <input type="text" class="form-control typeahead_3" id="batchProductInput" placeholder="Search product" autocomplete="off">
                            <input type="hidden" id="batchProductId">
                        </div>
                    </div>
                    </div>
                    <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>Product Stage</label>
                            <select class="form-control select2" id="batchStageSelect">
                                <option value="">Select product stage</option>
                            </select>
                            <small class="text-muted" id="batchStageMeta"></small>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>Plant</label>
                            <select class="form-control select2" id="batchPlantSelect">
                                <option value="">Select plant</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12">
                        <div class="form-group">
                            <button type="button" class="btn btn-success btn-sm" id="generateBatchBtn">
                                <i class="fa fa-random"></i> Generate Batch
                            </button>
                        </div>
                    </div>
                </div>

                                <thead>
                                    <tr>
                                        <th>MPCR No.</th>
                                        <th>BOM</th>
                                        <th>Product</th>

                                        <th>Batch Size</th>
                                        <th>Batch Number</th>
                                        <th>Start Date</th>
                                        <th class="text-center" style="width:150px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="bomSelectionTableBody">
                                    <tr>
                                        <td colspan="8" class="text-center text-muted">Select a product stage and click Generate Batch to load BOMs.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-white" data-dismiss="modal">Close</button>
