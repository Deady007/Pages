<div class="row animated fadeInRight aasaanPanel" id="productIssuePanel">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>Product Requests</h5>
            </div>
            <div class="ibox-content">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>Request #</th>
                                <th>Work Order</th>
                                <th>Requested By</th>
                                <th>Created</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productIssueListTable">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row animated fadeInRight aasaanPanel" id="productIssueDetailPanel">
    <div class="col-lg-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>Request Details</h5>
                <div class="ibox-tools">
                    <button type="button" class="btn btn-success btn-sm issue-request-btn" disabled>
                        <i class="fa fa-check"></i> Issue
                    </button>
                    <button type="button" class="btn btn-danger btn-sm reject-request-btn" disabled>
                        <i class="fa fa-times"></i> Reject
                    </button>
                </div>
            </div>
            <div class="ibox-content">
                <div class="row" style="margin-bottom: 10px;">
                    <div class="col-sm-3">
                        <label>Request #</label>
                        <div class="bpcr-meta-value" id="productIssueNumber">-</div>
                    </div>
                    <div class="col-sm-3">
                        <label>Status</label>
                        <div class="bpcr-meta-value" id="productIssueStatus">-</div>
                    </div>
                    <div class="col-sm-3">
                        <label>Work Order</label>
                        <div class="bpcr-meta-value" id="productIssueWorkOrder">-</div>
                    </div>
                    <div class="col-sm-3">
                        <label>Requested By</label>
                        <div class="bpcr-meta-value" id="productIssueRequestedBy">-</div>
                    </div>
                </div>
                <div class="row" style="margin-bottom: 10px;">
                    <div class="col-sm-12">
                        <label>Remarks</label>
                        <div class="bpcr-meta-value" id="productIssueRemarks">-</div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>UOM</th>
                                <th>Requested Qty</th>
                                <th>Issue Qty</th>
                            </tr>
                        </thead>
                        <tbody id="productIssueMaterialTable">
                            <tr>
                                <td colspan="4" class="text-center text-muted">Select a request to view items.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
